<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1419">
<title>Pre-Trade Checklist</title>
<!--
  PRE-TRADE CHECKLIST · LEAPS / CSP / PMCC self-check
  Single-file, offline, no external deps, no storage.

  HOW TO MODIFY:
    Colors            -> CSS :root variables (top of <style>)
    Delta thresholds  -> JS  leapsDeltaMin() / cspDeltaMax() / pmccDeltaMax()
    Position cap %    -> JS  positionCapPct()
    Add checklist item-> Push to leapsItems() / cspItems() / pmccItems()
    Edit SOP text     -> const SOP object
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  body.theme-slate {
    --bg: #0F1419; --panel: #171C22; --panel-2: #1E252D;
    --border: #2A323C; --border-hi: #3A4552;
    --text: #E6E8EB; --text-dim: #8A94A0; --text-faint: #5A6470;
    --pass: #3FB950; --pass-bg: rgba(63, 185, 80, 0.10);
    --fail: #F85149; --fail-bg: rgba(248, 81, 73, 0.10);
    --pending: #D29922; --pending-bg: rgba(210, 153, 34, 0.08);
    --accent: #58A6FF;
  }
  body.theme-terminal {
    --bg: #000000; --panel: #0A0F0A; --panel-2: #101810;
    --border: #1A2E1A; --border-hi: #2E5E2E;
    --text: #E0F5E0; --text-dim: #8FBF8F; --text-faint: #567856;
    --pass: #00FF66; --pass-bg: rgba(0, 255, 102, 0.10);
    --fail: #FF4444; --fail-bg: rgba(255, 68, 68, 0.10);
    --pending: #F0C000; --pending-bg: rgba(240, 192, 0, 0.10);
    --accent: #00CC66;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.45; min-height: 100vh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 780px; margin: 0 auto; padding: 16px 16px 48px; }

  .status-bar { position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 12px 0 16px; border-bottom: 1px solid var(--border); margin: 0 -16px 16px; padding-left: 16px; padding-right: 16px; }
  .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .status-main { font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  @media (min-width: 640px) { .status-main { font-size: 34px; } }
  .status-main.pending { color: var(--pending); }
  .status-main.pass { color: var(--pass); }
  .status-main.fail { color: var(--fail); }
  .status-meta { font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; line-height: 1.4; }
  .status-meta strong { color: var(--text-dim); font-weight: 500; }
  .status-tally { display: flex; gap: 12px; margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
  .tally-item { display: inline-flex; align-items: center; gap: 5px; }
  .tally-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .tally-dot.pass { background: var(--pass); }
  .tally-dot.fail { background: var(--fail); }
  .tally-dot.pending { background: var(--pending); }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
  .brand { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-family: var(--sans); font-size: 13px; padding: 8px 14px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.12s ease; min-height: 36px; -webkit-appearance: none; appearance: none; }
  .btn:hover { border-color: var(--border-hi); color: var(--text); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); color: #0F1419; border-color: var(--accent); font-weight: 600; }
  .btn.primary:disabled { background: var(--panel); color: var(--text-faint); border-color: var(--border); cursor: not-allowed; font-weight: 400; }
  .btn.ghost { color: var(--text-faint); }
  .btn.big { padding: 12px 18px; font-size: 15px; min-height: 44px; }

  .theme-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 10px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; min-height: 36px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.12s ease; -webkit-appearance: none; appearance: none; }
  .theme-btn:hover { border-color: var(--border-hi); color: var(--text); }
  .theme-btn:active { transform: scale(0.98); }
  .theme-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); display: block; flex-shrink: 0; }

  .picker { padding: 32px 0 40px; }
  .picker-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em; }
  .picker-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
  .picker-choices { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 720px) { .picker-choices { grid-template-columns: 1fr 1fr 1fr; } }
  .picker-card { background: var(--panel); border: 1px solid var(--border); padding: 20px 18px; border-radius: 10px; cursor: pointer; text-align: left; color: var(--text); font-family: var(--sans); transition: all 0.15s ease; -webkit-appearance: none; appearance: none; }
  .picker-card:hover { border-color: var(--accent); background: var(--panel-2); }
  .picker-card:active { transform: scale(0.99); }
  .picker-card-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .picker-card-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .picker-card-desc { color: var(--text-dim); font-size: 13px; line-height: 1.5; }

  .config { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .config-title { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 12px; }
  .segmented { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 3px; gap: 3px; flex-wrap: wrap; }
  .segmented button { flex: 1; min-width: 0; padding: 8px 6px; background: transparent; color: var(--text-dim); border: 0; border-radius: 5px; font-family: var(--sans); font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.12s ease; -webkit-appearance: none; appearance: none; min-height: 36px; white-space: nowrap; }
  .segmented button.active { background: var(--panel-2); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-hi); }
  .segmented.segmented-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
  .segmented.segmented-grid button { white-space: normal; line-height: 1.25; padding: 10px 8px; min-height: 40px; }
  @media (min-width: 640px) { .segmented.segmented-grid { grid-template-columns: repeat(5, 1fr); } }

  .num-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .num-field { display: flex; flex-direction: column; }
  .num-field-label { font-size: 11.5px; color: var(--text-faint); margin-bottom: 5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .num-field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-family: var(--mono); font-size: 14px; outline: none; transition: border-color 0.12s; -webkit-appearance: none; appearance: none; width: 100%; }
  .num-field input:focus { border-color: var(--accent); }
  .num-field input::placeholder { color: var(--text-faint); }

  .position-summary { margin-top: 10px; padding: 10px 12px; background: var(--bg); border-radius: 6px; font-family: var(--mono); font-size: 12.5px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--border); }
  .position-summary.pass { border-left-color: var(--pass); }
  .position-summary.fail { border-left-color: var(--fail); }
  .position-summary-label { color: var(--text-dim); }
  .position-summary-val { color: var(--text); font-weight: 600; }
  .position-summary-val.fail { color: var(--fail); }
  .position-summary-val.pass { color: var(--pass); }

  .qref { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .qref-head { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); -webkit-user-select: none; user-select: none; }
  .qref-head:hover { color: var(--text); }
  .qref-arrow { font-family: var(--mono); color: var(--text-faint); transition: transform 0.15s; display: inline-block; }
  .qref.open .qref-arrow { transform: rotate(90deg); }
  .qref-body { display: none; padding: 4px 14px 14px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-dim); line-height: 1.65; }
  .qref.open .qref-body { display: block; }
  .qref-body h4 { color: var(--text); font-size: 13.5px; margin: 12px 0 6px; font-weight: 600; letter-spacing: 0.02em; }
  .qref-body h4:first-child { margin-top: 6px; }
  .qref-body ul { margin: 0 0 6px 18px; padding: 0; }
  .qref-body li { margin-bottom: 4px; }
  .qref-body code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 3px; color: var(--text); }

  .group { margin-bottom: 18px; }
  .group-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
  .group-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; }
  .group-count { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .items { display: flex; flex-direction: column; gap: 8px; }
  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s, background 0.15s; border-left-width: 3px; }
  .item.pass { border-left-color: var(--pass); background: linear-gradient(90deg, var(--pass-bg) 0%, var(--panel) 45%); }
  .item.fail { border-left-color: var(--fail); background: linear-gradient(90deg, var(--fail-bg) 0%, var(--panel) 45%); }
  .item.pending { border-left-color: var(--border); }
  .item.hard-fail { background: linear-gradient(90deg, var(--fail-bg) 0%, var(--panel) 60%); }

  .item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .item-text { flex: 1; min-width: 0; }
  .item-title { font-size: 14.5px; font-weight: 500; color: var(--text); line-height: 1.4; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .hard-badge { font-family: var(--mono); font-size: 9.5px; color: var(--fail); background: var(--fail-bg); padding: 2px 6px; border-radius: 3px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; border: 1px solid rgba(248, 81, 73, 0.25); }
  .item-desc { font-size: 13px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .item-buttons { display: flex; gap: 6px; flex-shrink: 0; }
  .item-btn { width: 40px; height: 40px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text-faint); transition: all 0.12s ease; -webkit-appearance: none; appearance: none; }
  .item-btn:active { transform: scale(0.92); }
  .item-btn.pass-btn:hover { border-color: var(--pass); color: var(--pass); }
  .item-btn.fail-btn:hover { border-color: var(--fail); color: var(--fail); }
  .item-btn.pass-btn.on { background: var(--pass); color: #0F1419; border-color: var(--pass); }
  .item-btn.fail-btn.on { background: var(--fail); color: #0F1419; border-color: var(--fail); }

  .item-numeric { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); flex-wrap: wrap; }
  .item-numeric-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 5px; font-family: var(--mono); font-size: 13.5px; outline: none; width: 90px; -webkit-appearance: none; appearance: none; }
  .item-numeric-input:focus { border-color: var(--accent); }
  .item-numeric-req { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
  .item-numeric-verdict { font-family: var(--mono); font-size: 12px; margin-left: auto; font-weight: 600; }
  .item-numeric-verdict.pass { color: var(--pass); }
  .item-numeric-verdict.fail { color: var(--fail); }

  .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .disclaimer { font-size: 11px; color: var(--text-faint); margin-top: 12px; text-align: center; line-height: 1.6; font-family: var(--mono); }
  .progress-bar { display: flex; height: 3px; background: var(--panel-2); border-radius: 2px; overflow: hidden; margin: -8px 0 16px; }
  .progress-fill-pass { height: 100%; background: var(--pass); transition: width 0.25s ease; }
  .progress-fill-fail { height: 100%; background: var(--fail); transition: width 0.25s ease; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; max-width: 720px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 0 8px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 14px 18px; flex: 1; overflow-y: auto; min-height: 0; }
  .modal-preview { width: 100%; min-height: 260px; height: 50vh; font-family: var(--mono); font-size: 12px; line-height: 1.55; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 6px; resize: vertical; -webkit-appearance: none; appearance: none; }
  .modal-actions { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
</style>
</head>
<body class="theme-slate">
<div class="app" id="app"></div>
<script>
"use strict";

/* ==========================================================
 * CONSTANTS & CONFIG
 * ========================================================== */
const STRAT_LABEL = { leaps: 'LEAPS', csp: 'CSP', pmcc: 'PMCC' };
const LEAPS_DIRECTION_LABEL = { open: '开仓', close: '关仓' };
const LEAPS_PHASE_LABEL = {
  entry: '首笔 · 左侧衰竭',
  add_right: '加仓 · 右侧确认',
  add_macd: '加仓 · MACD 金叉'
};
const LEAPS_STYLE_LABEL = { stock_sub: '股票替代', standard: '标准 Swing', aggressive: '激进 Swing' };
const LEAPS_CLOSE_TYPE_LABEL = {
  gradient: '分批止盈 (100/150/200)',
  profit200: '暴利平半 (≥200%)',
  time_loss: '止损 · 时间+浮亏',
  time_forced: '时间必退 (DTE ≤ 6m)',
  trend_break: '止损 · 趋势破坏'
};
const CSP_INTENT_LABEL = { assign: '想接股', neutral: '一般', premium: '只赚权利金' };
const PMCC_MODE_LABEL = { standard: '标准 (≤15)', defensive: '防守 (≤10)' };

function leapsDeltaMin() { return { stock_sub: 70, standard: 60, aggressive: 40 }[state.leapsStyle] || null; }
function cspDeltaMax() { return { assign: 30, neutral: 25, premium: 15 }[state.cspIntent] || null; }
function pmccDeltaMax() { return { standard: 15, defensive: 10 }[state.pmccMode] || null; }
function positionCapPct() { return state.leapsBluechip ? 30 : 15; }
function positionUsedPct() {
  const nav = parseFloat(state.nav);
  const ex = parseFloat(state.existingExposure) || 0;
  const bg = parseFloat(state.budget) || 0;
  if (!nav || nav <= 0) return null;
  return ((ex + bg) / nav) * 100;
}

/* ==========================================================
 * SOP QUICK REFERENCE
 * ========================================================== */
const SOP = {
  leaps: `
    <h4>准备</h4>
    <ul>
      <li>Fear & Greed 至少达 Fear 底部 或 Extreme Fear，且大盘属于高位良性回调或超跌阶段性见底时激活</li>
      <li>大跌日绝不追进场；等止跌信号；剔除下跌中继与系统性熊市初期</li>
      <li>选 QQQ (熊市筑底期必配, 占 LEAPS 仓位 20-30%) 或 周线向上、基本面健康、高 Beta 强资产个股</li>
      <li>价格回落至 200MA / 250MA 或历史核心支撑附近, 基本面体检</li>
      <li>价格处于 1Y 和 180D Volume Profile 的 HVN 或 VAL 附近</li>
      <li>价格受重要波段低点引出的 Anchored VWAP 支撑</li>
      <li>明确交易预期: 波段 (Swing) 还是长期配置拿到新高</li>
      <li>风格分类:
        <ul>
          <li>股票替代: <code>Δ ≥ 70</code>, DTE 400+, DITM, 长持</li>
          <li>标准 Swing: <code>Δ ≥ 60</code>, DTE 400+, ITM/ATM, 短持</li>
          <li>激进 Swing: <code>Δ ≥ 40</code>, DTE 400+, ATM, 短持</li>
        </ul>
      </li>
    </ul>
    <h4>开仓 · 加仓信号类型</h4>
    <ul>
      <li>单标的 LEAPS 总成本 ≤ 15% 账户净值 (大蓝筹极限 30%)</li>
      <li><b>首笔 · 左侧衰竭:</b> MJ2 信号 + 左侧动能衰竭 (RSI≤30 或 RSI≤50 触及布林下轨且斜率放缓, 或底背离, MACD 红柱缩短)</li>
      <li><b>加仓 · 右侧确认:</b> 日线收复 5/10/20MA 之一, 或放量反包/吞没/锤头, 站稳 EMA21 或 SMA50 之上</li>
      <li><b>加仓 · MACD 金叉:</b> 日线 MACD 低位金叉确立 (滞后指标, 严禁作为第一买点)</li>
      <li>同一张 LEAPS 每周最多加 1-2 手, 需冷却</li>
      <li>加仓次数可以多次, 按信号类型触发, 不限于三次</li>
      <li>熊市筑底建仓: Δ 70-80, DTE 12-18 个月, 预留 50% 预算给后续 MACD 金叉阶段</li>
    </ul>
    <h4>关仓 / 减仓 / 止损</h4>
    <ul>
      <li>分批止盈: 100% / 150% / 200% 梯度 GTC, 向上趋势用移动止盈防卖飞</li>
      <li>暴利换约 (利润 ≥ 200%): 平仓 50% 锁利, 余仓移动止盈</li>
      <li>时间+浮亏止损: 仅当 DTE &lt; 9 个月 且 浮亏 ≥ 50%, 才考虑割肉/换约</li>
      <li>时间必须退出: DTE 剩 6 个月, 无条件平仓或滚动至更远 LEAPS</li>
      <li>趋势破坏止损: 跌破 200MA 且基本面恶化, 无条件仓位减半</li>
    </ul>
  `,
  csp: `
    <h4>准备</h4>
    <ul>
      <li>VIX 升 且 信用利差不升 时入场</li>
      <li>财报前后 3-5 天不新开仓</li>
      <li>IVP > 30%</li>
      <li>行权价设在 1Y 和 180D Volume Profile 的 HVN 下沿或下方</li>
      <li>找到多次测试的关键支撑位, 选在下方</li>
    </ul>
    <h4>开仓</h4>
    <ul>
      <li>DTE 建议 30-45 天 (非硬性, 根据 IV 和支撑位判断)</li>
      <li>选 OI 大的合约</li>
      <li>Delta: 一般 <code>≤ 25</code>, 不想被指派 <code>≤ 15</code>, 想接股 <code>≤ 30</code></li>
      <li>30 天 ROC ≥ 2-3%</li>
    </ul>
    <h4>关仓 / Roll</h4>
    <ul>
      <li>参考 50% / 21 Days, 自由发挥</li>
      <li>不过财报 (硬性禁令)</li>
    </ul>
  `,
  pmcc: `
    <h4>PMCC (Poor Man's Covered Call)</h4>
    <ul>

/* ==========================================================
 * VERDICT
 * ========================================================== */
function itemVerdict(item) {
  if (item.positionCheck) {
    const pct = positionUsedPct();
    if (pct == null) return 'pending';
    return pct <= positionCapPct() ? 'pass' : 'fail';
  }
  if (item.numeric) {
    const raw = state.items[item.id];
    // For optional numeric fields, empty = pass (not required)
    if ((raw === '' || raw == null) && item.numeric.optional) return 'pass';
    if (raw === '' || raw == null) return 'pending';
    const v = parseFloat(raw);
    if (isNaN(v)) return 'pending';
    const n = item.numeric;
    if (n.range) return (v >= n.range[0] && v <= n.range[1]) ? 'pass' : 'fail';
    if (n.min != null && v < n.min) return 'fail';
    if (n.max != null && v > n.max) return 'fail';
    return 'pass';
  }
  const s = state.items[item.id];
  return s === 'pass' || s === 'fail' ? s : 'pending';
}

function overallVerdict() {
  const items = currentItems();
  let pass = 0, fail = 0, pending = 0;
  for (const it of items) {
    const v = itemVerdict(it);
    if (v === 'pass') pass++;
    else if (v === 'fail') fail++;
    else pending++;
  }
  let status = 'PENDING';
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  if (fail > 0) status = 'BLOCKED';
  else if (pending === 0 && pass > 0) status = isClose ? 'CLEAR TO CLOSE' : 'CLEAR TO OPEN';
  return { status, pass, fail, pending, total: items.length };
}

function isProceedReady() {
  if (state.strategy === 'leaps') {
    if (!state.leapsDirection || !state.leapsStyle) return false;
    if (state.leapsDirection === 'open') return !!state.leapsPhase;
    if (state.leapsDirection === 'close') return !!state.leapsCloseType;
    return false;
  }
  if (state.strategy === 'csp') return !!state.cspIntent;
  if (state.strategy === 'pmcc') return !!state.pmccUnderlyingPurpose;
  return false;
}

function updateProceed() {
  const btn = document.getElementById('proceed-btn');
  if (!btn) return;
  const ready = isProceedReady();
  btn.disabled = !ready;
  btn.textContent = ready ? 'Continue →' : '先完成配置';
}

  });

  let configHTML = '';
  // Position sizing only shown for LEAPS open

    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    configHTML = `

          <div class="num-field"><label class="num-field-label">是否大蓝筹</label>
            <div class="segmented" id="bluechip-seg" style="margin-top: 0;">

            </div></div>
        </div>
        <div class="position-summary ${pctCls}" id="position-summary">
          <span class="position-summary-label">敞口 / NAV</span>
          <span class="position-summary-val ${pctCls}">${pctDisp} <span style="color:var(--text-faint); font-weight:400;"> / cap ${cap}%</span></span>
        </div>
      </div>
    `;
  }

  let checklistHTML = '';
  groups.forEach(g => {
    let count = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') count++; });
    checklistHTML += `
      <div class="group">
        <div class="group-header">
          <div class="group-title">${esc(g.name)}</div>
          <div class="group-count">${count} / ${g.items.length}</div>
        </div>
        <div class="items">${g.items.map(it => itemHTML(it)).join('')}</div>
      </div>
    `;
  });

  const v = overallVerdict();
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  const blockMsg = isClose
    ? '任一 block = 不关仓, 重新评估。'
    : '任一 block = 不开仓。';

  $app.innerHTML = `
    ${headerHTML()}
    ${statusBarHTML()}
    ${progressBarHTML()}
    ${qrefHTML()}
    ${configHTML}
    ${checklistHTML}
    <div class="footer">
      <button class="btn" onclick="clearItems()">Clear</button>
      <button class="btn primary" onclick="showSnapshot()">Snapshot</button>
      <button class="btn ghost" onclick="switchStrategy()">Switch</button>
    </div>
    <div class="disclaimer">
      Self-check only. Not investment advice.<br>
      ${blockMsg}
    </div>
  `;

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const bind = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', e => {
        state[key] = e.target.value;
        updateVerdictsInPlace();
      });
      el.addEventListener('blur', () => scheduleFullRender());
      el.addEventListener('focus', () => cancelFullRender());
    };
    bind('in-nav', 'nav');
    bind('in-ex', 'existingExposure');
    bind('in-bg', 'budget');
    const bcSeg = document.getElementById('bluechip-seg');
    if (bcSeg) {
      bcSeg.querySelector(`button[data-v="${state.leapsBluechip ? 'yes' : 'no'}"]`)?.classList.add('active');
      bcSeg.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => { state.leapsBluechip = b.dataset.v === 'yes'; render(); });
      });
    }
  }

  items.forEach(it => {
    if (it.positionCheck) return;
    if (it.numeric) {
      const el = document.getElementById(`num-${it.id}`);
      if (el) {
        el.addEventListener('input', e => {
          state.items[it.id] = e.target.value;
          updateVerdictsInPlace();
        });
        el.addEventListener('blur', () => scheduleFullRender());
        el.addEventListener('focus', () => cancelFullRender());
      }
    } else {
      const p = document.getElementById(`pass-${it.id}`);
      const f = document.getElementById(`fail-${it.id}`);
      if (p) p.addEventListener('click', () => { state.items[it.id] = state.items[it.id] === 'pass' ? null : 'pass'; render(); });
      if (f) f.addEventListener('click', () => { state.items[it.id] = state.items[it.id] === 'fail' ? null : 'fail'; render(); });
    }
  });
}

/* ==========================================================
 * PARTIAL UPDATES (no DOM rebuild — preserves input focus)
 * ========================================================== */
let __fullRenderTimer = null;
function scheduleFullRender(delay = 250) {
  cancelFullRender();
  __fullRenderTimer = setTimeout(() => {
    __fullRenderTimer = null;
    // Only re-render if no input is currently focused
    const ae = document.activeElement;
    if (!ae || ae.tagName !== 'INPUT') {
      render();
    }
  }, delay);
}
function cancelFullRender() {
  if (__fullRenderTimer) { clearTimeout(__fullRenderTimer); __fullRenderTimer = null; }
}

function updateVerdictsInPlace() {
  const items = currentItems();
  const v = overallVerdict();

  // Status bar main text
  const $statusMain = document.getElementById('status-main');
  if ($statusMain) {
    const cls = v.status.startsWith('CLEAR') ? 'pass' : v.status === 'BLOCKED' ? 'fail' : 'pending';
    $statusMain.className = 'status-main ' + cls;
    $statusMain.textContent = v.status;
  }

  // Progress bar
  const $progressBar = document.getElementById('progress-bar');
  if ($progressBar) {
    const total = v.total || 1;
    const passPct = (v.pass / total * 100).toFixed(1);
    const failPct = (v.fail / total * 100).toFixed(1);
    const $pass = $progressBar.querySelector('.progress-fill-pass');
    const $fail = $progressBar.querySelector('.progress-fill-fail');
    if ($pass) $pass.style.width = passPct + '%';
    if ($fail) $fail.style.width = failPct + '%';
  }

  // Tally counts
  const $tally = document.getElementById('status-tally');
  if ($tally) {
    $tally.innerHTML = `
      <span class="tally-item"><span class="tally-dot pass"></span> ${v.pass} pass</span>
      <span class="tally-item"><span class="tally-dot fail"></span> ${v.fail} block</span>
      <span class="tally-item"><span class="tally-dot pending"></span> ${v.pending} pending</span>
    `;
  }

  // Each item's class + numeric badge
  items.forEach(it => {
    const $item = document.getElementById(`item-${it.id}`);
    if (!$item) return;  // Item isn't in DOM yet (conditional, waiting for full re-render)
    const newV = itemVerdict(it);
    const hardCls = it.hard && newV === 'fail' ? ' hard-fail' : '';
    $item.className = 'item ' + newV + hardCls;

    if (it.numeric) {
      const $badge = document.getElementById(`badge-${it.id}`);
      if ($badge) {
        $badge.className = 'item-numeric-verdict ' + (newV === 'pass' || newV === 'fail' ? newV : '');
        $badge.textContent = newV === 'pass' ? 'PASS' : newV === 'fail' ? 'BLOCK' : '';
      }
    }
  });

  // Group counts (X / Y)
  const groupCounts = {};
  items.forEach(it => {
    if (!groupCounts[it.group]) groupCounts[it.group] = { pass: 0, total: 0 };
    groupCounts[it.group].total++;
    if (itemVerdict(it) === 'pass') groupCounts[it.group].pass++;
  });
  document.querySelectorAll('.group').forEach($grp => {
    const $title = $grp.querySelector('.group-title');
    const $count = $grp.querySelector('.group-count');
    if ($title && $count) {
      const name = $title.textContent;
      if (groupCounts[name]) {
        $count.textContent = `${groupCounts[name].pass} / ${groupCounts[name].total}`;
      }
    }
  });

  // Position summary (LEAPS open only)
  const $posSum = document.getElementById('position-summary');
  if ($posSum && state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    $posSum.className = 'position-summary ' + pctCls;
    const $val = $posSum.querySelector('.position-summary-val');
    if ($val) {
      $val.className = 'position-summary-val ' + pctCls;
      $val.innerHTML = `${pctDisp} <span style="color:var(--text-faint); font-weight:400;"> / cap ${cap}%</span>`;
    }
  }
}

function itemHTML(it) {
  const v = itemVerdict(it);
  const hardBadge = it.hard ? `<span class="hard-badge">Hard block</span>` : '';
  const hardClass = it.hard && v === 'fail' ? 'hard-fail' : '';

  if (it.numeric) {
    const val = state.items[it.id] ?? '';
    const n = it.numeric;
    let req = '';
    if (n.range) req = `Required: ${n.range[0]} – ${n.range[1]} ${n.unit || ''}`;
    else if (n.min != null) req = `Required: ${n.comparator} ${n.min}${n.unit ? ' ' + n.unit : ''}`;
    else if (n.max != null) req = `Required: ${n.comparator} ${n.max}${n.unit ? ' ' + n.unit : ''}`;
    if (n.optional) req += ' (可留空)';
    let verdictText = v === 'pass' ? `<span class="item-numeric-verdict pass" id="badge-${esc(it.id)}">PASS</span>` :
                      v === 'fail' ? `<span class="item-numeric-verdict fail" id="badge-${esc(it.id)}">BLOCK</span>` :
                      `<span class="item-numeric-verdict" id="badge-${esc(it.id)}"></span>`;
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
          </div>
        </div>
        <div class="item-numeric">
          <input class="item-numeric-input" id="num-${esc(it.id)}" type="text" inputmode="decimal" autocomplete="off" autocorrect="off"
                 placeholder="${esc(n.placeholder || '')}" value="${esc(val)}">
          <span class="item-numeric-req">${esc(req)}</span>
          ${verdictText}
        </div>
      </div>
    `;
  }
  if (it.positionCheck) {
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)} <em style="color:var(--text-faint);">— 由上方仓位输入自动判定</em></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }
  const s = state.items[it.id];
  return `
    <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
      <div class="item-head">
        <div class="item-text">
          <div class="item-title">${esc(it.title)} ${hardBadge}</div>
          ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
        </div>
        <div class="item-buttons">
          <button class="item-btn pass-btn ${s === 'pass' ? 'on' : ''}" id="pass-${esc(it.id)}" title="Pass">✓</button>
          <button class="item-btn fail-btn ${s === 'fail' ? 'on' : ''}" id="fail-${esc(it.id)}" title="Block">✕</button>
        </div>
      </div>
    </div>
  `;
}

/* ==========================================================
 * ACTIONS
 * ========================================================== */
function pickStrategy(s) {
  state.strategy = s;
  state.items = {};
  render();
}
function switchStrategy() {
  if (Object.keys(state.items).length > 0 && !confirm('切换策略会清除当前所有勾选，确定?')) return;
  resetAll(true);
}
function resetAll(silent) {
  if (!silent && !confirm('清空所有输入和勾选?')) return;
  state.strategy = null;
  state.leapsDirection = null;
  state.leapsPhase = null; state.leapsStyle = null; state.leapsBluechip = false;
  state.leapsCloseType = null;
  state.nav = ''; state.existingExposure = ''; state.budget = '';
  state.cspIntent = null;
  state.pmccUnderlyingPurpose = null; state.pmccMode = 'standard';
  state.items = {};
  render();
}
function clearItems() {
  if (!confirm('清空所有勾选 (保留策略配置和仓位输入)?')) return;
  state.items = {};
  render();
}

/* ==========================================================
 * PROGRESS BAR
 * ========================================================== */
function progressBarHTML() {
  const v = overallVerdict();
  const total = v.total || 1;
  const passPct = (v.pass / total * 100).toFixed(1);
  const failPct = (v.fail / total * 100).toFixed(1);
  return `<div class="progress-bar" id="progress-bar">
    <div class="progress-fill-pass" style="width: ${passPct}%"></div>
    <div class="progress-fill-fail" style="width: ${failPct}%"></div>
  </div>`;
}

/* ==========================================================
 * SNAPSHOT · TEXT + CSV EXPORT
 * ========================================================== */
function nowStamp() {
  const now = new Date();
  try {
    return now.toLocaleString('en-US', {
      timeZone: 'America/New_York',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).replace(',', '') + ' ET';
  } catch (e) {
    return now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  }
}

function buildTextSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const lines = [];
  lines.push('── Pre-Trade Snapshot ──');
  lines.push(`Time:     ${nowStamp()}`);
  lines.push(`Strategy: ${STRAT_LABEL[state.strategy]} · ${subtypeString()}`);
  lines.push(`Verdict:  ${v.status}`);
  lines.push(`Tally:    ${v.pass} pass · ${v.fail} block · ${v.pending} pending`);
  lines.push('');

  const groups = [];
  const seen = {};
  items.forEach(it => {
    if (!seen[it.group]) { seen[it.group] = []; groups.push({ name: it.group, items: seen[it.group] }); }
    seen[it.group].push(it);
  });
  groups.forEach(g => {
    let passCount = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') passCount++; });
    lines.push(`[${g.name}]  ${passCount}/${g.items.length}`);
    g.items.forEach(it => {
      const iv = itemVerdict(it);
      const symbol = iv === 'pass' ? '✓' : iv === 'fail' ? '✗' : '□';
      const hard = it.hard ? ' [HARD]' : '';
      let valStr = '';
      if (it.numeric) {
        const rawVal = state.items[it.id];
        if (rawVal !== '' && rawVal != null) valStr = ` = ${rawVal}`;
      }
      lines.push(`  ${symbol} ${it.title}${hard}${valStr}`);
    });
    lines.push('');
  });

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    lines.push('[Position]');
    lines.push(`  NAV $${state.nav || '—'}  ·  Existing $${state.existingExposure || '0'}  ·  Budget $${state.budget || '—'}`);
    if (pctVal != null) lines.push(`  Combined LEAPS: ${pctVal.toFixed(1)}% / cap ${cap}%`);
    lines.push('');
  }

  lines.push('──────────────────────');
  return lines.join('\n');
}

function csvCell(s) {
  const str = String(s == null ? '' : s);
  if (/[,"\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
  return str;
}

function buildCSVSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const rows = [
    ['Group', 'Item', 'Status', 'Value', 'Required', 'Hard'],
    ['_META', 'Time', nowStamp(), '', '', ''],
    ['_META', 'Strategy', STRAT_LABEL[state.strategy] + ' · ' + subtypeString(), '', '', ''],
    ['_META', 'Verdict', v.status, '', '', ''],
    ['_META', 'Tally', `${v.pass} pass / ${v.fail} block / ${v.pending} pending`, '', '', ''],
  ];
  items.forEach(it => {
    const iv = itemVerdict(it);
    const status = iv.toUpperCase();
    let val = '';
    let req = '';
    if (it.numeric) {
      val = state.items[it.id] || '';
      const n = it.numeric;
      if (n.range) req = `${n.range[0]}-${n.range[1]} ${n.unit || ''}`;
      else if (n.min != null) req = `${n.comparator} ${n.min}${n.unit ? ' ' + n.unit : ''}`;
      else if (n.max != null) req = `${n.comparator} ${n.max}${n.unit ? ' ' + n.unit : ''}`;
    }
    rows.push([it.group, it.title, status, val, req, it.hard ? 'Yes' : '']);
  });
  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    rows.push(['_META', 'NAV', state.nav || '', '', '', '']);
    rows.push(['_META', 'Existing exposure', state.existingExposure || '', '', '', '']);
    rows.push(['_META', 'Budget', state.budget || '', '', '', '']);
    const pctVal = positionUsedPct();
    if (pctVal != null) rows.push(['_META', 'Combined LEAPS %', pctVal.toFixed(1) + '%', '', `cap ${positionCapPct()}%`, '']);
  }
  return rows.map(row => row.map(csvCell).join(',')).join('\n');
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

function downloadFile(filename, mime, content) {
  try {
    const blob = new Blob(['\ufeff' + content], { type: mime + ';charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return true;
  } catch (e) {
    try {
      const dataUrl = 'data:' + mime + ';charset=utf-8,' + encodeURIComponent(content);
      window.open(dataUrl, '_blank');
      return true;
    } catch (e2) { return false; }
  }
}

function ensureSnapshotModal() {
  if (document.getElementById('snapshot-modal')) return;
  const modal = document.createElement('div');
  modal.id = 'snapshot-modal';
  modal.className = 'modal-overlay';
  modal.style.display = 'none';
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Snapshot</div>
        <button class="modal-close" onclick="hideSnapshot()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <textarea class="modal-preview" id="snapshot-preview" readonly></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="hideSnapshot()">关闭</button>
        <button class="btn" id="snap-download">下载 CSV</button>
        <button class="btn primary" id="snap-copy">复制文本</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) hideSnapshot(); });
  document.getElementById('snap-copy').addEventListener('click', async e => {
    const btn = e.currentTarget;
    const ok = await copyToClipboard(buildTextSnapshot());
    const original = btn.textContent;
    btn.textContent = ok ? '✓ 已复制' : '复制失败';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
  document.getElementById('snap-download').addEventListener('click', e => {
    const btn = e.currentTarget;
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    const strat = (state.strategy || 'check').toUpperCase();
    const filename = `checklist-${strat}-${stamp}.csv`;
    const ok = downloadFile(filename, 'text/csv', buildCSVSnapshot());
    const original = btn.textContent;
    btn.textContent = ok ? '✓ 已下载' : '下载失败';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function showSnapshot() {
  if (!state.strategy) return;
  ensureSnapshotModal();
  document.getElementById('snapshot-preview').value = buildTextSnapshot();
  document.getElementById('snapshot-modal').style.display = 'flex';
}
function hideSnapshot() {
  const m = document.getElementById('snapshot-modal');
  if (m) m.style.display = 'none';
}

/* ==========================================================
 * THEME
 * ========================================================== */
function setTheme(t) {
  state.theme = t;
  document.body.className = 'theme-' + t;
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', t === 'terminal' ? '#000000' : '#0F1419');
  try { localStorage.setItem('pretrade_theme', t); } catch (e) {}
}
function cycleTheme() {
  setTheme(state.theme === 'slate' ? 'terminal' : 'slate');
  render();
}
function loadTheme() {
  try {
    const saved = localStorage.getItem('pretrade_theme');
    if (saved === 'terminal' || saved === 'slate') state.theme = saved;
  } catch (e) {}
  setTheme(state.theme);
}

/* Expose */
window.pickStrategy = pickStrategy;
window.switchStrategy = switchStrategy;
window.resetAll = resetAll;
window.clearItems = clearItems;
window.toggleQref = toggleQref;
window.cycleTheme = cycleTheme;
window.showSnapshot = showSnapshot;
window.hideSnapshot = hideSnapshot;

/* Boot */
loadTheme();
render();

</script>
