<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pre-Trade">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1419">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230F1419'/><path d='M50 90 L80 120 L135 60' stroke='%233FB950' stroke-width='18' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230F1419'/><path d='M50 90 L80 120 L135 60' stroke='%233FB950' stroke-width='18' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<title>Pre-Trade Checklist</title>
<!--
  PRE-TRADE CHECKLIST · LEAPS / CSP / PMCC self-check
  Single-file, offline, no external deps, no storage.

  HOW TO MODIFY:
    Colors            -> CSS :root variables (top of <style>)
    Delta thresholds  -> JS  leapsDeltaMin() / cspDeltaMax() / pmccDeltaMax()
    Position cap %    -> JS  positionCapPct()
    Add checklist item-> Push to leapsItems() / cspItems() / pmccItems()
    Edit SOP text     -> const SOP object
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  body.theme-slate {
    --bg: #0F1419; --panel: #171C22; --panel-2: #1E252D;
    --border: #2A323C; --border-hi: #3A4552;
    --text: #E6E8EB; --text-dim: #A0AAB6; --text-faint: #7A8590;
    --pass: #3FB950; --pass-bg: rgba(63, 185, 80, 0.10);
    --fail: #F85149; --fail-bg: rgba(248, 81, 73, 0.10);
    --pending: #D29922; --pending-bg: rgba(210, 153, 34, 0.08);
    --accent: #58A6FF;
  }
  body.theme-terminal {
    --bg: #000000; --panel: #0A0F0A; --panel-2: #101810;
    --border: #1A2E1A; --border-hi: #2E5E2E;
    --text: #E0F5E0; --text-dim: #8FBF8F; --text-faint: #567856;
    --pass: #00FF66; --pass-bg: rgba(0, 255, 102, 0.10);
    --fail: #FF4444; --fail-bg: rgba(255, 68, 68, 0.10);
    --pending: #F0C000; --pending-bg: rgba(240, 192, 0, 0.10);
    --accent: #00CC66;
  }
  body.theme-light {
    --bg: #F9FAFB; --panel: #FFFFFF; --panel-2: #F3F4F6;
    --border: #E5E7EB; --border-hi: #D1D5DB;
    --text: #111827; --text-dim: #6B7280; --text-faint: #7A8590;
    --pass: #059669; --pass-bg: rgba(5, 150, 105, 0.08);
    --fail: #DC2626; --fail-bg: rgba(220, 38, 38, 0.08);
    --pending: #D97706; --pending-bg: rgba(217, 119, 6, 0.08);
    --accent: #2563EB;
  }
  body.theme-warm {
    --bg: #FBF6E9; --panel: #F5EEDA; --panel-2: #EDE5CC;
    --border: #D8CDB0; --border-hi: #B8AA88;
    --text: #3D3020; --text-dim: #6E5B45; --text-faint: #9C8B75;
    --pass: #556B2F; --pass-bg: rgba(85, 107, 47, 0.10);
    --fail: #B22222; --fail-bg: rgba(178, 34, 34, 0.08);
    --pending: #B8860B; --pending-bg: rgba(184, 134, 11, 0.10);
    --accent: #A0522D;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.55; min-height: 100vh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-variant-numeric: tabular-nums; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 780px; margin: 0 auto; padding: 16px 16px 48px; }

  .status-bar { position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 12px 0 16px; border-bottom: 1px solid var(--border); margin: 0 -16px 16px; padding-left: 16px; padding-right: 16px; }
  .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .status-main { font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  @media (min-width: 640px) { .status-main { font-size: 34px; } }
  .status-main.pending { color: var(--pending); }
  .status-main.pass { color: var(--pass); }
  .status-main.pass-soft { color: var(--pass); opacity: 0.75; }
  .status-main.fail { color: var(--fail); }
  .status-meta { font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; line-height: 1.4; }
  .status-meta strong { color: var(--text-dim); font-weight: 500; }
  .status-tally { display: flex; gap: 12px; margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
  .tally-item { display: inline-flex; align-items: center; gap: 5px; }
  .tally-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .tally-dot.pass { background: var(--pass); }
  .tally-dot.fail { background: var(--fail); }
  .tally-dot.pending { background: var(--pending); }
  .status-note { margin-top: 8px; font-family: var(--sans); font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

  .bottom-summary { margin: 24px 0 12px; padding: 14px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
  .bottom-status-main { font-family: var(--mono); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .bottom-status-main.pending { color: var(--pending); }
  .bottom-status-main.pass { color: var(--pass); }
  .bottom-status-main.pass-soft { color: var(--pass); opacity: 0.75; }
  .bottom-status-main.fail { color: var(--fail); }
  .bottom-status-note { margin-top: 6px; font-family: var(--sans); font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

  .picker-panel { margin: 12px 0 16px; padding: 12px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
  .picker-panel-head { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .picker-panel-count { color: var(--text-dim); }
  .picker-panel-list { display: flex; flex-direction: column; gap: 8px; }

  .open-pos-row { display: grid; grid-template-columns: 60px 1fr auto; gap: 8px; align-items: center; padding: 6px 0; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .open-pos-row:last-child { border-bottom: none; }
  .open-pos-row:hover { color: var(--accent); }
  .open-pos-ticker { font-family: var(--mono); font-weight: 600; color: var(--accent); }
  .open-pos-strategy { color: var(--text-dim); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .open-pos-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  .loss-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .loss-row:last-child { border-bottom: none; }
  .loss-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; font-size: 12.5px; }
  .loss-ticker { font-family: var(--mono); font-weight: 600; color: var(--fail); }
  .loss-strategy { color: var(--text-dim); font-size: 12px; flex: 1; }
  .loss-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .loss-notes { font-size: 12px; color: var(--text-dim); font-style: italic; line-height: 1.5; padding-left: 8px; border-left: 2px solid var(--fail); margin-top: 3px; }
  .loss-notes-empty { font-size: 11.5px; color: var(--text-faint); font-style: italic; padding-left: 8px; }

  .override-row { padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .override-row:last-child { border-bottom: none; }
  .override-row:hover { color: var(--accent); }
  .override-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; font-size: 12.5px; }
  .override-ticker { font-family: var(--mono); font-weight: 600; color: var(--pending); }
  .override-strategy { color: var(--text-dim); font-size: 12px; flex: 1; }
  .override-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .override-notes { font-size: 12px; color: var(--text-dim); font-style: italic; line-height: 1.5; padding-left: 8px; border-left: 2px solid var(--pending); margin-top: 3px; }
  .override-notes-empty { font-size: 11.5px; color: var(--text-faint); font-style: italic; padding-left: 8px; }

  .edit-warning { background: var(--pending-bg); color: var(--pending); padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; line-height: 1.5; border: 1px solid var(--pending); border-color: rgba(255, 176, 32, 0.4); }
  .edit-status-section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 20px; }
  .edit-section-header { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); letter-spacing: 0.12em; text-transform: uppercase; margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .edit-group { margin-bottom: 16px; }
  .edit-group-title { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
  .edit-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .edit-item:last-child { border-bottom: none; }
  .edit-item-title { font-size: 12.5px; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .edit-item-hard { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 700; color: var(--fail); background: var(--fail-bg); padding: 1px 5px; border-radius: 3px; letter-spacing: 0.06em; margin-left: 4px; vertical-align: middle; }
  .edit-item-desc { font-size: 11px; color: var(--text-faint); line-height: 1.5; margin-bottom: 6px; }
  .edit-item-input-row { display: flex; align-items: center; gap: 6px; }
  .edit-item-input { flex: 1; font-family: var(--mono); font-size: 13px; padding: 6px 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; -webkit-appearance: none; appearance: none; }
  .edit-item-input:focus { outline: none; border-color: var(--accent); }
  .edit-item-unit { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .edit-item-seg { display: flex; gap: 4px; }
  .edit-item-seg button { flex: 1; font-family: var(--mono); font-size: 11.5px; padding: 5px 6px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; -webkit-appearance: none; appearance: none; }
  .edit-item-seg button.active { background: var(--accent); color: #0F1419; border-color: var(--accent); }
  .edit-position-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .edit-position-grid { grid-template-columns: 1fr; } }

  .explore-filters { display: grid; grid-template-columns: 1fr auto auto auto; gap: 6px; margin-bottom: 10px; }
  @media (max-width: 480px) { .explore-filters { grid-template-columns: 1fr 1fr; } }
  .explore-filters input, .explore-filters select { font-family: var(--sans); font-size: 13px; padding: 6px 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; -webkit-appearance: none; appearance: none; }
  .explore-filters input:focus, .explore-filters select:focus { outline: none; border-color: var(--accent); }
  .explore-summary { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); padding: 4px 0 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .explore-list { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; }
  .explore-row { display: grid; grid-template-columns: 70px 60px 1fr auto auto; gap: 6px; align-items: center; padding: 5px 6px; font-size: 12px; cursor: pointer; border-radius: 4px; }
  .explore-row:hover { background: var(--bg); }
  .explore-row-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .explore-row-ticker { font-family: var(--mono); font-weight: 600; color: var(--accent); }
  .explore-row-strategy { color: var(--text-dim); font-size: 11.5px; }
  .explore-row-verdict { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.05em; padding: 1px 4px; border-radius: 3px; }
  .explore-row-verdict.pass { color: var(--pass); background: var(--pass-bg); }
  .explore-row-verdict.fail { color: var(--fail); background: var(--fail-bg); }
  .explore-row-verdict.pending { color: var(--pending); background: var(--pending-bg); }
  .explore-empty { text-align: center; padding: 20px 10px; font-size: 12.5px; color: var(--text-faint); font-style: italic; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
  .brand { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-family: var(--sans); font-size: 13px; padding: 8px 14px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.12s ease; min-height: 36px; -webkit-appearance: none; appearance: none; }
  .btn:hover { border-color: var(--border-hi); color: var(--text); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); color: #0F1419; border-color: var(--accent); font-weight: 600; }
  .btn.primary:disabled { background: var(--panel); color: var(--text-faint); border-color: var(--border); cursor: not-allowed; font-weight: 400; }
  .btn.ghost { color: var(--text-faint); }
  .btn.big { padding: 12px 18px; font-size: 15px; min-height: 44px; }

  .theme-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 10px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; min-height: 36px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.12s ease; -webkit-appearance: none; appearance: none; }
  .theme-btn:hover { border-color: var(--border-hi); color: var(--text); }
  .theme-btn:active { transform: scale(0.98); }
  .theme-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); display: block; flex-shrink: 0; }

  .picker { padding: 32px 0 40px; }
  .picker-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em; }
  .picker-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
  .picker-choices { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 720px) { .picker-choices { grid-template-columns: 1fr 1fr 1fr; } }
  .picker-card { background: var(--panel); border: 1px solid var(--border); padding: 20px 18px; border-radius: 10px; cursor: pointer; text-align: left; color: var(--text); font-family: var(--sans); transition: all 0.15s ease; -webkit-appearance: none; appearance: none; }
  .picker-card:hover { border-color: var(--accent); background: var(--panel-2); }
  .picker-card:active { transform: scale(0.99); }
  .picker-card-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .picker-card-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .picker-card-desc { color: var(--text-dim); font-size: 13px; line-height: 1.5; }

  .config { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .config-title { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 12px; }
  .segmented { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 3px; gap: 3px; flex-wrap: wrap; }
  .segmented button { flex: 1; min-width: 0; padding: 8px 6px; background: transparent; color: var(--text-dim); border: 0; border-radius: 5px; font-family: var(--sans); font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.12s ease; -webkit-appearance: none; appearance: none; min-height: 36px; white-space: nowrap; }
  .segmented button.active { background: var(--panel-2); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-hi); }

  .num-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .num-field { display: flex; flex-direction: column; }
  .num-field-label { font-size: 11.5px; color: var(--text-faint); margin-bottom: 5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .num-field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-family: var(--mono); font-size: 14px; outline: none; transition: border-color 0.12s; -webkit-appearance: none; appearance: none; width: 100%; }
  .num-field input:focus { border-color: var(--accent); }
  .num-field input::placeholder { color: var(--text-faint); }

  .position-summary { margin-top: 10px; padding: 10px 12px; background: var(--bg); border-radius: 6px; font-family: var(--mono); font-size: 12.5px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--border); }
  .position-summary.pass { border-left-color: var(--pass); }
  .position-summary.fail { border-left-color: var(--fail); }
  .position-summary-label { color: var(--text-dim); }
  .position-summary-val { color: var(--text); font-weight: 600; }
  .position-summary-val.fail { color: var(--fail); }
  .position-summary-val.pass { color: var(--pass); }

  .qref { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .qref-head { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); -webkit-user-select: none; user-select: none; }
  .qref-head:hover { color: var(--text); }
  .qref-arrow { font-family: var(--mono); color: var(--text-faint); transition: transform 0.15s; display: inline-block; }
  .qref.open .qref-arrow { transform: rotate(90deg); }
  .qref-body { display: none; padding: 4px 14px 14px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-dim); line-height: 1.65; }
  .qref.open .qref-body { display: block; }
  .qref-body h4 { color: var(--text); font-size: 13.5px; margin: 12px 0 6px; font-weight: 600; letter-spacing: 0.02em; }
  .qref-body h4:first-child { margin-top: 6px; }
  .qref-body ul { margin: 0 0 6px 18px; padding: 0; }
  .qref-body li { margin-bottom: 4px; }
  .qref-body code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 3px; color: var(--text); }

  .group { margin-bottom: 18px; }
  .group-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
  .group-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; }
  .group-count { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .items { display: flex; flex-direction: column; gap: 8px; }
  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s, background 0.15s; border-left-width: 3px; }
  .item.pass { border-left-color: var(--pass); background: linear-gradient(90deg, var(--pass-bg) 0%, var(--panel) 45%); }
  .item.fail { border-left-color: var(--fail); background: linear-gradient(90deg, var(--fail-bg) 0%, var(--panel) 45%); }
  .item.pending { border-left-color: var(--border); }
  .item.hard-fail { background: linear-gradient(90deg, var(--fail-bg) 0%, var(--panel) 60%); }

  .item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .item-text { flex: 1; min-width: 0; }
  .item-title { font-size: 15.5px; font-weight: 600; color: var(--text); line-height: 1.4; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .hard-badge { font-family: var(--mono); font-size: 9.5px; color: var(--fail); background: var(--fail-bg); padding: 2px 6px; border-radius: 3px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; border: 1px solid rgba(248, 81, 73, 0.25); }
  .item-desc { font-size: 13.5px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .item-buttons { display: flex; gap: 6px; flex-shrink: 0; }

// LEAPS Delta config by style:
//   股票替代 (≥ 75): DITM 底仓, 长持, 少受 IV 影响
//   Balanced (50-74): 中杠杆, 类股加杠杆, 灵活持期
//   Swing 杠杆 (35-49): 高杠杆 swing, ATM 附近, 短持
function leapsDeltaSpec() {
  if (state.leapsStyle === 'stock_sub') {
    return {
      title: 'Delta ≥ 75',
      numeric: { placeholder: 'Delta', unit: '', min: 75, comparator: '≥' },
      desc: '≥ 75 (=0.75+). DITM 股票替代, 长持, 内在价值主导, 少受 IV crush 影响。'
    };
  }
  if (state.leapsStyle === 'balanced') {
    return {
      title: 'Delta 50-74',
      numeric: { placeholder: 'Delta', unit: '', range: [50, 74] },
      desc: '50-74 (=0.50-0.74). 类股加杠杆, 灵活持期。介于股票替代与 Swing 之间, 时间价值与内在价值兼顾。'
    };
  }
  if (state.leapsStyle === 'swing') {
    return {
      title: 'Delta 35-49',
      numeric: { placeholder: 'Delta', unit: '', range: [35, 49] },
      desc: '35-49 (=0.35-0.49). 高杠杆 swing, ATM 附近, 短持, theta 大。'
    };
  }
  return null;
}
function cspDeltaMax() { return { assign: 30, neutral: 25, premium: 15 }[state.cspIntent] || null; }
function pmccDeltaMax() { return { standard: 15, defensive: 10 }[state.pmccMode] || null; }
function pmccKdjMin() {
  // J threshold based on underlying LEAPS type (底仓珍贵 → 门槛越严)
  //   股票替代 (Δ≥75, 底仓珍贵): 85 — assign 走底仓代价大, 需极端超买
  //   Balanced (Δ 50-74): 78 — 中位
  //   Swing 杠杆 (Δ 35-49): 70 — 底仓短期, 门槛可放宽
  return { stock_sub: 85, balanced: 78, swing: 70 }[state.pmccUnderlyingPurpose] || null;
}
function positionCapPct() {
  // Style-aware cap:
  //   股票替代 (Δ≥75, 低杠杆, 长持): QQQ 30% · 非蓝筹 15%
  //   Balanced (Δ 50-74, 中杠杆): QQQ 20% · 非蓝筹 10%
  //   Swing 杠杆 (Δ 35-49, 高杠杆, 短持): QQQ 10% · 非蓝筹 5%
  const isBluechip = state.leapsBluechip;
  const style = state.leapsStyle;
  if (style === 'swing') return isBluechip ? 10 : 5;
  if (style === 'balanced') return isBluechip ? 20 : 10;
  return isBluechip ? 30 : 15;
}
function positionUsedPct() {
  const nav = parseFloat(state.nav);
  const ex = parseFloat(state.existingExposure) || 0;
  const bg = parseFloat(state.budget) || 0;
  if (!nav || nav <= 0) return null;
  return ((ex + bg) / nav) * 100;
}

/* ==========================================================
 * R:R (Risk : Reward) auto-computation for LEAPS
 * ========================================================== */
function rrThreshold() {
  // Thresholds per style:
  //   股票替代 (Δ≥75): 1.5 — 长持 + Delta 高 → 门槛可低
  //   Balanced (Δ 50-74): 1.75 — 中间
  //   Swing 杠杆 (Δ 35-49): 2.0 — 高杠杆 + theta 大 → 门槛需高
  const t = { stock_sub: 1.5, balanced: 1.75, swing: 2 }[state.leapsStyle];
  return t || 2;
}
function computeRR() {
  const entry = parseFloat(state.items['entry_price']);
  const stop = parseFloat(state.items['stop_level']);
  const target = parseFloat(state.items['target_level']);
  if (!entry || !stop || !target || entry <= 0 || stop <= 0 || target <= 0) return null;
  if (stop >= entry) return { error: '止损必须 < 当前价' };
  if (target <= entry) return { error: '止盈必须 > 当前价' };
  const downsideDollar = entry - stop;
  const upsideDollar = target - entry;
  const downsidePct = downsideDollar / entry * 100;
  const upsidePct = upsideDollar / entry * 100;
  const rr = upsideDollar / downsideDollar;
  return { downsidePct, upsidePct, rr, downsideDollar, upsideDollar, entry, stop, target };
}
function rrCheckVerdict() {
  const rr = computeRR();
  if (!rr) return 'pending';
  if (rr.error) return 'fail';
  const thresh = rrThreshold();
  if (rr.rr >= thresh) return 'pass';
  if (rr.rr >= thresh - 0.5) return 'pending';  // pending zone: 0.5 below threshold
  return 'fail';
}
function rrCheckDesc() {
  const thresh = rrThreshold();
  const styleReason = {
    stock_sub: '长持 + Δ 高 → 门槛可低',
    balanced: '中杠杆 → 中位门槛',
    swing: '高杠杆 + theta 大 → 门槛需高',
  }[state.leapsStyle] || '';
  const rr = computeRR();
  if (!rr) return `${LEAPS_STYLE_LABEL[state.leapsStyle] || ''}: 门槛 R:R ≥ ${thresh} : 1  (${styleReason})。填入三个价位自动计算。`;
  if (rr.error) return `⚠ ${rr.error}`;
  const rating = rr.rr >= thresh ? '✓ 好' : rr.rr >= thresh - 0.5 ? '~ 可接受' : '✗ 不足, 慎重';
  return `下跌 -${rr.downsidePct.toFixed(1)}% ($${rr.downsideDollar.toFixed(2)})  ·  上涨 +${rr.upsidePct.toFixed(1)}% ($${rr.upsideDollar.toFixed(2)})  ·  R:R = ${rr.rr.toFixed(2)} : 1  · ${rating}`;
}

/* ==========================================================
 * VERDICT
 * ========================================================== */
function itemVerdict(item) {
  // R:R computed item
  if (item.id === 'rr_check') return rrCheckVerdict();

  if (item.positionCheck) {
    const pct = positionUsedPct();
    if (pct == null) return 'pending';
    return pct <= positionCapPct() ? 'pass' : 'fail';
  }
  if (item.numeric) {
    const raw = state.items[item.id];
    // Price fields have cross-validation but no threshold
    if (item.numeric.priceField) {
      if (raw === '' || raw == null) return 'pending';
      const v = parseFloat(raw);
      if (isNaN(v) || v <= 0) return 'pending';
      const entry = parseFloat(state.items['entry_price']);
      if (item.id === 'stop_level' && entry && v >= entry) return 'fail';
      if (item.id === 'target_level' && entry && v <= entry) return 'fail';
      return 'pass';
    }
    // For optional numeric fields, empty = pass (not required)
    if ((raw === '' || raw == null) && item.numeric.optional) return 'pass';
    if (raw === '' || raw == null) return 'pending';
    const v = parseFloat(raw);
    if (isNaN(v)) return 'pending';
    const n = item.numeric;
    if (n.range) return (v >= n.range[0] && v <= n.range[1]) ? 'pass' : 'fail';
    if (n.min != null && v < n.min) return 'fail';
    if (n.max != null && v > n.max) return 'fail';
    return 'pass';
  }
  const s = state.items[item.id];
  return s === 'pass' || s === 'fail' ? s : 'pending';
}

function overallVerdict() {
  const items = currentItems();
  let pass = 0, fail = 0, pending = 0, hardFail = 0;
  for (const it of items) {
    const v = itemVerdict(it);
    if (v === 'pass') pass++;
    else if (v === 'fail') {
      fail++;
      if (it.hard) hardFail++;
    }
    else pending++;
  }
  const softFail = fail - hardFail;
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  const clearLabel = isClose ? 'CLEAR TO CLOSE' : 'CLEAR TO OPEN';

  let status, note;
  if (hardFail > 0) {
    status = 'BLOCKED';
    note = `${hardFail} HARD 阻断, 拒绝执行`;
  } else if (pass === 0) {
    // Nothing filled yet
    status = 'PENDING';
    note = `${pending} 项未填, 请填 checklist`;
  } else if (softFail === 0 && pending === 0) {
    status = clearLabel;
    note = '全部达标, 执行';
  } else if (softFail <= 2) {
    // ≤ 2 soft fails → 可软执行 (pending 数量在 note 里提醒, 不影响判决)
    status = clearLabel + ' · 软执行';
    const parts = [];
    if (softFail > 0) parts.push(`${softFail} soft 未达标`);
    if (pending > 0) parts.push(`${pending} 项未填`);
    note = `可软执行 (${parts.join(', ')}), 由你自己判断补齐或跳过`;
  } else {
    status = 'PENDING';
    note = `${softFail} soft 未达标 (超过 2)${pending > 0 ? ` + ${pending} 项未填` : ''}, 建议再确认`;
  }

  return { status, pass, fail, pending, hardFail, softFail, combined: softFail + pending, note, total: items.length };
}

function formatTimeAgo(ts) {
  const secs = Math.round((Date.now() - ts) / 1000);
  if (secs < 60) return '刚才';
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins} 分`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours} 时`;
  const days = Math.round(hours / 24);
  if (days < 30) return `${days} 天`;
  return `${Math.round(days / 30)} 月`;
}

  const years = [...new Set(history.map(e => {
    // Parse year from timestamp string (e.g. "2026-07-06 09:15 ET") or timestampSort
    if (e.timestamp && e.timestamp.length >= 4) return e.timestamp.slice(0, 4);
    if (e.timestampSort) return new Date(e.timestampSort).getFullYear().toString();
    return null;
  }).filter(Boolean))].sort().reverse();

  // Explore panel
  const exploreHTML = `
    <div class="picker-panel explore-panel">
      <div class="picker-panel-head">
        <span>Explore · 搜索历史</span>
      </div>
      <div class="explore-filters">
        <input type="text" id="explore-ticker" placeholder="Ticker (e.g. MSFT)" autocomplete="off" spellcheck="false" oninput="updateExploreResults()">
        <select id="explore-year" onchange="updateExploreResults()">
          <option value="">年份</option>
          ${years.map(y => `<option value="${y}">${y}</option>`).join('')}
        </select>
        <select id="explore-strategy" onchange="updateExploreResults()">
          <option value="">策略</option>
          <option value="LEAPS">LEAPS</option>
          <option value="CSP">CSP</option>
          <option value="PMCC">PMCC</option>
        </select>
        <select id="explore-outcome" onchange="updateExploreResults()">
          <option value="">状态</option>
          <option value="skipped">未交易</option>
          <option value="opted_out">自主放弃</option>
          <option value="open">持仓</option>
          <option value="win">盈</option>
          <option value="loss">亏</option>
        </select>
      </div>
      <div id="explore-results"><div class="explore-empty">输入 ticker 或选筛选查看历史</div></div>
    </div>
  `;

  // Recent 3 snapshots
  const recent = history.slice(0, 3);
  const recentHTML = recent.map(e => {
    const cls = e.verdict.startsWith('CLEAR') ? 'pass' : e.verdict === 'BLOCKED' ? 'fail' : 'pending';
    const verdictShort = e.verdict.startsWith('CLEAR') ? 'CLEAR' : e.verdict === 'BLOCKED' ? 'BLOCK' : 'PEND';
    const timeAgo = formatTimeAgo(e.timestampSort);
    const tickerCls = e.ticker ? '' : ' no-ticker';
    const tickerDisp = e.ticker || '—';
    return `
      <div class="picker-recent-row">
        <div class="picker-recent-ticker${tickerCls}">${esc(tickerDisp)}</div>
        <div class="picker-recent-title">${esc(e.strategy)} · ${esc(e.subtype)}</div>
        <div class="picker-recent-verdict ${cls}">${verdictShort}</div>
        <div class="picker-recent-time">${timeAgo}</div>
      </div>
    `;
  }).join('');

  // Stats: last 7 days
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  const weekAgo = Date.now() - weekMs;
  const weekEntries = history.filter(e => e.timestampSort >= weekAgo);
  const weekTotal = weekEntries.length;
  const weekClear = weekEntries.filter(e => e.verdict.startsWith('CLEAR')).length;
  const weekBlocked = weekEntries.filter(e => e.verdict === 'BLOCKED').length;
  const clearRate = weekTotal > 0 ? Math.round(weekClear / weekTotal * 100) : 0;

  return `
    ${openHTML}
    ${overridesHTML}
    ${lossesHTML}
    ${exploreHTML}
    <div class="picker-recent">
      <div class="picker-recent-head">
        <span>Recent</span>
        <span class="picker-recent-count">${history.length} total</span>
      </div>
      <div class="picker-recent-list">${recentHTML}</div>
      <button class="picker-recent-action" onclick="showHistory()">Open History →</button>
    </div>
    <div class="picker-stats">
      <div class="picker-stat">
        <div class="picker-stat-num">${weekTotal}</div>
        <div class="picker-stat-label">This Week</div>
      </div>
      <div class="picker-stat">
        <div class="picker-stat-num pass">${weekClear}</div>
        <div class="picker-stat-label">Clear</div>
      </div>
      <div class="picker-stat">
        <div class="picker-stat-num fail">${weekBlocked}</div>
        <div class="picker-stat-label">Blocked</div>
      </div>
      <div class="picker-stat">
        <div class="picker-stat-num">${clearRate}%</div>
        <div class="picker-stat-label">Rate</div>
      </div>
    </div>
    ${mantraHTML()}
  `;
}

function updateExploreResults() {
  const ticker = (document.getElementById('explore-ticker')?.value || '').trim().toUpperCase();
  const year = document.getElementById('explore-year')?.value || '';
  const strategy = document.getElementById('explore-strategy')?.value || '';
  const outcome = document.getElementById('explore-outcome')?.value || '';
  const container = document.getElementById('explore-results');
  if (!container) return;

  if (!ticker && !year && !strategy && !outcome) {
    container.innerHTML = '<div class="explore-empty">输入 ticker 或选筛选查看历史</div>';
    return;
  }

  let matches = getActiveHistory();
  if (ticker) matches = matches.filter(e => e.ticker && e.ticker.toUpperCase().includes(ticker));
  if (year) matches = matches.filter(e => {
    if (e.timestamp && e.timestamp.length >= 4) return e.timestamp.slice(0, 4) === year;
    if (e.timestampSort) return new Date(e.timestampSort).getFullYear().toString() === year;
    return false;
  });
  if (strategy) matches = matches.filter(e => e.strategy && e.strategy.startsWith(strategy));
  if (outcome) matches = matches.filter(e => e.outcome === outcome);

  if (matches.length === 0) {
    container.innerHTML = '<div class="explore-empty">无匹配</div>';
    return;
  }

  // Summary stats
  const totalMatches = matches.length;
  const traded = matches.filter(e => e.outcome === 'win' || e.outcome === 'loss' || e.outcome === 'open');
  const wins = matches.filter(e => e.outcome === 'win').length;
  const losses = matches.filter(e => e.outcome === 'loss').length;
  const winRate = (wins + losses) > 0 ? Math.round(wins / (wins + losses) * 100) : null;
  const summaryHTML = `
    <div class="explore-summary">
      <span>共 ${totalMatches}</span>
      ${traded.length > 0 ? `<span>· 已交易 ${traded.length}</span>` : ''}
      ${wins > 0 || losses > 0 ? `<span>· 盈 ${wins} · 亏 ${losses}${winRate != null ? ` · 胜率 ${winRate}%` : ''}</span>` : ''}
    </div>
  `;

  const rowsHTML = matches.slice(0, 20).map(e => {
    const cls = e.verdict.startsWith('CLEAR') ? 'pass' : e.verdict === 'BLOCKED' ? 'fail' : 'pending';
    const verdictShort = e.verdict.startsWith('CLEAR') ? 'CLEAR' : e.verdict === 'BLOCKED' ? 'BLOCK' : 'PEND';
    const outcomeLabel = e.outcome ? OUTCOME_LABEL[e.outcome] : null;
    return `
      <div class="explore-row" onclick="showEditModal('${e.id}')">
        <span class="explore-row-time">${esc(e.timestamp.slice(0, 10))}</span>
        <span class="explore-row-ticker">${esc(e.ticker || '—')}</span>
        <span class="explore-row-strategy">${esc(e.strategy)}</span>
        <span class="explore-row-verdict ${cls}">${verdictShort}</span>
        ${outcomeLabel ? `<span class="history-outcome ${e.outcome}">${esc(outcomeLabel)}</span>` : ''}
      </div>
    `;
  }).join('');

  container.innerHTML = summaryHTML + `<div class="explore-list">${rowsHTML}</div>`;
}
window.updateExploreResults = updateExploreResults;

function isProceedReady() {
  if (state.strategy === 'leaps') {
    if (!state.leapsDirection || !state.leapsStyle) return false;
    if (state.leapsDirection === 'open') return !!state.leapsPhase;
    if (state.leapsDirection === 'close') return !!state.leapsCloseType;
    return false;
  }
  if (state.strategy === 'csp') return !!state.cspIntent;
  if (state.strategy === 'pmcc') return !!state.pmccUnderlyingPurpose;
  return false;
}

function updateProceed() {
  const btn = document.getElementById('proceed-btn');
  if (!btn) return;
  const ready = isProceedReady();
  btn.disabled = !ready;
  btn.textContent = ready ? 'Continue →' : '先完成配置';
}

function wireSegmented(id, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      el.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      cb(b.dataset.v);
    });
  });
}

function renderChecklist() {
  const items = currentItems();
  const groups = [];
  const seen = {};
  items.forEach(it => {
    if (!seen[it.group]) { seen[it.group] = []; groups.push({ name: it.group, items: seen[it.group] }); }

  });

  let configHTML = '';
  // Position sizing only shown for LEAPS open
  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    // Compute caps for the two toggle labels (depends on style)
    const savedBlue = state.leapsBluechip;
    state.leapsBluechip = false;
    const capNo = positionCapPct();
    state.leapsBluechip = true;
    const capYes = positionCapPct();
    state.leapsBluechip = savedBlue;
    configHTML = `
      <div class="config">

  let checklistHTML = '';
  groups.forEach(g => {
    let count = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') count++; });
    checklistHTML += `
      <div class="group">
        <div class="group-header">
          <div class="group-title">${esc(g.name)}</div>
          <div class="group-count">${count} / ${g.items.length}</div>

        <div class="items">${g.items.map(it => itemHTML(it)).join('')}</div>

  const v = overallVerdict();
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  const blockMsg = isClose

  $app.innerHTML = `

    </div>
    <div class="disclaimer">
      Self-check only. Not investment advice.<br>
      ${blockMsg}
    </div>
  `;

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const bind = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
      el.addEventListener('input', e => {
        state[key] = e.target.value;
        updateVerdictsInPlace();
      });
      el.addEventListener('blur', () => scheduleFullRender());
    };
    bind('in-nav', 'nav');
    bind('in-ex', 'existingExposure');
    bind('in-bg', 'budget');
    const bcSeg = document.getElementById('bluechip-seg');
    if (bcSeg) {
      bcSeg.querySelector(`button[data-v="${state.leapsBluechip ? 'yes' : 'no'}"]`)?.classList.add('active');
      bcSeg.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => { pushUndo(); state.leapsBluechip = b.dataset.v === 'yes'; render(); });
      });
    }
  }

  // Ticker input (always present in checklist)
  const tickerEl = document.getElementById('in-ticker');
  if (tickerEl) {
    tickerEl.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
    tickerEl.addEventListener('input', e => {
      const v = e.target.value.toUpperCase();
      if (v !== e.target.value) {
        const pos = e.target.selectionStart;
        e.target.value = v;
        try { e.target.setSelectionRange(pos, pos); } catch (err) {}
      }
      state.ticker = v;
      scheduleSaveDraft();
    });
    tickerEl.addEventListener('blur', () => scheduleFullRender());
  }

  items.forEach(it => {
    if (it.positionCheck) return;
    if (it.numeric) {
      const el = document.getElementById(`num-${it.id}`);
      if (el) {
        el.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
        el.addEventListener('input', e => {
          state.items[it.id] = e.target.value;
          updateVerdictsInPlace();
        });
        el.addEventListener('blur', () => scheduleFullRender());
      }
    } else {
      const p = document.getElementById(`pass-${it.id}`);
      const f = document.getElementById(`fail-${it.id}`);
      if (p) p.addEventListener('click', () => { pushUndo(); state.items[it.id] = state.items[it.id] === 'pass' ? null : 'pass'; render(); });
      if (f) f.addEventListener('click', () => { pushUndo(); state.items[it.id] = state.items[it.id] === 'fail' ? null : 'fail'; render(); });
    }
  });
}

/* ==========================================================
 * PARTIAL UPDATES (no DOM rebuild — preserves input focus)
 * ========================================================== */
let __fullRenderTimer = null;
function scheduleFullRender(delay = 250) {
  cancelFullRender();
  __fullRenderTimer = setTimeout(() => {
    __fullRenderTimer = null;
    // Only re-render if no input is currently focused
    const ae = document.activeElement;
    if (!ae || ae.tagName !== 'INPUT') {
      render();
    }
  }, delay);
}
function cancelFullRender() {
  if (__fullRenderTimer) { clearTimeout(__fullRenderTimer); __fullRenderTimer = null; }
}

function updateVerdictsInPlace() {
  const items = currentItems();
  const v = overallVerdict();

  // Status bar main text
  const $statusMain = document.getElementById('status-main');
  if ($statusMain) {
    const cls = v.status === 'BLOCKED' ? 'fail'
      : v.status.startsWith('CLEAR TO OPEN · 软执行') || v.status.startsWith('CLEAR TO CLOSE · 软执行') ? 'pass-soft'
      : v.status.startsWith('CLEAR') ? 'pass'
      : 'pending';
    $statusMain.className = 'status-main ' + cls;
    $statusMain.textContent = v.status;
  }

  // Progress bar
  const $progressBar = document.getElementById('progress-bar');
  if ($progressBar) {
    const total = v.total || 1;
    const passPct = (v.pass / total * 100).toFixed(1);
    const failPct = (v.fail / total * 100).toFixed(1);
    const $pass = $progressBar.querySelector('.progress-fill-pass');
    const $fail = $progressBar.querySelector('.progress-fill-fail');
    if ($pass) $pass.style.width = passPct + '%';
    if ($fail) $fail.style.width = failPct + '%';
  }

  // Tally counts (top)
  const $tally = document.getElementById('status-tally');
  if ($tally) {
    const newTally = `${v.pass}_${v.hardFail}_${v.softFail}_${v.pending}`;
    const changed = window.__lastTally && window.__lastTally !== newTally;
    $tally.innerHTML = `
      <span class="tally-item"><span class="tally-dot pass"></span> ${v.pass} pass</span>
      <span class="tally-item"><span class="tally-dot fail"></span> ${v.hardFail} hard · ${v.softFail} soft</span>
      <span class="tally-item"><span class="tally-dot pending"></span> ${v.pending} pending</span>
    `;
    if (changed) {
      $tally.querySelectorAll('.tally-item').forEach(el => {
        el.classList.add('bumped');
        setTimeout(() => el.classList.remove('bumped'), 400);
      });
    }
    window.__lastTally = newTally;
  }

  // Status note (top)
  const $note = document.getElementById('status-note');
  if ($note) $note.textContent = v.note;

  // Bottom summary bar (mirror of top)
  const $bottomMain = document.getElementById('bottom-status-main');
  if ($bottomMain) {
    const cls = v.status === 'BLOCKED' ? 'fail'
      : v.status.startsWith('CLEAR TO OPEN · 软执行') || v.status.startsWith('CLEAR TO CLOSE · 软执行') ? 'pass-soft'
      : v.status.startsWith('CLEAR') ? 'pass'
      : 'pending';
    $bottomMain.className = 'bottom-status-main ' + cls;
    $bottomMain.textContent = v.status;
  }
  const $bottomNote = document.getElementById('bottom-status-note');
  if ($bottomNote) $bottomNote.textContent = v.note;

  // Each item's class + numeric badge
  items.forEach(it => {
    const $item = document.getElementById(`item-${it.id}`);
    if (!$item) return;  // Item isn't in DOM yet (conditional, waiting for full re-render)
    const newV = itemVerdict(it);
    const hardCls = it.hard && newV === 'fail' ? ' hard-fail' : '';
    $item.className = 'item ' + newV + hardCls;

    if (it.numeric) {
      const $badge = document.getElementById(`badge-${it.id}`);
      if ($badge) {
        $badge.className = 'item-numeric-verdict ' + (newV === 'pass' || newV === 'fail' ? newV : '');
        $badge.textContent = newV === 'pass' ? 'PASS' : newV === 'fail' ? 'BLOCK' : '';
      }
    }
  });

  // Group counts (X / Y)
  const groupCounts = {};
  items.forEach(it => {
    if (!groupCounts[it.group]) groupCounts[it.group] = { pass: 0, total: 0 };
    groupCounts[it.group].total++;
    if (itemVerdict(it) === 'pass') groupCounts[it.group].pass++;
  });
  document.querySelectorAll('.group').forEach($grp => {
    const $title = $grp.querySelector('.group-title');
    const $count = $grp.querySelector('.group-count');
    if ($title && $count) {
      const name = $title.textContent;
      if (groupCounts[name]) {
        $count.textContent = `${groupCounts[name].pass} / ${groupCounts[name].total}`;
      }
    }
  });

  // Position summary (LEAPS open only)
  const $posSum = document.getElementById('position-summary');
  if ($posSum && state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    $posSum.className = 'position-summary ' + pctCls;
    const $val = $posSum.querySelector('.position-summary-val');
    if ($val) {
      $val.className = 'position-summary-val ' + pctCls;
      $val.innerHTML = `${pctDisp} <span style="color:var(--text-faint); font-weight:400;"> / cap ${cap}%</span>`;
    }
  }

  // R:R desc live update
  const $rrDesc = document.getElementById('rr-desc');
  if ($rrDesc) $rrDesc.textContent = rrCheckDesc();

  // Save draft after any state change
  scheduleSaveDraft();
}

function itemHTML(it) {
  const v = itemVerdict(it);
  const hardBadge = it.hard ? `<span class="hard-badge">Hard block</span>` : '';
  const hardClass = it.hard && v === 'fail' ? 'hard-fail' : '';

  // Special render for R:R computed check
  if (it.id === 'rr_check') {
    return `
      <div class="item ${v}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)}</div>
            <div class="item-desc" id="rr-desc">${esc(rrCheckDesc())}</div>
          </div>
        </div>
      </div>
    `;
  }

  if (it.numeric) {
    const val = state.items[it.id] ?? '';
    const n = it.numeric;
    let req = '';
    if (n.priceField) req = '';  // No required label for price fields
    else if (n.label) req = `Required: ${n.label}${n.unit ? ' ' + n.unit : ''}`;
    else if (n.range) req = `Required: ${n.range[0]} – ${n.range[1]} ${n.unit || ''}`;
    else if (n.min != null) req = `Required: ${n.comparator} ${n.min}${n.unit ? ' ' + n.unit : ''}`;
    else if (n.max != null) req = `Required: ${n.comparator} ${n.max}${n.unit ? ' ' + n.unit : ''}`;
    if (n.optional) req += ' (可留空)';
    let verdictText = v === 'pass' ? `<span class="item-numeric-verdict pass" id="badge-${esc(it.id)}">PASS</span>` :
                      v === 'fail' ? `<span class="item-numeric-verdict fail" id="badge-${esc(it.id)}">BLOCK</span>` :
                      `<span class="item-numeric-verdict" id="badge-${esc(it.id)}"></span>`;
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
          </div>
        </div>
        <div class="item-numeric">
          <input class="item-numeric-input" id="num-${esc(it.id)}" type="text" inputmode="decimal" autocomplete="off" autocorrect="off"
                 placeholder="${esc(n.placeholder || '')}" value="${esc(val)}">
          <span class="item-numeric-req">${esc(req)}</span>
          ${verdictText}
        </div>
      </div>
    `;
  }
  if (it.positionCheck) {
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)} <em style="color:var(--text-faint);">— 由上方仓位输入自动判定</em></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }
  const s = state.items[it.id];
  return `
    <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
      <div class="item-head">
        <div class="item-text">
          <div class="item-title">${esc(it.title)} ${hardBadge}</div>
          ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
        </div>
        <div class="item-buttons">
          <button class="item-btn pass-btn ${s === 'pass' ? 'on' : ''}" id="pass-${esc(it.id)}" title="Pass">✓</button>
          <button class="item-btn fail-btn ${s === 'fail' ? 'on' : ''}" id="fail-${esc(it.id)}" title="Block">✕</button>
        </div>
      </div>
    </div>
  `;
}

/* ==========================================================
 * UNDO SYSTEM (Ctrl/Cmd + Z)
 * ========================================================== */
const undoStack = [];
const UNDO_LIMIT = 30;

function pushUndo() {
  if (!state.strategy) return;
  try {
    const snapshot = JSON.stringify(snapshotStateForStorage());
    // Skip if identical to top of stack
    if (undoStack.length && undoStack[undoStack.length - 1] === snapshot) return;
    undoStack.push(snapshot);
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  } catch (e) {}
}
function undo() {
  if (undoStack.length === 0) {
    showToast('无可撤销', 'info');
    return;
  }
  try {
    const prev = JSON.parse(undoStack.pop());
    restoreStateFromStorage(prev);
    render();
    showToast('已撤销', 'info');
  } catch (e) {
    showToast('撤销失败', 'error');
  }
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
    const tag = document.activeElement ? document.activeElement.tagName : '';
    // Don't interfere with native text input undo
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    e.preventDefault();
    undo();
  }
});

/* ==========================================================
 * DRAFT PERSISTENCE (auto-save current session to localStorage)
 * ========================================================== */
const DRAFT_KEY = 'pretrade_draft';
const DRAFT_MAX_AGE_MS = 6 * 60 * 60 * 1000; // 6 hours

function snapshotStateForStorage() {
  return {
    strategy: state.strategy,
    leapsDirection: state.leapsDirection,
    leapsPhase: state.leapsPhase,
    leapsStyle: state.leapsStyle,
    leapsBluechip: state.leapsBluechip,
    leapsCloseType: state.leapsCloseType,
    cspIntent: state.cspIntent,
    pmccUnderlyingPurpose: state.pmccUnderlyingPurpose,
    pmccMode: state.pmccMode,
    nav: state.nav,
    existingExposure: state.existingExposure,
    budget: state.budget,
    ticker: state.ticker,
    items: { ...state.items }
  };
}
function restoreStateFromStorage(saved) {
  if (!saved) return;
  // Migrate old LEAPS style keys ('standard' / 'aggressive' → 'swing')
  if (saved.leapsStyle === 'standard' || saved.leapsStyle === 'aggressive') {
    saved.leapsStyle = 'swing';
  }
  if (saved.pmccUnderlyingPurpose === 'standard' || saved.pmccUnderlyingPurpose === 'aggressive') {
    saved.pmccUnderlyingPurpose = 'swing';
  }
  Object.assign(state, saved);
  if (saved.items) state.items = { ...saved.items };
}

let __draftSaveTimer = null;
function scheduleSaveDraft() {
  clearTimeout(__draftSaveTimer);
  __draftSaveTimer = setTimeout(saveDraft, 250);
}
function saveDraft() {
  if (!state.strategy) return;
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      timestamp: Date.now(),
      state: snapshotStateForStorage()
    }));
  } catch (e) {}
}
function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return null;
    const draft = JSON.parse(raw);
    if (!draft.state || !draft.state.strategy) return null;
    if (Date.now() - draft.timestamp > DRAFT_MAX_AGE_MS) return null;
    return draft;
  } catch (e) { return null; }
}
function clearDraft() {
  try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
}

function showDraftBanner() {
  const draft = loadDraft();
  if (!draft) return;
  const stratLabel = STRAT_LABEL[draft.state.strategy] || '?';
  const minsAgo = Math.round((Date.now() - draft.timestamp) / 60000);
  const timeStr = minsAgo < 1 ? '刚才' :
                  minsAgo < 60 ? `${minsAgo} 分钟前` :
                  `${Math.round(minsAgo/60)} 小时前`;
  const slot = document.getElementById('banner-slot');
  if (!slot) return;
  slot.innerHTML = `
    <div class="draft-banner">
      <div class="draft-msg">
        <div>上次未完成的 <strong>${stratLabel}</strong> 检查</div>
        <div class="draft-msg-sub">${timeStr}</div>
      </div>
      <div class="draft-actions">
        <button class="btn ghost small" onclick="dismissDraft()">丢弃</button>
        <button class="btn small" onclick="restoreDraft()">恢复</button>
      </div>
    </div>
  `;
}
function hideDraftBanner() {
  const slot = document.getElementById('banner-slot');
  if (slot) slot.innerHTML = '';
}
function restoreDraft() {
  const draft = loadDraft();
  if (!draft) return;
  restoreStateFromStorage(draft.state);
  hideDraftBanner();
  render();
  showToast('已恢复未完成检查', 'info');
}
function dismissDraft() {
  clearDraft();
  hideDraftBanner();
}

/* ==========================================================
 * HISTORY (persistent log of all snapshots)
 * ========================================================== */
const HISTORY_KEY = 'pretrade_history';
const HISTORY_MAX = 100;  // increased from 50 to accommodate tombstones

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
// Filter out tombstones for display / stats / export
function getActiveHistory() {
  return loadHistory().filter(e => !e._deleted);
}
function saveToHistory() {
  if (!state.strategy) return;
  try {
    const history = loadHistory();
    const items = currentItems();
    const v = overallVerdict();
    const inputs = [];
    items.forEach(it => {
      if (it.numeric) {
        const val = state.items[it.id];
        if (val != null && val !== '') inputs.push(`${it.id}=${val}`);
      }
    });
    let exposurePct = '', capPct = '';
    if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
      const p = positionUsedPct();
      if (p != null) exposurePct = p.toFixed(1);
      capPct = positionCapPct();
    }
    const entry = {
      id: 'snap_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      timestamp: nowStamp(),
      timestampSort: Date.now(),
      updatedAt: Date.now(),
      ticker: state.ticker || '',
      strategy: STRAT_LABEL[state.strategy] || '',
      subtype: subtypeString(),
      verdict: v.status,
      pass: v.pass, fail: v.fail, pending: v.pending,
      hardFails: items.filter(it => it.hard && itemVerdict(it) === 'fail').map(it => it.title),
      failed: items.filter(it => itemVerdict(it) === 'fail').map(it => it.title),
      pendingItems: items.filter(it => itemVerdict(it) === 'pending').map(it => it.title),
      inputs: inputs.join('; '),
      nav: state.nav || '',
      existing: state.existingExposure || '',
      budget: state.budget || '',
      exposurePct, capPct,
      outcome: null,
      notes: '',
      fullState: snapshotStateForStorage()
    };
    history.unshift(entry);
    if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) {}
}
function deleteHistoryEntry(id) {
  const history = loadHistory();
  const idx = history.findIndex(e => e.id === id);
  if (idx === -1) return;
  // Replace with tombstone so deletion propagates via sync
  const original = history[idx];
  history[idx] = {
    id: original.id,
    _deleted: true,
    _deletedAt: Date.now(),
    timestampSort: original.timestampSort || Date.now()
  };
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  renderHistoryList();
}

// Temporarily swap global state to a snapshot state, run fn, restore.
// Used by edit modal to recompute verdict using a modified fullState.
function withTempState(tempState, fn) {
  const backup = JSON.parse(JSON.stringify(state));
  const clone = JSON.parse(JSON.stringify(tempState || {}));
  Object.keys(state).forEach(k => delete state[k]);
  Object.assign(state, clone);
  try {
    return fn();
  } finally {
    Object.keys(state).forEach(k => delete state[k]);
    Object.assign(state, backup);
  }
}

function editHistoryEntry(id, updates) {
  const history = loadHistory();
  const idx = history.findIndex(e => e.id === id);
  if (idx === -1) return;
  if (history[idx]._deleted) return;  // Don't edit tombstones
  history[idx] = { ...history[idx], ...updates, updatedAt: Date.now() };
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  renderHistoryList();
}

}

function showEditModal(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry || entry._deleted) return;
  ensureEditModal();
  const modal = document.getElementById('edit-modal');
  const outcome = entry.outcome || '';
  const notes = entry.notes || '';
  const tickerDisp = entry.ticker || '';
  const fullState = entry.fullState || {};

  // Get items list for this entry's state (using temp state swap)
  let editItems = [];
  try {
    editItems = withTempState(fullState, () => currentItems());
  } catch (err) {
    console.error('Cannot load items for editing:', err);
  }

  // Group items by group name (preserving order)
  const groupOrder = [];
  const groups = {};
  editItems.forEach(it => {
    const g = it.group || 'Other';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(it);
  });

  const itemsHTML = groupOrder.map(gn => `
    <div class="edit-group">
      <div class="edit-group-title">${esc(gn)}</div>
      ${groups[gn].map(it => renderEditItem(it, fullState.items || {})).join('')}
    </div>
  `).join('');

  // Position sizing fields (LEAPS open only)
  const showPosition = fullState.strategy === 'leaps' && fullState.leapsDirection === 'open';
  const positionHTML = showPosition ? `
    <div class="edit-group">
      <div class="edit-group-title">仓位</div>
      <div class="edit-position-grid">
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">Account NAV</div>
          <input type="number" class="sync-setup-input" id="edit-nav" value="${esc(fullState.nav || '')}" placeholder="e.g. 100000" inputmode="decimal" step="any">
        </div>
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">已有敞口 $</div>
          <input type="number" class="sync-setup-input" id="edit-existing" value="${esc(fullState.existingExposure || '')}" placeholder="e.g. 5000" inputmode="decimal" step="any">
        </div>
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">本次预算 $</div>
          <input type="number" class="sync-setup-input" id="edit-budget" value="${esc(fullState.budget || '')}" placeholder="e.g. 10000" inputmode="decimal" step="any">
        </div>
      </div>
    </div>
  ` : '';

  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">编辑记录${tickerDisp ? ' · ' + esc(tickerDisp) : ''}</div>
        <button class="modal-close" onclick="hideEditModal()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div style="font-size: 11.5px; color: var(--text-faint); line-height: 1.5; margin-bottom: 14px;">
          ${esc(entry.timestamp)} · ${esc(entry.strategy)} · ${esc(entry.subtype)}
          <br>原 verdict: <b>${esc(entry.verdict)}</b> · ${entry.pass}/${entry.fail}/${entry.pending}
        </div>

        <div class="edit-status-section">
          <div class="edit-section-header" style="margin-top: 0;">状态 · 快速标记</div>
          <div class="sync-setup-input-group">
            <label>交易状态</label>
            <div class="segmented" id="edit-outcome-seg">
              <button data-v="skipped">未交易</button>
              <button data-v="opted_out">自主放弃</button>
              <button data-v="open">持仓</button>
              <button data-v="win">盈</button>
              <button data-v="loss">亏</button>
            </div>
            <div style="font-size: 11px; color: var(--text-faint); margin-top: 6px; line-height: 1.5;">
              <b>未交易</b>: checklist 拦住了 · <b>自主放弃</b>: checklist 允许但你主动没做 (最有复盘价值)
            </div>
          </div>

          <div class="sync-setup-input-group">
            <label>复盘笔记 (选填, 最多 ${NOTES_MAX} 字)</label>
            <textarea class="sync-setup-input" id="edit-notes" rows="3"
                      style="font-family: var(--sans); resize: vertical;"
                      maxlength="${NOTES_MAX}"
                      placeholder="一行简短复盘">${esc(notes)}</textarea>
            <div style="font-size: 10.5px; color: var(--text-faint); margin-top: 4px; text-align: right;" id="edit-notes-count">${notes.length} / ${NOTES_MAX}</div>
          </div>
        </div>

        <div class="edit-section-header">编辑数据 · 会重算 verdict</div>
        <div class="edit-warning">⚠ 修改任何数值或选项都会重新计算 verdict, 结果可能变。</div>

        <div class="sync-setup-input-group">
          <label>Ticker</label>
          <input type="text" class="sync-setup-input" id="edit-ticker"
                 autocomplete="off" spellcheck="false"
                 style="text-transform: uppercase;"
                 placeholder="e.g. MSFT" value="${esc(tickerDisp)}">
        </div>

        ${positionHTML}

        <div class="edit-section-header">CHECKLIST 项目</div>
        ${itemsHTML || '<div style="color: var(--text-faint); font-size: 12px; padding: 10px 0;">无法加载 checklist 项目 (可能是旧数据格式)</div>'}
      </div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="hideEditModal()">取消</button>
        <button class="btn primary" id="edit-save-btn">保存</button>
      </div>
    </div>
  `;
  modal.style.display = 'flex';

  // Pre-select outcome
  if (outcome) {
    modal.querySelector(`#edit-outcome-seg button[data-v="${outcome}"]`)?.classList.add('active');
  }
  // Wire outcome segmented
  const seg = modal.querySelector('#edit-outcome-seg');
  seg.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  // Wire item toggle segmented buttons (per-item)
  modal.querySelectorAll('.edit-item-seg').forEach(segEl => {
    segEl.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        segEl.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });
  });

  // Ticker auto-uppercase
  const tickerEl = modal.querySelector('#edit-ticker');
  tickerEl.addEventListener('input', e => {
    const v = e.target.value.toUpperCase();
    if (v !== e.target.value) {
      const pos = e.target.selectionStart;
      e.target.value = v;
      try { e.target.setSelectionRange(pos, pos); } catch (err) {}
    }
  });

  // Notes counter
  const notesEl = modal.querySelector('#edit-notes');
  const counterEl = modal.querySelector('#edit-notes-count');
  notesEl.addEventListener('input', () => {
    counterEl.textContent = `${notesEl.value.length} / ${NOTES_MAX}`;
  });

  // Save
  modal.querySelector('#edit-save-btn').addEventListener('click', () => {
    const newTicker = tickerEl.value.trim().toUpperCase();
    const activeBtn = seg.querySelector('button.active');
    const newOutcome = activeBtn ? activeBtn.dataset.v : null;
    const newNotes = notesEl.value.trim();

    // Collect item values
    const newItems = { ...(fullState.items || {}) };
    modal.querySelectorAll('[data-item-id]').forEach(el => {
      const iid = el.dataset.itemId;
      const type = el.dataset.itemType;
      if (type === 'numeric') {
        newItems[iid] = el.value.trim();
      } else if (type === 'toggle') {
        const activeInner = el.querySelector('button.active');
        const v = activeInner ? activeInner.dataset.v : 'pending';
        if (v === 'pending') delete newItems[iid];
        else newItems[iid] = v;
      }
    });

    // Position sizing fields
    const newNav = modal.querySelector('#edit-nav')?.value.trim() || '';
    const newExisting = modal.querySelector('#edit-existing')?.value.trim() || '';
    const newBudget = modal.querySelector('#edit-budget')?.value.trim() || '';

    // Build new fullState
    const newFullState = {
      ...fullState,
      ticker: newTicker,
      nav: showPosition ? newNav : fullState.nav,
      existingExposure: showPosition ? newExisting : fullState.existingExposure,
      budget: showPosition ? newBudget : fullState.budget,
      items: newItems
    };

    // Recompute verdict using new state
    const recomputed = withTempState(newFullState, () => {
      const items = currentItems();
      const v = overallVerdict();
      const inputs = [];
      items.forEach(it => {
        if (it.numeric) {
          const val = state.items[it.id];
          if (val != null && val !== '') inputs.push(`${it.id}=${val}`);
        }
      });
      let exposurePct = '', capPct = '';
      if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
        const p = positionUsedPct();
        if (p != null) exposurePct = p.toFixed(1);
        capPct = positionCapPct();
      }
      return {
        verdict: v.status,
        pass: v.pass, fail: v.fail, pending: v.pending,
        hardFails: items.filter(it => it.hard && itemVerdict(it) === 'fail').map(it => it.title),
        failed: items.filter(it => itemVerdict(it) === 'fail').map(it => it.title),
        pendingItems: items.filter(it => itemVerdict(it) === 'pending').map(it => it.title),
        inputs: inputs.join('; '),
        exposurePct, capPct,
        subtype: subtypeString()
      };
    });

    const verdictChanged = recomputed.verdict !== entry.verdict;

    editHistoryEntry(id, {
      ticker: newTicker,
      outcome: newOutcome,
      notes: newNotes,
      nav: showPosition ? newNav : entry.nav,
      existing: showPosition ? newExisting : entry.existing,
      budget: showPosition ? newBudget : entry.budget,
      ...recomputed,
      fullState: newFullState
    });
    hideEditModal();

    const toastMsg = verdictChanged
      ? `已保存 · verdict: ${entry.verdict} → ${recomputed.verdict}`
      : '已保存';
    showToast(toastMsg, 'success', '记得 Sync 上传, 让另一端也更新');
  });
}

function restoreFromHistory(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry || !entry.fullState) return;
  restoreStateFromStorage(entry.fullState);
  hideHistory();
  hideDraftBanner();
  render();
  showToast('已还原快照', 'info', entry.timestamp);
}
function clearAllHistory() {
  if (!confirm('清空所有历史? 无法恢复。\n\n(清空后请点 Sync 上传, 让云端也清空)')) return;
  const history = loadHistory();
  const now = Date.now();
  // Convert all non-tombstone entries to tombstones so deletion propagates
  const tombstoned = history.map(e => e._deleted ? e : {
    id: e.id,
    _deleted: true,
    _deletedAt: now,
    timestampSort: e.timestampSort || now
  });
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(tombstoned)); } catch (e) {}
  renderHistoryList();
  showToast('本地已清空', 'info', '记得 Sync → 双向合并, 云端也会清空');
}
function exportAllHistoryCSV() {
  const history = getActiveHistory();
  if (history.length === 0) { showToast('没有历史记录', 'error'); return; }
  const headers = ['Timestamp', 'Ticker', 'Strategy', 'Subtype', 'Verdict', 'Pass', 'Block', 'Pending', 'Outcome', 'Notes', 'Hard_Fails', 'Failed_Items', 'Pending_Items', 'Inputs', 'NAV', 'Existing', 'Budget', 'Exposure_%', 'Cap_%'];
  const rows = [headers];
  const sorted = [...history].sort((a, b) => a.timestampSort - b.timestampSort);
  sorted.forEach(e => {
    rows.push([
      e.timestamp, e.ticker || '', e.strategy, e.subtype, e.verdict,
      e.pass, e.fail, e.pending,
      e.outcome ? OUTCOME_LABEL[e.outcome] || e.outcome : '',
      e.notes || '',
      (e.hardFails || []).join(' | '),
      (e.failed || []).join(' | '),
      (e.pendingItems || []).join(' | '),
      e.inputs, e.nav, e.existing, e.budget, e.exposurePct, e.capPct
    ]);
  });
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const stamp = new Date().toISOString().slice(0, 10);
  const filename = `checklist-history-${stamp}-${history.length}rows.csv`;
  const ok = downloadFile(filename, 'text/csv', csv);
  showToast(ok ? `已导出 ${history.length} 条历史` : '导出失败', ok ? 'success' : 'error', ok ? filename : '');
}

function progressBarHTML() {
  const v = overallVerdict();
  const total = v.total || 1;
  const passPct = (v.pass / total * 100).toFixed(1);
  const failPct = (v.fail / total * 100).toFixed(1);
  return `<div class="progress-bar" id="progress-bar">

    <div class="progress-fill-fail" style="width: ${failPct}%"></div>
  </div>`;

/* ==========================================================
 * SNAPSHOT · TEXT + CSV EXPORT
 * ========================================================== */
function nowStamp() {
  const now = new Date();
  try {
    const opts = { timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false };
    const parts = new Intl.DateTimeFormat('en-CA', opts).formatToParts(now);
    const get = (t) => (parts.find(p => p.type === t) || {}).value || '';
    // en-CA + hour12 false → YYYY-MM-DD and 24h
    return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')} ET`;
  } catch (e) {
    return now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  }
}

function buildTextSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const lines = [];
  lines.push('── Pre-Trade Snapshot ──');
  lines.push(`Time:     ${nowStamp()}`);
  if (state.ticker) lines.push(`Ticker:   ${state.ticker}`);
  lines.push(`Strategy: ${STRAT_LABEL[state.strategy]} · ${subtypeString()}`);
  lines.push(`Verdict:  ${v.status}`);
  lines.push(`Tally:    ${v.pass} pass · ${v.fail} block · ${v.pending} pending`);
  lines.push('');

  const groups = [];
  const seen = {};
  items.forEach(it => {
    if (!seen[it.group]) { seen[it.group] = []; groups.push({ name: it.group, items: seen[it.group] }); }
    seen[it.group].push(it);
  });
  groups.forEach(g => {
    let passCount = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') passCount++; });
    lines.push(`[${g.name}]  ${passCount}/${g.items.length}`);
    g.items.forEach(it => {
      const iv = itemVerdict(it);
      const symbol = iv === 'pass' ? '✓' : iv === 'fail' ? '✗' : '□';
      const hard = it.hard ? ' [HARD]' : '';
      let valStr = '';
      if (it.numeric) {
        const rawVal = state.items[it.id];
        if (rawVal !== '' && rawVal != null) valStr = ` = ${rawVal}`;
      }
      lines.push(`  ${symbol} ${it.title}${hard}${valStr}`);
    });
    lines.push('');
  });

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    lines.push('[Position]');
    lines.push(`  NAV $${state.nav || '—'}  ·  Existing $${state.existingExposure || '0'}  ·  Budget $${state.budget || '—'}`);
    if (pctVal != null) lines.push(`  Combined LEAPS: ${pctVal.toFixed(1)}% / cap ${cap}%`);
    lines.push('');
  }

  lines.push('──────────────────────');
  return lines.join('\n');
}

function csvCell(s) {
  const str = String(s == null ? '' : s);
  if (/[,"\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
  return str;
}

function buildCSVSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const timestamp = nowStamp();
  const strategy = STRAT_LABEL[state.strategy] || '';
  const subtype = subtypeString();
  const verdict = v.status;

  // Map item ids to compact column names for the Inputs cell
  const nameMap = {
    'dte': 'DTE',
    'delta': 'Delta',
    'ivp': 'IVP',
    'roc': 'ROC',
    'kdj_j': 'KDJ_J',
    'contracts': 'Contracts',
    'profit_gradient': 'Profit%',
    'profit_200': 'Profit%',
    'loss_50': 'Loss%',
    'dte_below_9m': 'DTE_months',
    'dte_6m': 'DTE_months',
    'new_leaps_dte': 'NewDTE',
    'entry_price': 'Entry',
    'stop_level': 'Stop',
    'target_level': 'Target',
    'leaps_profit': 'LEAPS_Profit%',
    'fg': 'F&G',
    'earnings': 'DaysToEarn',
    'stock_ivp': 'IVP',
  };

  const failed = [];
  const pending = [];
  const hardFails = [];
  const inputs = [];

  items.forEach(it => {
    const iv = itemVerdict(it);
    if (iv === 'fail') {
      failed.push(it.title);
      if (it.hard) hardFails.push(it.title);
    } else if (iv === 'pending') {
      pending.push(it.title);
    }
    if (it.numeric) {
      const val = state.items[it.id];
      if (val != null && val !== '') {
        const key = nameMap[it.id] || it.id;
        inputs.push(`${key}=${val}`);
      }
    }
  });
  // Add computed R:R if available
  const rrObj = (state.strategy === 'leaps' && state.leapsDirection === 'open') ? computeRR() : null;
  if (rrObj && !rrObj.error) inputs.push(`RR=${rrObj.rr.toFixed(2)}`);

  // Position (LEAPS open only)
  let nav = '', existing = '', budget = '', exposurePct = '', capPct = '';
  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    nav = state.nav || '';
    existing = state.existingExposure || '';
    budget = state.budget || '';
    const pct = positionUsedPct();
    if (pct != null) exposurePct = pct.toFixed(1);
    capPct = positionCapPct();
  }

  const headers = [
    'Timestamp', 'Ticker', 'Strategy', 'Subtype', 'Verdict',
    'Pass', 'Block', 'Pending',
    'Hard_Fails', 'Failed_Items', 'Pending_Items',
    'Inputs',
    'NAV', 'Existing', 'Budget', 'Exposure_%', 'Cap_%'
  ];
  const row = [
    timestamp, state.ticker || '', strategy, subtype, verdict,
    v.pass, v.fail, v.pending,
    hardFails.join(' | '), failed.join(' | '), pending.join(' | '),
    inputs.join('; '),
    nav, existing, budget, exposurePct, capPct,
  ];

  return [headers, row].map(r => r.map(csvCell).join(',')).join('\n');
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

function downloadFile(filename, mime, content) {
  try {
    const blob = new Blob(['\ufeff' + content], { type: mime + ';charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return true;
  } catch (e) {
    try {
      const dataUrl = 'data:' + mime + ';charset=utf-8,' + encodeURIComponent(content);
      window.open(dataUrl, '_blank');
      return true;
    } catch (e2) { return false; }
  }
}

function ensureSnapshotModal() {
  if (document.getElementById('snapshot-modal')) return;
  const canShare = !!(navigator.share);
  const modal = document.createElement('div');
  modal.id = 'snapshot-modal';
  modal.className = 'modal-overlay';
  modal.style.display = 'none';
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Snapshot</div>
        <button class="modal-close" onclick="hideSnapshot()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <textarea class="modal-preview" id="snapshot-preview" readonly></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="hideSnapshot()">关闭</button>
        ${canShare ? '<button class="btn" id="snap-share">分享</button>' : ''}
        <button class="btn" id="snap-download">下载 CSV</button>
        <button class="btn" id="snap-copy">复制文本</button>
        <button class="btn primary" id="snap-upload">☁ 上传到云端</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) hideSnapshot(); });

  document.getElementById('snap-copy').addEventListener('click', async () => {
    const ok = await copyToClipboard(buildTextSnapshot());
    showToast(ok ? '已复制到剪贴板' : '复制失败', ok ? 'success' : 'error', ok ? '可粘贴到日志或 Notion' : '');
  });

  document.getElementById('snap-download').addEventListener('click', () => {
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    const strat = (state.strategy || 'check').toUpperCase();
    const ticker = state.ticker ? `-${state.ticker}` : '';
    const filename = `checklist-${strat}${ticker}-${stamp}.csv`;
    const ok = downloadFile(filename, 'text/csv', buildCSVSnapshot());
    showToast(ok ? '已下载 CSV' : '下载失败', ok ? 'success' : 'error', ok ? filename : '');
  });

  document.getElementById('snap-upload').addEventListener('click', async () => {
    const cfg = loadSyncConfig();
    if (!cfg || !cfg.token) {
      showToast('请先设置 Sync', 'info', '将跳转到设置页面');
      hideSnapshot();
      setTimeout(() => showSyncModal(), 350);
      return;
    }
    if (!confirm('确定要上传本次 snapshot 到云端?\n(会双向合并本地与云端历史)')) return;
    hideSnapshot();
    try {
      showToast('上传中...', 'info');
      const stats = await syncMergeCore();
      showToast('已上传', 'success', `云端 ${stats.total} 条 · 合并新增 ${stats.newFromRemote} 条`);
    } catch (e) {
      showToast('上传失败', 'error', e.message);
    }
  });

  if (canShare) {
    document.getElementById('snap-share').addEventListener('click', async () => {
      try {
        await navigator.share({
          title: `Pre-Trade · ${STRAT_LABEL[state.strategy] || ''}`,
          text: buildTextSnapshot()
        });
      } catch (e) {
        // User cancelled — silent
      }
    });
  }
}

function showSnapshot() {

  saveToHistory();
