/* ==========================================================
 * GIST SYNC · cross-device history sync via GitHub Gist
 * ========================================================== */
const SYNC_CONFIG_KEY = 'pretrade_sync_config';
const GIST_FILENAME = 'checklist-data.json';

function loadSyncConfig() {
  try { const raw = localStorage.getItem(SYNC_CONFIG_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
}
function saveSyncConfig(cfg) {
  try { localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg)); return true; }
  catch (e) { return false; }
}
function clearSyncConfig() {
  try { localStorage.removeItem(SYNC_CONFIG_KEY); } catch (e) {}
}

async function githubFetch(url, options = {}) {
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token) throw new Error('未配置 token');
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json'
  };
  if (options.body) headers['Content-Type'] = 'application/json';
  const resp = await fetch(url, { ...options, headers });
  if (!resp.ok) {
    if (resp.status === 401) throw new Error('Token 无效或已过期');
    if (resp.status === 404) throw new Error('Gist 不存在, 请重新设置');
    if (resp.status === 403) throw new Error('GitHub API 限流, 稍后再试');
    throw new Error(`GitHub API ${resp.status}`);
  }
  return resp.json();
}

async function pushToGist(payload) {
  const cfg = loadSyncConfig();
  const content = JSON.stringify(payload, null, 2);
  const body = JSON.stringify({
    description: 'Pre-Trade Checklist Data (auto-managed)',
    public: false,
    files: { [GIST_FILENAME]: { content } }
  });
  if (cfg.gistId) {
    return githubFetch(`https://api.github.com/gists/${cfg.gistId}`, { method: 'PATCH', body });
  } else {
    const result = await githubFetch('https://api.github.com/gists', { method: 'POST', body });
    saveSyncConfig({ ...cfg, gistId: result.id });
    return result;
  }
}

async function pullFromGist() {
  const cfg = loadSyncConfig();
  if (!cfg.gistId) throw new Error('未设置 gist ID');
  const result = await githubFetch(`https://api.github.com/gists/${cfg.gistId}`);
  const file = result.files && result.files[GIST_FILENAME];
  if (!file) throw new Error(`Gist 中未找到 ${GIST_FILENAME}`);
  return JSON.parse(file.content);
}

async function syncUpload() {
  try {
    showToast('上传中...', 'info');
    const payload = { version: 2, syncedAt: new Date().toISOString(), history: loadHistory() };
    await pushToGist(payload);
    const cfg = loadSyncConfig();
    saveSyncConfig({ ...cfg, lastSyncAt: payload.syncedAt });
    const activeCount = payload.history.filter(e => !e._deleted).length;
    showToast('已上传', 'success', `${activeCount} 条历史 → Gist`);
    hideSyncModal();
  } catch (e) { showToast('上传失败', 'error', e.message); }
}

async function syncDownload() {
  if (!confirm('下载会覆盖本地历史。继续?')) return;
  try {
    showToast('下载中...', 'info');
    const remote = await pullFromGist();
    if (!Array.isArray(remote.history)) throw new Error('Gist 数据格式错误');
    localStorage.setItem(HISTORY_KEY, JSON.stringify(remote.history));
    const cfg = loadSyncConfig();
    saveSyncConfig({ ...cfg, lastSyncAt: new Date().toISOString() });
    const activeCount = remote.history.filter(e => !e._deleted).length;
    showToast('已下载', 'success', `${activeCount} 条历史 → 本地`);
    hideSyncModal();
    if (!state.strategy) render();
  } catch (e) { showToast('下载失败', 'error', e.message); }
}

// Core merge logic returning stats. Used by user-triggered syncMerge, snapshot upload, and auto-sync.
// Handles tombstones (_deleted: true) so deletions propagate correctly across devices.
async function syncMergeCore() {
  const local = loadHistory();
  const localActiveIds = new Set(local.filter(e => !e._deleted).map(e => e.id));
  let remoteHistory = [];
  try {
    const remote = await pullFromGist();
    remoteHistory = Array.isArray(remote.history) ? remote.history : [];
  } catch (e) {
    // If gist doesn't exist yet (first sync), just upload local
    if (!/未设置|不存在/.test(e.message)) throw e;
  }
  const remoteActiveIds = new Set(remoteHistory.filter(e => !e._deleted).map(e => e.id));

  // Merge by id with tombstone-aware conflict resolution:
  //   both normal  → keep newer by updatedAt (fallback timestampSort)
  //   one normal, one tombstone → tombstone wins (deletion propagates)
  //   both tombstone → keep the one with later _deletedAt
  const versionKey = (e) => e.updatedAt || e.timestampSort || 0;
  const map = new Map();
  [...local, ...remoteHistory].forEach(e => {
    const cur = map.get(e.id);
    if (!cur) { map.set(e.id, e); return; }
    if (cur._deleted && !e._deleted) return;  // tombstone wins
    if (!cur._deleted && e._deleted) { map.set(e.id, e); return; }  // tombstone wins
    if (cur._deleted && e._deleted) {
      if ((e._deletedAt || 0) > (cur._deletedAt || 0)) map.set(e.id, e);
      return;
    }
    if (versionKey(e) > versionKey(cur)) map.set(e.id, e);
  });

  const merged = Array.from(map.values())
    .sort((a, b) => {
      const ta = a._deleted ? (a._deletedAt || a.timestampSort || 0) : (a.timestampSort || 0);
      const tb = b._deleted ? (b._deletedAt || b.timestampSort || 0) : (b.timestampSort || 0);
      return tb - ta;
    })
    .slice(0, HISTORY_MAX);

  localStorage.setItem(HISTORY_KEY, JSON.stringify(merged));
  const payload = { version: 2, syncedAt: new Date().toISOString(), history: merged };
  await pushToGist(payload);
  const cfg = loadSyncConfig();
  saveSyncConfig({ ...cfg, lastSyncAt: payload.syncedAt });

  // Stats: only count active (non-tombstone) entries
  const activeMerged = merged.filter(e => !e._deleted);
  const activeMergedIds = new Set(activeMerged.map(e => e.id));
  const newFromRemote = [...activeMergedIds].filter(id => !localActiveIds.has(id)).length;
  const newFromLocal = [...activeMergedIds].filter(id => !remoteActiveIds.has(id)).length;
  const deletedByRemote = [...localActiveIds].filter(id => !activeMergedIds.has(id)).length;
  return { total: activeMerged.length, newFromRemote, newFromLocal, deletedByRemote };
}

async function syncMerge() {
  try {
    showToast('合并中...', 'info');
    const stats = await syncMergeCore();
    const parts = [`共 ${stats.total} 条`];
    if (stats.newFromRemote > 0) parts.push(`+${stats.newFromRemote}`);
    if (stats.deletedByRemote > 0) parts.push(`-${stats.deletedByRemote}`);
    showToast('已合并', 'success', parts.join(' · '));
    hideSyncModal();
    if (!state.strategy) render();
  } catch (e) { showToast('合并失败', 'error', e.message); }
}

// Silent auto-sync used on app boot. Toasts only for changes / errors.
async function syncMergeSilent() {
  try {
    const stats = await syncMergeCore();
    if (stats.newFromRemote > 0 || stats.deletedByRemote > 0) {
      const parts = [];
      if (stats.newFromRemote > 0) parts.push(`新增 ${stats.newFromRemote}`);
      if (stats.deletedByRemote > 0) parts.push(`删除 ${stats.deletedByRemote}`);
      showToast(`已从云端同步 (${parts.join(', ')})`, 'success');
      if (!state.strategy) render();
    }
  } catch (e) {
    showToast('云端同步失败', 'error', e.message);
  }
}

function ensureSyncModal() {
  if (document.getElementById('sync-modal')) return;
  const modal = document.createElement('div');
  modal.id = 'sync-modal';
  modal.className = 'modal-overlay';
  modal.style.display = 'none';
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) hideSyncModal(); });
}

function showSyncModal() {
  ensureSyncModal();
  const modal = document.getElementById('sync-modal');
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token) {
    modal.innerHTML = renderSyncSetup();
    wireSyncSetup();

    modal.innerHTML = renderSyncActions();

}

function hideSyncModal() {
  const m = document.getElementById('sync-modal');
  if (m) m.style.display = 'none';
}

    <div class="modal-card">

      </div>
      <div class="modal-body">

function wireSyncSetup() {
  document.getElementById('sync-save-btn').addEventListener('click', () => {
    const token = document.getElementById('sync-token-input').value.trim();
    const gistId = document.getElementById('sync-gistid-input').value.trim();
    if (!token) { showToast('请填 Token', 'error'); return; }
    const cur = loadSyncConfig() || {};
    saveSyncConfig({ ...cur, token, gistId: gistId || null });
    showToast('已保存', 'success', '再次打开 Sync 即可同步');
    showSyncModal();  // Refresh to actions view
  });
  const forget = document.getElementById('sync-forget-btn');
  if (forget) {
    forget.addEventListener('click', () => {
      if (!confirm('删除本地 token 与 gist ID? 云端数据不会被删。')) return;
      clearSyncConfig();
      hideSyncModal();
      showToast('已删除本地配置', 'info');
    });
  }
}

  const cfg = loadSyncConfig();
  const localCount = getActiveHistory().length;
  const lastSync = cfg.lastSyncAt ? formatTimeAgo(new Date(cfg.lastSyncAt).getTime()) + '前' : '从未';
  const gistShort = cfg.gistId ? cfg.gistId.slice(0, 8) + '…' : '未创建';
  return `
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">GitHub Gist 同步</div>
        <button class="modal-close" onclick="hideSyncModal()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="sync-status-bar">
          <span style="color: var(--text-dim);">本地 ${localCount} 条 · Gist ${esc(gistShort)}</span>
          <span style="color: var(--text-faint);">上次: ${esc(lastSync)}</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="sync-action-btn" id="sync-merge-btn">
            <div class="sync-action-title">⟳  双向合并  (推荐)</div>
            <div class="sync-action-desc">按 ID 去重合并本地与云端全部历史, 结果保存到两边。日常同步用这个。</div>
          </button>
          <button class="sync-action-btn" id="sync-upload-btn">
            <div class="sync-action-title">⬆  上传本地 → 云端</div>

          </button>
          <button class="sync-action-btn" id="sync-download-btn">
            <div class="sync-action-title">⬇  下载云端 → 本地</div>
            <div class="sync-action-desc">云端历史覆盖本地。用于本设备刚配置或需要恢复。</div>
          </button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" id="sync-config-btn">⚙ 重新设置 Token</button>
        <button class="btn ghost" onclick="hideSyncModal()">关闭</button>
      </div>

  `;
}

function wireSyncActions() {
  document.getElementById('sync-upload-btn').addEventListener('click', syncUpload);
  document.getElementById('sync-download-btn').addEventListener('click', syncDownload);
  document.getElementById('sync-merge-btn').addEventListener('click', syncMerge);
  document.getElementById('sync-config-btn').addEventListener('click', () => {
    const modal = document.getElementById('sync-modal');
    modal.innerHTML = renderSyncSetup();
    wireSyncSetup();
  });
}

/* ==========================================================
 * THEME
 * ========================================================== */
const THEME_CYCLE = ['auto', 'slate', 'terminal', 'light', 'warm'];
const THEME_LABEL = { auto: 'Auto', slate: 'Slate', terminal: 'Terminal', light: 'Light', warm: 'Warm' };
const THEME_COLORS = { slate: '#0F1419', terminal: '#000000', light: '#F9FAFB', warm: '#FBF6E9' };

function resolveTheme(t) {
  if (t !== 'auto') return t;
  try {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'slate';
  } catch (e) { return 'slate'; }
}
function setTheme(t) {
  state.theme = t;
  const resolved = resolveTheme(t);
  document.body.className = 'theme-' + resolved;
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', THEME_COLORS[resolved]);
  try { localStorage.setItem('pretrade_theme', t); } catch (e) {}
}
function cycleTheme() {
  const i = THEME_CYCLE.indexOf(state.theme);
  setTheme(THEME_CYCLE[(i + 1) % THEME_CYCLE.length]);
  render();
}
function loadTheme() {
  try {
    const saved = localStorage.getItem('pretrade_theme');
    if (THEME_CYCLE.indexOf(saved) >= 0) state.theme = saved;
    else state.theme = 'auto';  // Default for new users
  } catch (e) { state.theme = 'auto'; }
  setTheme(state.theme);
  // Listen to system preference changes (for auto mode)
  try {
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
      if (state.theme === 'auto') setTheme('auto');
    });
  } catch (e) {}
}

/* Expose */
window.pickStrategy = pickStrategy;
window.switchStrategy = switchStrategy;
window.resetAll = resetAll;
window.clearItems = clearItems;
window.toggleQref = toggleQref;
window.cycleTheme = cycleTheme;
window.showSnapshot = showSnapshot;
window.hideSnapshot = hideSnapshot;
window.showHistory = showHistory;
window.hideHistory = hideHistory;
window.restoreFromHistory = restoreFromHistory;
window.deleteHistoryEntry = deleteHistoryEntry;
window.showEditModal = showEditModal;
window.hideEditModal = hideEditModal;
window.clearAllHistory = clearAllHistory;
window.exportAllHistoryCSV = exportAllHistoryCSV;
window.restoreDraft = restoreDraft;
window.dismissDraft = dismissDraft;
window.showSyncModal = showSyncModal;
window.hideSyncModal = hideSyncModal;

/* Boot */
loadTheme();
render();
// Show draft banner if any pending draft exists (< 6 hours old)
showDraftBanner();
// Warn user if localStorage is unavailable
showStorageWarningIfNeeded();

// Auto-sync on boot if Gist Sync is configured (Q2 = a: every launch)
(function bootAutoSync() {
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token) return;
  // Delay 800ms so UI renders + user sees the app before any sync toast
  setTimeout(() => { syncMergeSilent(); }, 800);
})();
