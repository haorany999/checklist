/* A1 · Roll a number from 'from' to 'to' with ease-out cubic */
function animateNumber(el, from, to, duration = 400) {
  if (el.__animId) cancelAnimationFrame(el.__animId);
  const startT = performance.now();
  const diff = to - from;
  const step = (now) => {
    const t = Math.min(1, (now - startT) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const cur = Math.round(from + diff * eased);
    el.textContent = cur;
    if (t < 1) el.__animId = requestAnimationFrame(step);
    else el.__animId = null;
  };
  el.__animId = requestAnimationFrame(step);
}

function overallVerdict() {
  const items = currentItems();
  let pass = 0, fail = 0, pending = 0, hardFail = 0;
  const pendingItems = [];
  for (const it of items) {
    const v = itemVerdict(it);
    if (v === 'pass') pass++;
    else if (v === 'fail') {
      fail++;
      if (it.hard) hardFail++;
    }
    else {
      pending++;
      pendingItems.push(it);
    }
  }
  const softFail = fail - hardFail;
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  const clearLabel = isClose ? 'CLEAR TO CLOSE' : 'CLEAR TO OPEN';

  let status, note;
  if (hardFail > 0) {
    status = 'BLOCKED';
    note = `${hardFail} HARD 阻断, 拒绝执行`;
  } else if (pass === 0) {
    // Nothing filled yet
    status = 'PENDING';
    note = `${pending} 项未填, 请填 checklist`;
  } else if (pending === 0 && softFail === 0) {
    // All done, no fails
    status = clearLabel;
    note = '全部达标, 执行';
  } else if (pending === 0 && softFail <= 2) {
    // All items filled, ≤ 2 soft fails
    status = clearLabel + ' · 软执行';
    note = `${softFail} soft 未达标 (≤ 2), 可自主判断执行或跳过`;
  } else if (pending === 0 && softFail > 2) {
    // All items filled, too many soft fails
    status = 'PENDING';
    note = `${softFail} soft 未达标 (超过 2), 建议再确认`;
  } else if (pending === 1 && softFail === 0) {
    // Only 1 pending item → helpful hint
    const remaining = pendingItems[0];
    const shortTitle = remaining.title.length > 30 ? remaining.title.slice(0, 30) + '…' : remaining.title;
    status = 'PENDING';
    note = `差 1 项即 CLEAR → "${shortTitle}"`;
  } else {
    // Multiple pending items (may or may not have soft fails)
    status = 'PENDING';
    const parts = [];
    if (pending > 0) parts.push(`${pending} 项未填`);
    if (softFail > 0) parts.push(`${softFail} soft 未达标`);
    note = parts.join(' · ') + ', 未完成';
  }

  return { status, pass, fail, pending, hardFail, softFail, combined: softFail + pending, note, total: items.length };
}

/* ==========================================================
 * RENDER
 * ========================================================== */
const $app = document.getElementById('app');
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

let __prevViewKey = null;
function _viewKey() {
  if (state._view === 'history') return 'history';
  if (!state.strategy) return 'picker';
  if (state.strategy === 'leaps') {
    if (!state.leapsDirection || !state.leapsStyle) return 'leaps-config';
    if (state.leapsDirection === 'open' && !state.leapsPhase) return 'leaps-config';
    if (state.leapsDirection === 'close' && !state.leapsCloseType) return 'leaps-config';
    return 'checklist';
  }
  if (state.strategy === 'csp' && !state.cspIntent) return 'csp-config';
  if (state.strategy === 'pmcc' && !state.pmccUnderlyingPurpose) return 'pmcc-config';
  if (state.strategy === 'cc' && !state.ccMode) return 'cc-config';
  return 'checklist';
}
function _triggerViewTransition() {
  const currentKey = _viewKey();
  if (currentKey !== __prevViewKey && $app) {
    // Trigger CSS animation via class toggle
    $app.classList.remove('view-entering');
    // Force reflow
    void $app.offsetWidth;
    $app.classList.add('view-entering');
    __prevViewKey = currentKey;
  }
}

function render() {
  _triggerViewTransition();
  if (state._view === 'history') { renderHistoryPage(); _postRender(); return; }
  if (!state.strategy) { renderPicker(); _postRender(); return; }
  if (state.strategy === 'leaps') {
    if (!state.leapsDirection) { renderLeapsConfig(); _postRender(); return; }
    if (!state.leapsStyle) { renderLeapsConfig(); _postRender(); return; }
    if (state.leapsDirection === 'open' && !state.leapsPhase) { renderLeapsConfig(); _postRender(); return; }
    if (state.leapsDirection === 'close' && !state.leapsCloseType) { renderLeapsConfig(); _postRender(); return; }
    renderChecklist();
    scheduleSaveDraft();
    _postRender();
    return;
  }
  if (state.strategy === 'csp' && !state.cspIntent) { renderCspConfig(); _postRender(); return; }
  if (state.strategy === 'pmcc' && !state.pmccUnderlyingPurpose) { renderPmccConfig(); _postRender(); return; }
  if (state.strategy === 'cc' && !state.ccMode) { renderCcConfig(); _postRender(); return; }
  renderChecklist();
  scheduleSaveDraft();
  _postRender();
}

// Called after every render — runs number animations, other DOM enhancements
function _postRender() {
  requestAnimationFrame(() => {
    if (typeof runNumberAnimations === 'function') runNumberAnimations();
    if (typeof enableSwipeGestures === 'function') enableSwipeGestures();
    if (typeof enableGroupCollapse === 'function') enableGroupCollapse();
    if (typeof updateStickyVerdictBar === 'function') updateStickyVerdictBar();
    if (typeof triggerVerdictAnimations === 'function') triggerVerdictAnimations();
    if (typeof applyLayoutMode === 'function') applyLayoutMode();
  });
}

// Snapshot particles — burst outward from button
function emitSnapshotParticles(x, y) {
  const count = 8;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'snapshot-particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const angle = (i / count) * Math.PI * 2;
    const dist = 60 + Math.random() * 40;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    // Vary colors slightly (pass/accent mix)
    p.style.background = i % 2 === 0 ? 'var(--pass)' : 'var(--accent)';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
  haptic && haptic([10, 20, 10]);
}

// MB2 · Swipe gestures on history rows (mobile: swipe left → reveal actions)
function enableSwipeGestures() {
  // Only on touch devices
  if (!('ontouchstart' in window)) return;
  document.querySelectorAll('.history-item').forEach(row => {
    if (row.dataset.swipeEnabled === '1') return;
    row.dataset.swipeEnabled = '1';
    let startX = 0, startY = 0, currentX = 0, tracking = false, revealed = false;
    const main = row.querySelector('.history-main');
    const actions = row.querySelector('.history-actions');
    if (!main || !actions) return;
    // Setup: transform main content, actions absolutely positioned on right
    row.classList.add('swipeable');

    row.addEventListener('touchstart', (e) => {
      if (e.target.closest('button')) return;  // Skip if tapping a button
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentX = 0;
      tracking = true;
    }, { passive: true });

    row.addEventListener('touchmove', (e) => {
      if (!tracking) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      // If vertical scroll wins, cancel swipe
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) { tracking = false; return; }
      currentX = Math.min(0, dx);  // Only left swipe
      main.style.transform = `translateX(${currentX}px)`;
      main.style.transition = 'none';
    }, { passive: true });

    row.addEventListener('touchend', () => {
      if (!tracking) return;
      tracking = false;
      main.style.transition = 'transform 0.22s cubic-bezier(0.2, 0.9, 0.3, 1)';
      if (currentX < -60) {
        // Reveal
        main.style.transform = `translateX(-180px)`;
        revealed = true;
        haptic(6);
      } else {
        main.style.transform = 'translateX(0)';
        revealed = false;
      }
    });

    // Close reveal when tapping outside
    row.addEventListener('touchstart', () => {
      if (revealed && startX === 0) {
        main.style.transform = 'translateX(0)';
        revealed = false;
      }
    });
  });
}
window.enableSwipeGestures = enableSwipeGestures;

function formatTimeAgo(ts) {
  const secs = Math.round((Date.now() - ts) / 1000);
  if (secs < 60) return '刚才';
  const mins = Math.round(secs / 60);
  if (mins < 60) return `${mins} 分`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours} 时`;
  const days = Math.round(hours / 24);
  if (days < 30) return `${days} 天`;
  return `${Math.round(days / 30)} 月`;
}

function verdictSparklineHTML() {
  const history = getActiveHistory();
  if (history.length < 1) return '';

  // Available years from history
  const years = [...new Set(history.map(e => {
    if (e.timestamp && e.timestamp.length >= 4) return e.timestamp.slice(0, 4);
    if (e.timestampSort) return new Date(e.timestampSort).getFullYear().toString();
    return null;
  }).filter(Boolean))].sort().reverse();

  // Read current filter state from DOM if exists, else default
  const currentTicker = document.getElementById('spark-ticker')?.value || '';
  const currentYear = document.getElementById('spark-year')?.value || '';
  const currentStrategy = document.getElementById('spark-strategy')?.value || '';

  // Determine base data (all history if no filter, else full history filtered)
  let data = history;
  const activeFilter = currentTicker || currentYear || currentStrategy;
  if (activeFilter) {
    // Apply filters
    if (currentTicker) data = data.filter(e => e.ticker && e.ticker.toUpperCase().includes(currentTicker.trim().toUpperCase()));
    if (currentYear) data = data.filter(e => {
      const t = e.timestamp && e.timestamp.length >= 4 ? e.timestamp.slice(0, 4)
        : (e.timestampSort ? new Date(e.timestampSort).getFullYear().toString() : '');
      return t === currentYear;
    });
    if (currentStrategy) data = data.filter(e => e.strategy && e.strategy.startsWith(currentStrategy));
  }

  const total = data.length;
  let clear = 0, soft = 0, pend = 0, block = 0;
  data.forEach(e => {
    const v = e.verdict || '';
    if (v === 'BLOCKED') block++;
    else if (v.includes('软执行')) soft++;
    else if (v.startsWith('CLEAR')) clear++;
    else pend++;
  });
  const pct = n => total > 0 ? Math.round(n / total * 100) : 0;

  const bar = (label, count, cls) => {
    const p = pct(count);
    return `
      <div class="spark-row">

        <span class="spark-pct">${p}%</span>
      </div>
    `;
  };

  const scopeText = activeFilter
    ? [currentTicker && `ticker: ${esc(currentTicker.toUpperCase())}`, currentYear, currentStrategy].filter(Boolean).join(' · ')
    : '全部';

  return `
    <div class="picker-panel spark-panel">

        <span class="picker-panel-count">${total}</span>

      <div class="spark-filters">

               list="tickers-datalist-spark" value="${esc(currentTicker)}" oninput="updateSparklinePanel()">
        ${renderTickerDatalist('tickers-datalist-spark')}
        <select id="spark-year" onchange="updateSparklinePanel()">
          <option value="">年份</option>
          ${years.map(y => `<option value="${y}"${y === currentYear ? ' selected' : ''}>${y}</option>`).join('')}
        </select>
        <select id="spark-strategy" onchange="updateSparklinePanel()">
          <option value="">策略</option>
          <option value="LEAPS"${currentStrategy === 'LEAPS' ? ' selected' : ''}>LEAPS</option>
          <option value="PMCC"${currentStrategy === 'PMCC' ? ' selected' : ''}>PMCC</option>
          <option value="CSP"${currentStrategy === 'CSP' ? ' selected' : ''}>CSP</option>
          <option value="CC"${currentStrategy === 'CC' ? ' selected' : ''}>CC</option>
        </select>
        ${activeFilter ? '<button class="spark-clear-btn" onclick="clearSparklineFilters()">清除</button>' : ''}
      </div>
      ${total === 0 ? '<div class="spark-empty">无匹配</div>' : `
        <div class="spark-list">
          ${bar('CLEAR', clear, 'pass')}
          ${bar('SOFT', soft, 'pass-soft')}
          ${bar('PEND', pend, 'pending')}
          ${bar('BLOCK', block, 'fail')}
        </div>
      `}
    </div>

}

function updateSparklinePanel() {
  const panel = document.querySelector('.spark-panel');
  if (!panel) return;
  // Preserve focus + value
  const activeId = document.activeElement?.id;
  const cursorPos = document.activeElement?.selectionStart;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = verdictSparklineHTML();
  const newPanel = wrapper.firstElementChild;
  if (newPanel) {
    panel.replaceWith(newPanel);
    // Restore focus
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) {
        el.focus();
        if (cursorPos != null && el.setSelectionRange) {
          try { el.setSelectionRange(cursorPos, cursorPos); } catch (e) {}
        }
      }
    }
  }
}

function renderExploreResultsFor(matches) {
  if (matches.length === 0) {
    return '<div class="explore-empty">无匹配</div>';
  }
  const totalMatches = matches.length;
  const traded = matches.filter(e => e.outcome === 'win' || e.outcome === 'loss' || e.outcome === 'open');
  const wins = matches.filter(e => e.outcome === 'win').length;
  const losses = matches.filter(e => e.outcome === 'loss').length;
  const winRate = (wins + losses) > 0 ? Math.round(wins / (wins + losses) * 100) : null;
  const summaryHTML = `
    <div class="explore-summary">
      <span>共 ${totalMatches}</span>
      ${traded.length > 0 ? `<span>· 已交易 ${traded.length}</span>` : ''}
      ${wins > 0 || losses > 0 ? `<span>· 盈 ${wins} · 亏 ${losses}${winRate != null ? ` · 胜率 ${winRate}%` : ''}</span>` : ''}
    </div>
  `;
  const rowsHTML = matches.slice(0, 500).map(e => {
    const cls = e.verdict.startsWith('CLEAR') ? 'pass' : e.verdict === 'BLOCKED' ? 'fail' : 'pending';
    const verdictShort = e.verdict.startsWith('CLEAR') ? 'CLEAR' : e.verdict === 'BLOCKED' ? 'BLOCK' : 'PEND';
    const outcomeLabel = e.outcome ? OUTCOME_LABEL[e.outcome] : null;
    return `
      <div class="explore-row" onclick="showEditModal('${e.id}')" data-preview-id="${e.id}">
        <span class="explore-row-time">${esc(e.timestamp.slice(0, 10))}</span>
        <span class="explore-row-ticker">${esc(e.ticker || '—')}</span>
        <span class="explore-row-strategy">${esc(e.strategy)}</span>
        <span class="explore-row-verdict ${cls}">${verdictShort}</span>
        ${outcomeLabel ? `<span class="history-outcome ${e.outcome}">${esc(outcomeLabel)}</span>` : ''}
      </div>
    `;
  }).join('');
  return summaryHTML + `<div class="explore-list">${rowsHTML}</div>`;
}

function updateExploreResults() {
  const ticker = (document.getElementById('explore-ticker')?.value || '').trim().toUpperCase();
  const year = document.getElementById('explore-year')?.value || '';
  const strategy = document.getElementById('explore-strategy')?.value || '';
  const outcome = document.getElementById('explore-outcome')?.value || '';
  const container = document.getElementById('explore-results');
  if (!container) return;

  let matches = getActiveHistory();
  if (ticker) matches = matches.filter(e => e.ticker && e.ticker.toUpperCase().includes(ticker));
  if (year) matches = matches.filter(e => {
    if (e.timestamp && e.timestamp.length >= 4) return e.timestamp.slice(0, 4) === year;
    if (e.timestampSort) return new Date(e.timestampSort).getFullYear().toString() === year;
    return false;
  });
  if (strategy) matches = matches.filter(e => e.strategy && e.strategy.startsWith(strategy));
  if (outcome) matches = matches.filter(e => e.outcome === outcome);

  // Update mode label + count based on active filters
  const labelEl = document.getElementById('explore-mode-label');
  const countEl = document.getElementById('explore-count-badge');
  if (labelEl) {
    const anyFilter = ticker || year || strategy || (outcome && outcome !== 'open');
    if (!anyFilter && outcome === 'open') {
      labelEl.textContent = '当前持仓 · Open Positions';
    } else if (anyFilter) {
      const parts = [];
      if (outcome) parts.push({skipped:'未交易', opted_out:'自主放弃', open:'持仓', win:'盈', loss:'亏'}[outcome] || outcome);
      if (strategy) parts.push(strategy);
      if (ticker) parts.push(ticker);
      if (year) parts.push(year);
      labelEl.textContent = parts.length ? '筛选: ' + parts.join(' · ') : '搜索历史';
    } else {
      labelEl.textContent = '搜索历史';
    }
  }
  if (countEl) countEl.textContent = matches.length;

  container.innerHTML = renderExploreResultsFor(matches);
}

function verdictWinRatePanelHTML() {
  const history = getActiveHistory();
  if (history.length === 0) return '';
  // Group by verdict class
  const buckets = { CLEAR: [], SOFT: [], PENDING: [], BLOCKED: [] };
  history.forEach(e => {
    const v = e.verdict || '';
    let bucket = null;
    if (v === 'BLOCKED') bucket = 'BLOCKED';
    else if (v.includes('软执行')) bucket = 'SOFT';
    else if (v.startsWith('CLEAR')) bucket = 'CLEAR';
    else if (v === 'PENDING') bucket = 'PENDING';
    if (bucket) buckets[bucket].push(e);
  });
  // Compute win rate for each bucket (only settled)
  const rows = Object.entries(buckets).map(([k, arr]) => {
    const wins = arr.filter(e => e.outcome === 'win').length;
    const losses = arr.filter(e => e.outcome === 'loss').length;
    const settled = wins + losses;
    const wr = settled > 0 ? Math.round(wins / settled * 100) : null;
    return { verdict: k, total: arr.length, wins, losses, settled, wr };
  });
  const anySettled = rows.some(r => r.settled > 0);
  if (!anySettled) return '';  // Skip if no data
  return `
    <div class="picker-panel">
      <div class="picker-panel-header">
        <div class="picker-panel-title">Verdict 胜率对比</div>
        <div class="picker-panel-sub">CLEAR / 软执行 / 硬冲 各自的实际胜率</div>
      </div>
      <div class="verdict-winrate-grid">
        ${rows.map(r => {
          const wrCls = r.wr == null ? 'text-faint' : r.wr >= 60 ? 'pass' : r.wr >= 40 ? 'pending' : 'fail';
          const vCls = r.verdict === 'BLOCKED' ? 'fail' : r.verdict === 'PENDING' ? 'pending' : 'pass';
          return `
            <div class="verdict-winrate-row">
              <div class="vwr-tag ${vCls}">${r.verdict}</div>
              <div class="vwr-total">${r.total} 笔</div>
              <div class="vwr-outcome">${r.settled > 0 ? `盈 ${r.wins} · 亏 ${r.losses}` : '无结算'}</div>
              <div class="vwr-rate ${wrCls}">${r.wr != null ? r.wr + '%' : '—'}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

const TREND_RANGE_KEY = 'pretrade_trend_range';

function setTrendRange(r) {

window.setTrendRange = setTrendRange;

function _rangeParams(range) {
  const D = 86400000;
  const now = Date.now();
  switch (range) {
    case '1M':  return { spanMs: 30 * D,   bucketMs: 3 * D,   xFmt: 'md',  rangeText: '过去 1 个月' };
    case '3M':  return { spanMs: 91 * D,   bucketMs: 7 * D,   xFmt: 'md',  rangeText: '过去 3 个月' };
    case 'YTD': {
      const yearStart = new Date(new Date().getFullYear(), 0, 1).getTime();
      return { spanMs: now - yearStart, bucketMs: 30 * D, xFmt: 'm',  rangeText: '年初至今' };
    }
    case '1Y':  return { spanMs: 365 * D,  bucketMs: 30 * D,  xFmt: 'm',   rangeText: '过去 1 年' };
    case '3Y':  return { spanMs: 1095 * D, bucketMs: 91 * D,  xFmt: 'q',   rangeText: '过去 3 年' };
    default:    return { spanMs: 91 * D,   bucketMs: 7 * D,   xFmt: 'md',  rangeText: '过去 3 个月' };
  }
}

function winRateTrendHTML() {
  const history = getActiveHistory();
  if (history.length < 3) return '';

  const range = trendRange;
  const { spanMs, bucketMs, xFmt, rangeText } = _rangeParams(range);
  const now = Date.now();
  const numBuckets = Math.max(2, Math.round(spanMs / bucketMs));

  // Build buckets: buckets[0] = oldest, buckets[N-1] = current
  const buckets = [];
  for (let i = numBuckets - 1; i >= 0; i--) {
    const end = now - i * bucketMs;
    const start = end - bucketMs;
    buckets.push({ start, end, snapshots: [], settledByCreation: [] });
  }

  history.forEach(e => {
    const ts = e.timestampSort || Date.parse(e.timestamp);
    if (!ts) return;
    for (const b of buckets) {
      if (ts >= b.start && ts < b.end) {
        b.snapshots.push(e);
        if (e.outcome === 'win' || e.outcome === 'loss') b.settledByCreation.push(e);
        break;
      }
    }
  });

  const points = buckets.map(b => {
    const total = b.snapshots.length;
    const clearOrSoft = b.snapshots.filter(e => (e.verdict || '').startsWith('CLEAR')).length;
    const clearRate = total > 0 ? clearOrSoft / total * 100 : null;
    const wins = b.settledByCreation.filter(e => e.outcome === 'win').length;
    const settledCount = b.settledByCreation.length;
    const winRate = settledCount > 0 ? wins / settledCount * 100 : null;
    return { total, clearRate, winRate, settledCount, wins, losses: settledCount - wins };
  });

  const rangePicker = `
    <div class="trend-range-picker">
      ${['1M','3M','YTD','1Y','3Y'].map(r => `
        <button class="trend-range-btn ${r === range ? 'active' : ''}" onclick="setTrendRange('${r}')">${r}</button>
      `).join('')}
    </div>
  `;

  if (points.every(p => p.clearRate == null && p.winRate == null)) {
    return `
      <div class="picker-panel trend-panel">
        <div class="picker-panel-header trend-header">
          <div>
            <div class="picker-panel-title">胜率 &amp; CLEAR 率</div>
            <div class="picker-panel-sub">${rangeText}区间无数据</div>
          </div>
          ${rangePicker}
        </div>
      </div>
    `;
  }

  const spansYears = new Set(buckets.map(b => new Date(b.end).getFullYear())).size > 1;

  const W = 640, H = 180, padL = 36, padR = 20, padT = 20, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const xStep = points.length > 1 ? chartW / (points.length - 1) : chartW;

  const buildPath = (getValue) => {
    // Connect all data points, skipping empty buckets (no line breaks on gaps)
    const dataPoints = [];
    points.forEach((p, i) => {
      const val = getValue(p);
      if (val == null) return;
      const x = padL + i * xStep;
      const y = padT + chartH - (val / 100) * chartH;
      dataPoints.push({ x, y });
    });
    if (dataPoints.length === 0) return '';
    return 'M ' + dataPoints.map(d => `${d.x.toFixed(1)} ${d.y.toFixed(1)}`).join(' L ');
  };
  const clearPath = buildPath(p => p.clearRate);
  const winPath = buildPath(p => p.winRate);

  const yLabels = [0, 25, 50, 75, 100];
  const yGridLines = yLabels.map(v => {
    const y = padT + chartH - (v / 100) * chartH;
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 3"/>
            <text x="${padL - 6}" y="${y + 3}" font-size="9" fill="var(--text-faint)" text-anchor="end" font-family="var(--mono)">${v}</text>`;
  }).join('');

  const fmtLabel = (date) => {
    const M = date.getMonth() + 1, D = date.getDate(), Y = date.getFullYear();
    if (xFmt === 'md') return spansYears ? `${Y % 100}/${M}/${D}` : `${M}/${D}`;
    if (xFmt === 'm')  return spansYears ? `${Y % 100}/${M}月` : `${M}月`;
    if (xFmt === 'q')  { const Q = Math.floor((M - 1) / 3) + 1; return `${Y % 100}Q${Q}`; }
    return `${M}/${D}`;
  };
  const numXLabels = points.length <= 6 ? points.length : 5;
  const xLabelIdxs = [];
  for (let i = 0; i < numXLabels; i++) xLabelIdxs.push(Math.round(i * (points.length - 1) / (numXLabels - 1)));
  const xTicks = xLabelIdxs.map(idx => {
    const x = padL + idx * xStep;
    return `<text x="${x}" y="${H - 10}" font-size="9" fill="var(--text-faint)" text-anchor="middle" font-family="var(--mono)">${fmtLabel(new Date(buckets[idx].end))}</text>`;
  }).join('');

  const dotDate = (i) => fmtLabel(new Date(buckets[i].end));
  const clearDots = points.map((p, i) => {
    if (p.clearRate == null) return '';
    const x = padL + i * xStep;
    const y = padT + chartH - (p.clearRate / 100) * chartH;
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--accent)" stroke="var(--bg)" stroke-width="1.5"><title>${dotDate(i)} · CLEAR/软执行 ${p.clearRate.toFixed(0)}% (${p.total} 单)</title></circle>`;
  }).join('');
  const winDots = points.map((p, i) => {
    if (p.winRate == null) return '';
    const x = padL + i * xStep;
    const y = padT + chartH - (p.winRate / 100) * chartH;
    const clearY = p.clearRate != null ? padT + chartH - (p.clearRate / 100) * chartH : null;
    const yOffset = (clearY != null && Math.abs(clearY - y) < 4) ? 4 : 0;
    return `<circle cx="${x.toFixed(1)}" cy="${(y + yOffset).toFixed(1)}" r="3" fill="var(--pass)" stroke="var(--bg)" stroke-width="1.5"><title>${dotDate(i)} · 胜率 ${p.winRate.toFixed(0)}% (${p.wins}胜 ${p.losses}负)</title></circle>`;
  }).join('');

  return `
    <div class="picker-panel trend-panel">
      <div class="picker-panel-header trend-header">
        <div>
          <div class="picker-panel-title">胜率 &amp; CLEAR 率 <span class="trend-range-label">· ${rangeText}</span></div>
          <div class="picker-panel-sub">
            <span class="trend-legend"><span class="trend-dot" style="background: var(--accent)"></span>CLEAR/软执行</span>
            <span class="trend-legend"><span class="trend-dot" style="background: var(--pass)"></span>胜率</span>
            <span class="trend-note" title="胜率按 snapshot 创建日期分桶, 不按结算日期. 悬停数据点看具体值.">ⓘ</span>
          </div>
        </div>
        ${rangePicker}
      </div>
      <div class="trend-chart-wrap">
        <svg class="trend-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          ${yGridLines}
          <path d="${clearPath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          <path d="${winPath}" fill="none" stroke="var(--pass)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          ${clearDots}
          ${winDots}
          ${xTicks}
        </svg>
      </div>
    </div>
  `;
}

function checklistBacktestPanelHTML() {
  const history = getActiveHistory();
  const settled = history.filter(e => (e.outcome === 'win' || e.outcome === 'loss'));
  if (settled.length < 3) return '';  // Need meaningful data

  // Actual: all settled trades
  const actualWins = settled.filter(e => e.outcome === 'win').length;
  const actualLosses = settled.filter(e => e.outcome === 'loss').length;
  const actualTotal = actualWins + actualLosses;
  const actualRate = Math.round(actualWins / actualTotal * 100);

  // Strict: only CLEAR (including 软执行) settled trades
  const strict = settled.filter(e => (e.verdict || '').startsWith('CLEAR'));
  const strictWins = strict.filter(e => e.outcome === 'win').length;
  const strictLosses = strict.filter(e => e.outcome === 'loss').length;
  const strictTotal = strictWins + strictLosses;
  const strictRate = strictTotal > 0 ? Math.round(strictWins / strictTotal * 100) : null;

  // 硬冲: PENDING or BLOCKED that were still traded (had outcome)
  const forced = settled.filter(e => {
    const v = e.verdict || '';
    return v === 'PENDING' || v === 'BLOCKED';
  });
  const forcedWins = forced.filter(e => e.outcome === 'win').length;
  const forcedLosses = forced.filter(e => e.outcome === 'loss').length;
  const forcedTotal = forcedWins + forcedLosses;
  const forcedRate = forcedTotal > 0 ? Math.round(forcedWins / forcedTotal * 100) : null;

  // Delta calc
  let deltaLabel = '', deltaCls = '';
  if (strictRate != null) {
    const d = strictRate - actualRate;
    if (d > 0) { deltaLabel = `+${d}%`; deltaCls = 'pass'; }
    else if (d < 0) { deltaLabel = `${d}%`; deltaCls = 'fail'; }
    else deltaLabel = '±0%';
  }

  // Conclusion
  let conclusion = '';
  if (strictRate != null && actualTotal > 0) {
    if (strictRate > actualRate + 5) {
      conclusion = `<b>严格 CLEAR 策略比你现在做法胜率高 ${strictRate - actualRate} 个百分点</b> · 硬冲拖累了你的整体表现. 建议未来跳过 PENDING/BLOCKED.`;
    } else if (strictRate < actualRate - 5) {
      conclusion = `硬冲反而给你带来了额外的赢面? 可能是你 checklist 太严, 或者硬冲样本极小 (${forcedTotal} 笔). 谨慎解读.`;
    } else {
      conclusion = `严格 CLEAR 与实际做法胜率接近 · checklist 大致合理, 硬冲影响不大 (但样本 ${forcedTotal} 笔).`;
    }
  }

  return `
    <div class="picker-panel">
      <div class="picker-panel-header">
        <div class="picker-panel-title">Checklist 回测 · 假设严格执行</div>
        <div class="picker-panel-sub">如果只做 CLEAR, 你的胜率会是多少?</div>
      </div>
      <div class="backtest-grid">
        <div class="backtest-cell">
          <div class="backtest-label">实际胜率 (所有交易)</div>
          <div class="backtest-value" data-anim-num="${actualRate}" data-anim-key="bt-actual" data-anim-format="percent">${actualRate}%</div>
          <div class="backtest-detail">${actualWins} 胜 · ${actualLosses} 负 · ${actualTotal} 笔</div>
        </div>
        <div class="backtest-cell strict">
          <div class="backtest-label">严格 CLEAR 胜率</div>
          <div class="backtest-value" ${strictRate != null ? `data-anim-num="${strictRate}" data-anim-key="bt-strict" data-anim-format="percent"` : ''}>${strictRate != null ? strictRate + '%' : '—'}</div>
          <div class="backtest-detail">${strictWins} 胜 · ${strictLosses} 负 · ${strictTotal} 笔</div>
        </div>
        <div class="backtest-cell delta">
          <div class="backtest-label">差异</div>
          <div class="backtest-value ${deltaCls}">${deltaLabel}</div>
          <div class="backtest-detail">${strictRate != null && strictRate > actualRate ? '严格 > 实际' : strictRate != null && strictRate < actualRate ? '严格 < 实际' : '持平'}</div>
        </div>
        <div class="backtest-cell forced">
          <div class="backtest-label">硬冲表现 (PENDING/BLOCKED)</div>
          <div class="backtest-value ${forcedRate != null && forcedRate < 40 ? 'fail' : ''}" ${forcedRate != null ? `data-anim-num="${forcedRate}" data-anim-key="bt-forced" data-anim-format="percent"` : ''}>${forcedRate != null ? forcedRate + '%' : '—'}</div>
          <div class="backtest-detail">${forcedWins} 胜 · ${forcedLosses} 负 · ${forcedTotal} 笔</div>
        </div>
      </div>
      ${conclusion ? `<div class="backtest-conclusion">${conclusion}</div>` : ''}
    </div>
  `;
}

function tickerWinRatePanelHTML() {  const history = getActiveHistory();
  const settled = history.filter(e => e.outcome === 'win' || e.outcome === 'loss');
  if (settled.length < 3) return '';  // Need meaningful data
  // Group by ticker
  const byTicker = {};
  settled.forEach(e => {
    const t = (e.ticker || '').toUpperCase();
    if (!t) return;
    if (!byTicker[t]) byTicker[t] = { wins: 0, losses: 0, total: 0 };
    byTicker[t].total++;
    if (e.outcome === 'win') byTicker[t].wins++;
    else if (e.outcome === 'loss') byTicker[t].losses++;
  });
  // Only tickers with ≥ 2 settled trades
  const rows = Object.entries(byTicker)
    .filter(([, v]) => v.total >= 2)
    .map(([ticker, v]) => ({
      ticker,
      total: v.total,
      wins: v.wins,
      losses: v.losses,
      wr: Math.round(v.wins / v.total * 100)
    }))
    .sort((a, b) => b.wr - a.wr || b.total - a.total)
    .slice(0, 10);  // Top 10
  if (rows.length === 0) return '';
  return `
    <div class="picker-panel">
      <div class="picker-panel-header">
        <div class="picker-panel-title">Ticker 胜率排行 (Top ${rows.length})</div>
        <div class="picker-panel-sub">≥ 2 次已结算的 ticker · 谁是你的舒适圈</div>
      </div>
      <div class="ticker-winrate-list">
        ${rows.map(r => {
          const wrCls = r.wr >= 60 ? 'pass' : r.wr >= 40 ? 'pending' : 'fail';
          const barPct = Math.min(100, r.wr);
          return `
            <div class="ticker-winrate-row">
              <div class="twr-ticker">${esc(r.ticker)}</div>
              <div class="twr-bar">
                <div class="twr-bar-fill ${wrCls}" style="width: ${barPct}%"></div>
                <div class="twr-bar-label ${wrCls}">${r.wr}% · ${r.wins}胜/${r.losses}负</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function forcedTradeReminderHTML() {
  const history = getActiveHistory();
  const thirtyDaysAgo = Date.now() - 30 * 86400000;
  // Find forced trades from 30+ days ago that still need outcome update
  const needReview = history.filter(e => {
    if (!e.forcedReason) return false;
    if (e.timestampSort >= thirtyDaysAgo) return false;
    return !e.outcome || e.outcome === 'open';
  });
  if (needReview.length === 0) return '';
  const first = needReview[0];
  return `
    <div class="forced-reminder-banner" onclick="showEditModal('${first.id}')">
      <div class="forced-reminder-icon"></div>
      <div class="forced-reminder-body">
        <div class="forced-reminder-title">${needReview.length} 笔 30 天+ 前的硬冲需要跟踪</div>
        <div class="forced-reminder-sub">最早的: ${esc(first.ticker || '—')} · ${esc(first.timestamp.slice(0, 10))} · 点这里查看/更新</div>
      </div>
    </div>
  `;
}

function draftContinueBannerHTML() {
  const draft = loadDraft();
  if (!draft) return '';
  const stratLabel = STRAT_LABEL[draft.state.strategy] || '?';
  const ticker = draft.state.ticker || '';
  const minsAgo = Math.round((Date.now() - draft.timestamp) / 60000);
  const timeStr = minsAgo < 1 ? '刚才' :
                  minsAgo < 60 ? `${minsAgo} 分钟前` :
                  minsAgo < 1440 ? `${Math.round(minsAgo/60)} 小时前` :
                  `${Math.round(minsAgo/1440)} 天前`;
  const filledCount = Object.values(draft.state.items || {}).filter(v => v != null && v !== '').length;
  return `
    <div class="draft-continue-banner" onclick="restoreDraft()">
      <div class="draft-continue-icon"></div>
      <div class="draft-continue-body">
        <div class="draft-continue-title">继续未完成的 <strong>${stratLabel}${ticker ? ' · ' + esc(ticker) : ''}</strong> 检查</div>
        <div class="draft-continue-sub">${timeStr} · 已填 ${filledCount} 项 · 点这里继续</div>
      </div>
      <button class="draft-dismiss-btn" onclick="event.stopPropagation(); dismissDraft(); render();" title="丢弃 draft">×</button>
    </div>
  `;
}

function daysSinceLastSnapshotHTML() {
  const history = getActiveHistory();
  if (history.length === 0) return '';
  const latest = history[0];  // history is sorted newest first
  const ts = latest.timestampSort || Date.parse(latest.timestamp);
  if (!ts) return '';
  const days = Math.floor((Date.now() - ts) / 86400000);
  if (days === 0) return `<div class="last-snap-bar today">今日已 snapshot · ${esc(latest.ticker || '')} ${esc(latest.strategy || '')}</div>`;
  if (days === 1) return `<div class="last-snap-bar">距上次 snapshot: <b>1 天前</b> · ${esc(latest.ticker || '—')} ${esc(latest.strategy || '')}</div>`;
  const cls = days > 14 ? 'stale' : days > 7 ? 'aging' : '';
  return `<div class="last-snap-bar ${cls}">距上次 snapshot: <b>${days} 天前</b>${days > 14 ? ' · 长时间未自查, 记得每笔单前用 checklist' : ''} · 最新: ${esc(latest.ticker || '—')} ${esc(latest.strategy || '')}</div>`;
}

// Persistent sync status widget (mobile + desktop) — always visible on main page
function syncStatusMiniHTML() {
  const cfg = loadSyncConfig();
  const usage = estimateStorageUsage();
  const usagePct = Math.round(usage.ratio * 100);
  const usageMB = (usage.used / (1024 * 1024)).toFixed(2);
  const usageCls = usage.ratio > 0.8 ? 'fail' : usage.ratio > 0.5 ? 'pending' : 'pass';
  const localCount = getActiveHistory().length;

  // State 1: Not configured
  if (!cfg || !cfg.token || !cfg.gistId) {
    return `
      <div class="sync-mini unconfigured" onclick="showSyncModal()" role="button" title="点击设置 Sync 云端备份">
        <div class="sync-mini-icon">☁</div>
        <div class="sync-mini-main">
          <div class="sync-mini-title">未启用云端备份</div>
          <div class="sync-mini-sub">本地 ${localCount} 条 · 数据仅存这台设备 → 点击配置 Gist</div>
        </div>
      </div>
    `;
  }

  // State 2 & 3: Configured
  const lastSyncMs = cfg.lastSyncAt ? new Date(cfg.lastSyncAt).getTime() : null;
  const neverSynced = !lastSyncMs;
  const lastSyncStr = neverSynced ? '从未同步' : formatTimeAgo(lastSyncMs) + '前';
  const isStale = lastSyncMs && (Date.now() - lastSyncMs) > 7 * 86400000;  // > 7 days = stale

  return `
    <div class="sync-mini ${neverSynced ? 'never' : isStale ? 'stale' : 'ok'}" onclick="showSyncModal()" role="button" title="点击打开 Sync 详情">
      <div class="sync-mini-icon">☁</div>
      <div class="sync-mini-main">
        <div class="sync-mini-row">
          <span class="sync-mini-label">上次同步</span>
          <span class="sync-mini-value">${esc(lastSyncStr)}</span>
        </div>
        <div class="sync-mini-row">
          <span class="sync-mini-label">本地 / Gist</span>
          <span class="sync-mini-value">${localCount} 条</span>
        </div>
      </div>
      <div class="sync-mini-usage">
        <div class="sync-mini-usage-label">
          <span>${usageMB} MB</span>
          <span class="sync-mini-usage-pct ${usageCls}">${usagePct}%</span>
        </div>
        <div class="sync-mini-usage-track">
          <div class="sync-mini-usage-fill ${usageCls}" style="width: ${Math.min(100, usagePct)}%"></div>
        </div>
      </div>
    </div>
  `;
}

  // Style picker (shared)
  if (dir) {
    wireSegmented('style-seg', v => { state.leapsStyle = v; updateProceed(); });
    if (state.leapsStyle) document.querySelector(`#style-seg button[data-v="${state.leapsStyle}"]`)?.classList.add('active');
  }

  if (dir === 'open') {
    wireSegmented('phase-seg', v => { state.leapsPhase = v; updateProceed(); });
    if (state.leapsPhase) document.querySelector(`#phase-seg button[data-v="${state.leapsPhase}"]`)?.classList.add('active');
  } else if (dir === 'close') {
    wireSegmented('close-type-seg', v => { state.leapsCloseType = v; updateProceed(); });
    if (state.leapsCloseType) document.querySelector(`#close-type-seg button[data-v="${state.leapsCloseType}"]`)?.classList.add('active');
  }

  updateProceed();
  document.getElementById('proceed-btn').addEventListener('click', () => {
    if (isProceedReady()) render();
  });
}

function isProceedReady() {
  if (state.strategy === 'leaps') {
    if (!state.leapsDirection || !state.leapsStyle) return false;
    if (state.leapsDirection === 'open') return !!state.leapsPhase;
    if (state.leapsDirection === 'close') return !!state.leapsCloseType;
    return false;
  }
  if (state.strategy === 'csp') return !!state.cspIntent;
  if (state.strategy === 'pmcc') return !!state.pmccUnderlyingPurpose;
  if (state.strategy === 'cc') return !!state.ccMode;
  return false;
}

function updateProceed() {
  const btn = document.getElementById('proceed-btn');
  if (!btn) return;
  const ready = isProceedReady();
  btn.disabled = !ready;
  btn.textContent = ready ? 'Continue →' : '先完成配置';
}

function wireSegmented(id, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  el.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      el.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      cb(b.dataset.v);
    });
  });
}

function getAllTickers() {
  const history = getActiveHistory();
  const freq = {};
  history.forEach(e => {
    if (e.ticker) {
      const t = e.ticker.toUpperCase();
      freq[t] = (freq[t] || 0) + 1;
    }
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([t]) => t);
}

function renderTickerDatalist(id) {
  const tickers = getAllTickers();
  if (tickers.length === 0) return '';
  return `<datalist id="${id}">${tickers.map(t => `<option value="${esc(t)}">`).join('')}</datalist>`;
}

function bottomSummaryHTML() {
  const v = overallVerdict();
  const cls = v.status === 'BLOCKED' ? 'fail'
    : v.status.startsWith('CLEAR TO OPEN · 软执行') || v.status.startsWith('CLEAR TO CLOSE · 软执行') ? 'pass-soft'
    : v.status.startsWith('CLEAR') ? 'pass'
    : 'pending';
  const total = v.total || 0;
  const done = total - v.pending;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const ringColor = v.status === 'BLOCKED' ? 'var(--fail)'
    : v.status.startsWith('CLEAR') ? 'var(--pass)'
    : 'var(--pending)';
  const circumference = 2 * Math.PI * 22;
  const dashOffset = circumference * (1 - pct / 100);
  return `
    <div class="sticky-action-bar">
      <div class="sab-ring-wrap" title="进度: ${done}/${total}">
        <svg class="sab-ring" width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke="var(--border)" stroke-width="4"/>
          <circle cx="26" cy="26" r="22" fill="none" stroke="${ringColor}" stroke-width="4"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
                  stroke-linecap="round" transform="rotate(-90 26 26)"
                  style="transition: stroke-dashoffset 0.35s cubic-bezier(0.16, 1, 0.3, 1);"/>
        </svg>
        <div class="sab-ring-num" id="sab-ring-num">${pct}%</div>
      </div>
      <div class="sab-status-block">
        <div class="sab-status ${cls}" id="bottom-status-main">${esc(v.status)}</div>
        <div class="sab-note" id="bottom-status-note">${esc(v.note)}</div>
      </div>
      <div class="sab-actions">
        <button class="btn ghost sab-btn-small" onclick="clearItems()" title="清空">Clear</button>
        <button class="btn primary sab-btn-snapshot" onclick="showSnapshot()">Snapshot</button>
      </div>
    </div>
  `;
}

function renderChecklist() {
  const items = currentItems();
  const groups = [];
  const seen = {};
  items.forEach(it => {
    if (!seen[it.group]) { seen[it.group] = []; groups.push({ name: it.group, items: seen[it.group] }); }
    seen[it.group].push(it);
  });

  let configHTML = '';
  // Position sizing only shown for LEAPS open
  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    // Compute caps for the two toggle labels (depends on style)
    const savedBlue = state.leapsBluechip;
    state.leapsBluechip = false;
    const capNo = positionCapPct();
    state.leapsBluechip = true;
    const capYes = positionCapPct();
    state.leapsBluechip = savedBlue;
    configHTML = `
      <div class="config">
        <div class="config-title">Position sizing · 仓位输入</div>
        <div class="num-row">
          <div class="num-field"><label class="num-field-label">Account NAV</label>

            <button class="autofill-btn" onclick="autoFillLeapsExisting()" title="从 history 里 outcome=持仓 的 LEAPS 快照自动汇总 budget">Auto</button>
          </label>
            <input inputmode="decimal" type="number" id="in-ex" placeholder="0" value="${esc(state.existingExposure)}"></div>
          <div class="num-field"><label class="num-field-label">本次预算</label>
            <input inputmode="decimal" type="number" id="in-bg" placeholder="e.g. 8000" value="${esc(state.budget)}"></div>
          <div class="num-field"><label class="num-field-label">是否大蓝筹</label>
            <div class="segmented" id="bluechip-seg" style="margin-top: 0;">
              <button data-v="no">否 (≤${capNo}%)</button>
              <button data-v="yes">是 (≤${capYes}%)</button>
            </div></div>
        </div>
        <div class="position-summary ${pctCls}" id="position-summary">
          <span class="position-summary-label">敞口 / NAV</span>
          <span class="position-summary-val ${pctCls}">${pctDisp} <span style="color:var(--text-faint); font-weight:400;"> / cap ${cap}%</span></span>
        </div>
      </div>
    `;
  }
  // Position sizing for CSP
  if (state.strategy === 'csp') {
    const totalPct = cspTotalPct();
    const tickerPct = cspTickerPct();
    const tickerCap = cspTickerCap();
    const totalPctDisp = totalPct == null ? '—' : totalPct.toFixed(1) + '%';
    const tickerPctDisp = tickerPct == null ? '—' : tickerPct.toFixed(1) + '%';
    const totalCls = totalPct == null ? '' : (totalPct > 50 ? 'fail' : totalPct > 40 ? 'pending' : 'pass');
    const tickerCls = (tickerPct == null || tickerCap == null) ? '' : (tickerPct > tickerCap ? 'fail' : tickerPct > cspTickerSoftTarget() ? 'pending' : 'pass');
    configHTML = `
      <div class="config">
        <div class="config-title">CSP 仓位控制 · 名义敞口 (nominal = strike × 100 × 张数)</div>
        <div class="num-row">
          <div class="num-field"><label class="num-field-label">Account NAV</label>
            <input inputmode="decimal" type="number" id="in-nav" placeholder="e.g. 250000" value="${esc(state.nav)}"></div>
          <div class="num-field"><label class="num-field-label">现有 CSP 总名义
            <button class="autofill-btn" onclick="autoFillCspExisting()" title="从 history 里 outcome=持仓 的 CSP 快照自动汇总">Auto</button>
          </label>
            <input inputmode="decimal" type="number" id="in-csp-ex-total" placeholder="0" value="${esc(state.cspExistingTotal)}"></div>
          <div class="num-field"><label class="num-field-label">本笔 CSP 名义</label>
            <input inputmode="decimal" type="number" id="in-csp-nominal" placeholder="e.g. 5000" value="${esc(state.cspThisNominal)}"></div>
          <div class="num-field"><label class="num-field-label">本 ticker 现有 CSP
            <button class="autofill-btn" onclick="autoFillCspTicker()" title="从 history 里 outcome=持仓 且相同 ticker 的 CSP 快照自动汇总">Auto</button>
          </label>
            <input inputmode="decimal" type="number" id="in-csp-ticker-ex" placeholder="0" value="${esc(state.cspTickerExisting)}"></div>
          <div class="num-field"><label class="num-field-label">波动性类型</label>
            <div class="segmented" id="csp-vol-seg" style="margin-top: 0;">
              <button data-v="medium">中波动 (≤12%)</button>
              <button data-v="high">高波动 (≤8%)</button>
            </div></div>
        </div>
        <div class="position-summary ${totalCls}">
          <span class="position-summary-label">CSP 总敞口 / NAV</span>
          <span class="position-summary-val ${totalCls}">${totalPctDisp} <span style="color:var(--text-faint); font-weight:400;"> / 目标 40% · 硬顶 50%</span></span>
        </div>
        <div class="position-summary ${tickerCls}" style="margin-top: 8px;">
          <span class="position-summary-label">单 ticker 敞口 / NAV</span>
          <span class="position-summary-val ${tickerCls}">${tickerPctDisp} <span style="color:var(--text-faint); font-weight:400;"> ${tickerCap ? '/ 目标 ' + cspTickerSoftTarget() + '% · 硬顶 ' + tickerCap + '%' : '/ 先选波动性'}</span></span>
        </div>
      </div>
    `;
  }

  let checklistHTML = '';
  const groupKey = (name) => {
    if (name.includes('Discipline')) return 'discipline';
    if (name.includes('Market')) return 'market';
    if (name.includes('Underlying')) return 'underlying';
    if (name.includes('Position') || name.includes('sizing')) return 'position';
    if (name.includes('Trade plan')) return 'plan';
    if (name.includes('Contract')) return 'contract';
    if (name.includes('Entry signals')) return 'entry';
    if (name.includes('LEAPS health')) return 'health';
    if (name.includes('Short call')) return 'shortcall';
    if (name.includes('Close') || name.includes('gradient')) return 'close';
    return 'other';
  };
  groups.forEach(g => {
    let count = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') count++; });
    checklistHTML += `
      <div class="group" data-group-key="${groupKey(g.name)}">
        <div class="group-header">
          <div class="group-title">${esc(g.name)}</div>
          <div class="group-count">${count} / ${g.items.length}</div>
        </div>
        <div class="items">${g.items.map(it => itemHTML(it)).join('')}</div>
      </div>
    `;
  });

  const v = overallVerdict();
  const isClose = state.strategy === 'leaps' && state.leapsDirection === 'close';
  const blockMsg = isClose
    ? '任一 block = 不关仓, 重新评估。'
    : '任一 block = 不开仓。';

  $app.innerHTML = `
    ${headerHTML()}
    ${tickerBarHTML()}
    ${statusBarHTML()}
    ${progressBarHTML()}
    ${qrefHTML()}
    ${configHTML}
    ${checklistHTML}
    ${bottomSummaryHTML()}

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const bind = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
      el.addEventListener('input', e => {
        state[key] = e.target.value;
        updateVerdictsInPlace();
      });
      el.addEventListener('blur', () => scheduleFullRender());
    };
    bind('in-nav', 'nav');
    bind('in-ex', 'existingExposure');
    bind('in-bg', 'budget');
    const bcSeg = document.getElementById('bluechip-seg');
    if (bcSeg) {
      bcSeg.querySelector(`button[data-v="${state.leapsBluechip ? 'yes' : 'no'}"]`)?.classList.add('active');
      bcSeg.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => { pushUndo(); state.leapsBluechip = b.dataset.v === 'yes'; render(); });
      });
    }
  }

  // CSP position sizing wiring
  if (state.strategy === 'csp') {
    const bind = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
      el.addEventListener('input', e => {
        state[key] = e.target.value;
        updateVerdictsInPlace();
      });
      el.addEventListener('blur', () => scheduleFullRender());
    };
    bind('in-nav', 'nav');
    bind('in-csp-ex-total', 'cspExistingTotal');
    bind('in-csp-nominal', 'cspThisNominal');
    bind('in-csp-ticker-ex', 'cspTickerExisting');
    const vSeg = document.getElementById('csp-vol-seg');
    if (vSeg) {
      if (state.cspVolTier) vSeg.querySelector(`button[data-v="${state.cspVolTier}"]`)?.classList.add('active');
      vSeg.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => { pushUndo(); state.cspVolTier = b.dataset.v; render(); });
      });
    }
  }

  // Ticker input (always present in checklist)
  const tickerEl = document.getElementById('in-ticker');
  if (tickerEl) {
    tickerEl.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
    tickerEl.addEventListener('input', e => {
      const v = e.target.value.toUpperCase();
      if (v !== e.target.value) {
        const pos = e.target.selectionStart;
        e.target.value = v;
        try { e.target.setSelectionRange(pos, pos); } catch (err) {}
      }
      state.ticker = v;
      // Live toggle empty highlight state without full re-render
      const bar = document.getElementById('ticker-bar');
      if (bar) {
        if (v) bar.classList.remove('ticker-empty');
        else bar.classList.add('ticker-empty');
        const label = bar.querySelector('.ticker-label');
        if (label) label.textContent = v ? 'Ticker' : 'Ticker · 请填写';
      }
      scheduleSaveDraft();
    });
    tickerEl.addEventListener('blur', () => scheduleFullRender());
  }

  items.forEach(it => {
    if (it.positionCheck) return;
    if (it.numeric) {
      const el = document.getElementById(`num-${it.id}`);
      if (el) {
        el.addEventListener('focus', () => { pushUndo(); cancelFullRender(); });
        el.addEventListener('input', e => {
          state.items[it.id] = e.target.value;
          updateVerdictsInPlace();
          // For items whose value is referenced by OTHER items' thresholds,
          // schedule a debounced full re-render so dependent items update live.
          if (it.id === 'cost_basis') scheduleFullRender(500);
        });
        el.addEventListener('blur', () => scheduleFullRender());
      }
    } else {
      const p = document.getElementById(`pass-${it.id}`);
      const f = document.getElementById(`fail-${it.id}`);
      if (p) p.addEventListener('click', () => { pushUndo(); state.items[it.id] = state.items[it.id] === 'pass' ? null : 'pass'; render(); });
      if (f) f.addEventListener('click', () => { pushUndo(); state.items[it.id] = state.items[it.id] === 'fail' ? null : 'fail'; render(); });
    }
  });
}

/* ==========================================================
 * PARTIAL UPDATES (no DOM rebuild — preserves input focus)
 * ========================================================== */
let __fullRenderTimer = null;
function scheduleFullRender(delay = 250) {
  cancelFullRender();
  __fullRenderTimer = setTimeout(() => {
    __fullRenderTimer = null;
    // Only re-render if no input is currently focused
    const ae = document.activeElement;
    if (!ae || ae.tagName !== 'INPUT') {
      render();
    }
  }, delay);
}
function cancelFullRender() {
  if (__fullRenderTimer) { clearTimeout(__fullRenderTimer); __fullRenderTimer = null; }
}

function updateVerdictsInPlace() {
  const items = currentItems();
  const v = overallVerdict();

  // Status bar main text
  const $statusMain = document.getElementById('status-main');
  if ($statusMain) {
    const cls = v.status === 'BLOCKED' ? 'fail'
      : v.status.startsWith('CLEAR TO OPEN · 软执行') || v.status.startsWith('CLEAR TO CLOSE · 软执行') ? 'pass-soft'
      : v.status.startsWith('CLEAR') ? 'pass'
      : 'pending';
    $statusMain.className = 'status-main ' + cls;
    $statusMain.textContent = v.status;
  }

  // Progress bar
  const $progressBar = document.getElementById('progress-bar');
  if ($progressBar) {
    const total = v.total || 1;
    const passPct = (v.pass / total * 100).toFixed(1);
    const failPct = (v.fail / total * 100).toFixed(1);
    const $pass = $progressBar.querySelector('.progress-fill-pass');
    const $fail = $progressBar.querySelector('.progress-fill-fail');
    if ($pass) $pass.style.width = passPct + '%';
    if ($fail) $fail.style.width = failPct + '%';
  }

  // Update status-bar verdict class (for gradient line color)
  const $bar = document.querySelector('.status-bar');
  if ($bar) {
    $bar.classList.remove('verdict-blocked', 'verdict-pending', 'verdict-clear');
    if (v.status === 'BLOCKED') $bar.classList.add('verdict-blocked');
    else if (v.status === 'PENDING') $bar.classList.add('verdict-pending');
    else $bar.classList.add('verdict-clear');
  }

  // Tally counts (top) — A1 number rolling animation
  const $tally = document.getElementById('status-tally');
  if ($tally) {
    const targets = { pass: v.pass, hard: v.hardFail, soft: v.softFail, pending: v.pending };
    $tally.querySelectorAll('.tally-num').forEach(el => {
      const key = el.dataset.key;
      const from = parseInt(el.textContent) || 0;
      const to = targets[key] ?? 0;
      if (from !== to) animateNumber(el, from, to, 350);
    });
  }

  // Status note (top)
  const $note = document.getElementById('status-note');
  if ($note) $note.textContent = v.note;

  // Bottom summary bar (sticky action bar mirror of top)
  const $bottomMain = document.getElementById('bottom-status-main');
  if ($bottomMain) {
    const cls = v.status === 'BLOCKED' ? 'fail'
      : v.status.startsWith('CLEAR TO OPEN · 软执行') || v.status.startsWith('CLEAR TO CLOSE · 软执行') ? 'pass-soft'
      : v.status.startsWith('CLEAR') ? 'pass'
      : 'pending';
    $bottomMain.className = 'sab-status ' + cls;
    $bottomMain.textContent = v.status;
  }
  const $bottomNote = document.getElementById('bottom-status-note');
  if ($bottomNote) $bottomNote.textContent = v.note;

  // Update progress ring in sticky action bar
  const total = v.total || 0;
  const done = total - v.pending;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const ringColor = v.status === 'BLOCKED' ? 'var(--fail)'
    : v.status.startsWith('CLEAR') ? 'var(--pass)'
    : 'var(--pending)';
  const $ringNum = document.getElementById('sab-ring-num');
  if ($ringNum) {
    const cur = parseInt($ringNum.textContent) || 0;
    if (cur !== pct) {
      // Animate the number, then append %
      const from = cur, to = pct;
      if ($ringNum.__animId) cancelAnimationFrame($ringNum.__animId);
      const startT = performance.now();
      const step = (now) => {
        const t = Math.min(1, (now - startT) / 350);
        const eased = 1 - Math.pow(1 - t, 3);
        $ringNum.textContent = Math.round(from + (to - from) * eased) + '%';
        if (t < 1) $ringNum.__animId = requestAnimationFrame(step);
      };
      $ringNum.__animId = requestAnimationFrame(step);
    }
  }
  const $ring = document.querySelector('.sab-ring circle:nth-child(2)');
  if ($ring) {
    const circumference = 2 * Math.PI * 22;
    $ring.setAttribute('stroke-dashoffset', circumference * (1 - pct / 100));
    $ring.setAttribute('stroke', ringColor);
  }

  // Each item's class + numeric badge
  items.forEach(it => {
    const $item = document.getElementById(`item-${it.id}`);
    if (!$item) return;  // Item isn't in DOM yet (conditional, waiting for full re-render)
    const newV = itemVerdict(it);
    const hardCls = it.hard && newV === 'fail' ? ' hard-fail' : '';
    $item.className = 'item ' + newV + hardCls;

    if (it.numeric) {
      const $badge = document.getElementById(`badge-${it.id}`);
      if ($badge) {
        $badge.className = 'item-numeric-verdict ' + (newV === 'pass' || newV === 'fail' ? newV : '');
        $badge.textContent = newV === 'pass' ? 'PASS' : newV === 'fail' ? 'BLOCK' : '';
      }
    }
  });

  // Group counts (X / Y)
  const groupCounts = {};
  items.forEach(it => {
    if (!groupCounts[it.group]) groupCounts[it.group] = { pass: 0, total: 0 };
    groupCounts[it.group].total++;
    if (itemVerdict(it) === 'pass') groupCounts[it.group].pass++;
  });
  document.querySelectorAll('.group').forEach($grp => {
    const $title = $grp.querySelector('.group-title');
    const $count = $grp.querySelector('.group-count');
    if ($title && $count) {
      const name = $title.textContent;
      if (groupCounts[name]) {
        $count.textContent = `${groupCounts[name].pass} / ${groupCounts[name].total}`;
      }
    }
  });

  // Position summary (LEAPS open only)
  const $posSum = document.getElementById('position-summary');
  if ($posSum && state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    const pctCls = pctVal == null ? '' : (pctVal <= cap ? 'pass' : 'fail');
    const pctDisp = pctVal == null ? '—' : pctVal.toFixed(1) + '%';
    $posSum.className = 'position-summary ' + pctCls;
    const $val = $posSum.querySelector('.position-summary-val');
    if ($val) {
      $val.className = 'position-summary-val ' + pctCls;
      $val.innerHTML = `${pctDisp} <span style="color:var(--text-faint); font-weight:400;"> / cap ${cap}%</span>`;
    }
  }

  // R:R desc live update
  const $rrDesc = document.getElementById('rr-desc');
  if ($rrDesc) $rrDesc.textContent = rrCheckDesc();

  // Save draft after any state change
  scheduleSaveDraft();
}

function itemHTML(it) {
  const v = itemVerdict(it);
  const hardBadge = it.hard ? `<span class="hard-badge">Hard block</span>` : '';
  const hardClass = it.hard && v === 'fail' ? 'hard-fail' : '';

  // Special render for R:R computed check
  if (it.id === 'rr_check') {
    return `
      <div class="item ${v}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)}</div>
            <div class="item-desc" id="rr-desc">${esc(rrCheckDesc())}</div>
          </div>
        </div>
      </div>
    `;
  }

  if (it.numeric) {
    const val = state.items[it.id] ?? '';
    const n = it.numeric;
    let req = '';
    if (n.priceField) req = '';  // No required label for price fields
    else if (n.label) req = `Required: ${n.label}${n.unit ? ' ' + n.unit : ''}`;
    else if (n.range) req = `Required: ${n.range[0]} – ${n.range[1]} ${n.unit || ''}`;
    else if (n.min != null) req = `Required: ${n.comparator} ${n.min}${n.unit ? ' ' + n.unit : ''}`;
    else if (n.max != null) req = `Required: ${n.comparator} ${n.max}${n.unit ? ' ' + n.unit : ''}`;
    if (n.optional) req += ' (可留空)';
    let verdictText = v === 'pass' ? `<span class="item-numeric-verdict pass" id="badge-${esc(it.id)}">PASS</span>` :
                      v === 'fail' ? `<span class="item-numeric-verdict fail" id="badge-${esc(it.id)}">BLOCK</span>` :
                      `<span class="item-numeric-verdict" id="badge-${esc(it.id)}"></span>`;
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
          </div>
        </div>
        <div class="item-numeric">
          <input class="item-numeric-input" id="num-${esc(it.id)}" type="text" inputmode="decimal" autocomplete="off" autocorrect="off"
                 placeholder="${esc(n.placeholder || '')}" value="${esc(val)}">
          <span class="item-numeric-req">${esc(req)}</span>
          ${verdictText}
        </div>
      </div>
    `;
  }
  if (it.positionCheck) {
    return `
      <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)} <em style="color:var(--text-faint);">— 由上方仓位输入自动判定</em></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }
  if (it.locked) {
    return `
      <div class="item ${v} ${hardClass} item-locked" id="item-${esc(it.id)}">
        <div class="item-head">
          <div class="item-text">
            <div class="item-title">${esc(it.title)} ${hardBadge}</div>
            ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
          </div>
        </div>
      </div>
    `;
  }
  const s = state.items[it.id];
  return `
    <div class="item ${v} ${hardClass}" id="item-${esc(it.id)}">
      <div class="item-head">
        <div class="item-text">
          <div class="item-title">${esc(it.title)} ${hardBadge}</div>
          ${it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : ''}
        </div>
        <div class="item-buttons">
          <button class="item-btn pass-btn ${s === 'pass' ? 'on' : ''}" id="pass-${esc(it.id)}" title="Pass">✓</button>
          <button class="item-btn fail-btn ${s === 'fail' ? 'on' : ''}" id="fail-${esc(it.id)}" title="Block">✕</button>
        </div>
      </div>
    </div>
  `;
}
