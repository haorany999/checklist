<script>
"use strict";

// NOTE: Patched sections only; preserving rest of file in repo.

// LEAPS universal hard check helper
function withLeapsUniversalHardCheck(items) {
  items.push({
    group: 'Risk control',
    id: 'leaps_stop_defined',
    title: '已明确止损位 (Stop) 并在执行前确认',
    desc: '不需要输入具体价格；只需确认已提前定义触发条件与执行动作。',
    hard: true
  });
  return items;
}

function currentItems() {
  if (state.strategy === 'leaps') {
    if (state.leapsDirection === 'open') return withLeapsUniversalHardCheck(leapsOpenItems());
    if (state.leapsDirection === 'close') return withLeapsUniversalHardCheck(leapsCloseItems());
    return [];
  }
  if (state.strategy === 'csp') return cspItems();
  if (state.strategy === 'pmcc') return pmccItems();
  return [];
}

// Avoid cursor jumping on numeric inputs:
// update state on input, render on blur/change only.
function bindStableNumberInput(el, onInput) {
  if (!el) return;
  el.addEventListener('input', (e) => {
    onInput(e.target.value);
  });
  const commit = () => render();
  el.addEventListener('blur', commit);
  el.addEventListener('change', commit);
}
