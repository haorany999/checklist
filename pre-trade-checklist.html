// Safe localStorage save that handles quota exceeded errors + warns user
function safeSetItem(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    const isQuota = e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014 || /quota/i.test(e.message || '');
    if (isQuota) {
      // Try to warn user prominently, but showToast may not be defined yet if called early
      if (typeof showToast === 'function') {
        showToast('存储空间已满', 'error', '立即 Sync 上传到 Gist, 然后清理本地历史');
      } else {
        console.error('localStorage quota exceeded');
      }
    } else {
      if (typeof showToast === 'function') {
        showToast('保存失败', 'error', e.message || String(e));
      }
    }
    return false;
  }
}
window.safeSetItem = safeSetItem;

// Detect localStorage quota per browser (best-effort, cached).
// Chrome/Edge/Firefox: ~10 MB · Safari (Mac + iOS): ~5 MB
let _cachedStorageQuota = null;
function detectStorageQuota() {
  if (_cachedStorageQuota) return _cachedStorageQuota;
  const ua = navigator.userAgent || '';
  const isSafari = /Safari/.test(ua) && !/Chrome|Chromium|CriOS|FxiOS|Edg/.test(ua);
  _cachedStorageQuota = isSafari ? 5 * 1024 * 1024 : 10 * 1024 * 1024;
  return _cachedStorageQuota;
}

// Estimate localStorage usage (approximate — returns { used: bytes, ratio: 0-1, quota: bytes })
function estimateStorageUsage() {
  try {
    let total = 0;
    for (const k of Object.keys(localStorage)) {
      const v = localStorage.getItem(k) || '';
      total += (k.length + v.length) * 2;  // UTF-16 = 2 bytes per char
    }
    const quota = detectStorageQuota();
    return { used: total, ratio: total / quota, quota };
  } catch (e) { return { used: 0, ratio: 0, quota: 5 * 1024 * 1024 }; }
}
window.estimateStorageUsage = estimateStorageUsage;

/* ==========================================================
 * UNDO SYSTEM (Ctrl/Cmd + Z)
 * ========================================================== */
const undoStack = [];
const UNDO_LIMIT = 500;

function pushUndo() {
  if (!state.strategy) return;
  try {
    const snapshot = JSON.stringify(snapshotStateForStorage());
    // Skip if identical to top of stack
    if (undoStack.length && undoStack[undoStack.length - 1] === snapshot) return;
    undoStack.push(snapshot);
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  } catch (e) {}
}
function undo() {
  if (undoStack.length === 0) {
    showToast('无可撤销', 'info');
    return;
  }
  try {
    const prev = JSON.parse(undoStack.pop());
    restoreStateFromStorage(prev);
    render();
    showToast('已撤销', 'info');
  } catch (e) {
    showToast('撤销失败', 'error');
  }
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
    const tag = document.activeElement ? document.activeElement.tagName : '';
    // Don't interfere with native text input undo
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    e.preventDefault();
    undo();
  }
});

/* ==========================================================
 * DRAFT PERSISTENCE (auto-save current session to localStorage)
 * ========================================================== */
const DRAFT_KEY = 'pretrade_draft';
const DRAFT_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000; // 30 days (was 6 hours)

function snapshotStateForStorage() {
  return {
    strategy: state.strategy,
    leapsDirection: state.leapsDirection,
    leapsPhase: state.leapsPhase,
    leapsStyle: state.leapsStyle,
    leapsBluechip: state.leapsBluechip,
    leapsCloseType: state.leapsCloseType,
    cspIntent: state.cspIntent,
    cspVolTier: state.cspVolTier,
    cspExistingTotal: state.cspExistingTotal,
    cspThisNominal: state.cspThisNominal,
    cspTickerExisting: state.cspTickerExisting,
    pmccUnderlyingPurpose: state.pmccUnderlyingPurpose,
    pmccMode: state.pmccMode,
    ccMode: state.ccMode,
    nav: state.nav,
    existingExposure: state.existingExposure,
    budget: state.budget,
    ticker: state.ticker,
    items: { ...state.items }
  };
}
function restoreStateFromStorage(saved) {
  if (!saved) return;
  // Migrate old LEAPS style keys ('standard' / 'aggressive' → 'swing')
  if (saved.leapsStyle === 'standard' || saved.leapsStyle === 'aggressive') {
    saved.leapsStyle = 'swing';
  }
  if (saved.pmccUnderlyingPurpose === 'standard' || saved.pmccUnderlyingPurpose === 'aggressive') {
    saved.pmccUnderlyingPurpose = 'swing';
  }
  Object.assign(state, saved);
  if (saved.items) state.items = { ...saved.items };
}

let __draftSaveTimer = null;
function scheduleSaveDraft() {
  clearTimeout(__draftSaveTimer);
  __draftSaveTimer = setTimeout(saveDraft, 250);
}
function saveDraft() {
  if (!state.strategy) return;
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      timestamp: Date.now(),
      state: snapshotStateForStorage()
    }));
  } catch (e) {}
}
function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return null;
    const draft = JSON.parse(raw);
    if (!draft.state || !draft.state.strategy) return null;
    if (Date.now() - draft.timestamp > DRAFT_MAX_AGE_MS) return null;
    return draft;
  } catch (e) { return null; }
}
function clearDraft() {
  try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
}

function showDraftBanner() {
  const draft = loadDraft();
  if (!draft) return;
  const stratLabel = STRAT_LABEL[draft.state.strategy] || '?';
  const minsAgo = Math.round((Date.now() - draft.timestamp) / 60000);
  const timeStr = minsAgo < 1 ? '刚才' :
                  minsAgo < 60 ? `${minsAgo} 分钟前` :
                  `${Math.round(minsAgo/60)} 小时前`;
  const slot = document.getElementById('banner-slot');
  if (!slot) return;
  slot.innerHTML = `
    <div class="draft-banner">
      <div class="draft-msg">
        <div>上次未完成的 <strong>${stratLabel}</strong> 检查</div>
        <div class="draft-msg-sub">${timeStr}</div>
      </div>
      <div class="draft-actions">
        <button class="btn ghost small" onclick="dismissDraft()">丢弃</button>
        <button class="btn small" onclick="restoreDraft()">恢复</button>
      </div>
    </div>
  `;
}
function hideDraftBanner() {
  const slot = document.getElementById('banner-slot');
  if (slot) slot.innerHTML = '';
}
function restoreDraft() {
  const draft = loadDraft();
  if (!draft) return;
  restoreStateFromStorage(draft.state);
  hideDraftBanner();
  render();
  showToast('已恢复未完成检查', 'info');
}
function dismissDraft() {
  clearDraft();
  hideDraftBanner();
}

/* ==========================================================
 * HISTORY (persistent log of all snapshots)
 * ========================================================== */
const HISTORY_KEY = 'pretrade_history';
const HISTORY_MAX = 100000;  // effectively unlimited — was 100, caused truncation on merge

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
// Filter out tombstones for display / stats / export
function getActiveHistory() {
  return loadHistory().filter(e => !e._deleted);
}
function saveToHistory() {
  if (!state.strategy) return;
  try {
    const history = loadHistory();
    const items = currentItems();
    const v = overallVerdict();
    const inputs = [];
    items.forEach(it => {
      if (it.numeric) {
        const val = state.items[it.id];
        if (val != null && val !== '') inputs.push(`${it.id}=${val}`);
      }
    });
    let exposurePct = '', capPct = '';
    if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
      const p = positionUsedPct();
      if (p != null) exposurePct = p.toFixed(1);
      capPct = positionCapPct();
    }
    const entry = {
      id: 'snap_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      timestamp: nowStamp(),
      timestampSort: Date.now(),
      updatedAt: Date.now(),
      ticker: state.ticker || '',
      strategy: STRAT_LABEL[state.strategy] || '',
      subtype: subtypeString(),
      verdict: v.status,
      pass: v.pass, fail: v.fail, pending: v.pending,
      hardFails: items.filter(it => it.hard && itemVerdict(it) === 'fail').map(it => it.title),
      failed: items.filter(it => itemVerdict(it) === 'fail').map(it => it.title),
      pendingItems: items.filter(it => itemVerdict(it) === 'pending').map(it => it.title),
      inputs: inputs.join('; '),
      nav: state.nav || '',
      existing: state.existingExposure || '',
      budget: state.budget || '',
      exposurePct, capPct,
      outcome: null,
      notes: '',
      fullState: snapshotStateForStorage()
    };
    history.unshift(entry);
    if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    safeSetItem(HISTORY_KEY, JSON.stringify(history));
    scheduleAutoPushToGist();
  } catch (e) {}
}
function deleteHistoryEntry(id) {
  const history = loadHistory();
  const idx = history.findIndex(e => e.id === id);
  if (idx === -1) return;
  // Save original for undo
  const originalEntry = { ...history[idx] };
  // Replace with tombstone so deletion propagates via sync
  history[idx] = {
    id: originalEntry.id,
    _deleted: true,
    _deletedAt: Date.now(),
    timestampSort: originalEntry.timestampSort || Date.now()
  };
  try { safeSetItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  if (state._view === 'history') renderHistoryList();
  else render();
  scheduleAutoPushToGist();
  // V2 · Toast with undo
  showToast('已删除', 'info', originalEntry.ticker ? originalEntry.ticker + ' · ' + originalEntry.strategy : '', {
    undo: true,
    duration: 5000,
    onUndo: () => {
      const h = loadHistory();
      const i = h.findIndex(e => e.id === id);
      if (i !== -1) {
        h[i] = originalEntry;
        try { safeSetItem(HISTORY_KEY, JSON.stringify(h)); } catch (e) {}
        if (state._view === 'history') renderHistoryList();
        else render();
        scheduleAutoPushToGist();
        showToast('已恢复', 'success', originalEntry.ticker || '');
      }
    }
  });
}

// Temporarily swap global state to a snapshot state, run fn, restore.
// Used by edit modal to recompute verdict using a modified fullState.
function withTempState(tempState, fn) {
  const backup = JSON.parse(JSON.stringify(state));
  const clone = JSON.parse(JSON.stringify(tempState || {}));
  Object.keys(state).forEach(k => delete state[k]);
  Object.assign(state, clone);
  try {
    return fn();
  } finally {
    Object.keys(state).forEach(k => delete state[k]);
    Object.assign(state, backup);
  }
}

function editHistoryEntry(id, updates) {
  const history = loadHistory();
  const idx = history.findIndex(e => e.id === id);
  if (idx === -1) return;
  if (history[idx]._deleted) return;  // Don't edit tombstones
  history[idx] = { ...history[idx], ...updates, updatedAt: Date.now() };
  try { safeSetItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  // Refresh whatever view user is on: history page → renderHistoryList; main page → render
  if (state._view === 'history') renderHistoryList();
  else render();
  scheduleAutoPushToGist();
}

// Update only the fullState inside an entry (used for live re-render in edit modal)
function editHistoryEntryFullState(id, newFullState) {
  const history = loadHistory();
  const idx = history.findIndex(e => e.id === id);
  if (idx === -1) return;
  if (history[idx]._deleted) return;
  history[idx] = { ...history[idx], fullState: newFullState };
  try { safeSetItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
}

function ensureEditModal() {
  if (document.getElementById('edit-modal')) return;
  const modal = document.createElement('div');
  modal.id = 'edit-modal';
  modal.className = 'modal-overlay';
  modal.style.display = 'none';
  modal.style.zIndex = '150';  // above history modal (z-index: 100)
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) hideEditModal(); });
}

function renderEditItem(item, itemsMap) {
  const val = itemsMap[item.id];
  const hardBadge = item.hard ? '<span class="edit-item-hard">HARD</span>' : '';
  const desc = item.desc ? `<div class="edit-item-desc">${esc(item.desc)}</div>` : '';

  // Locked items (dependency not met) — show notice, no input
  if (item.locked) {
    return `
      <div class="edit-item edit-item-locked">
        <div class="edit-item-title">${esc(item.title)} ${hardBadge}</div>
        ${desc}
        <div style="font-size: 11px; color: var(--text-faint); font-style: italic; margin-top: 4px;">
           依赖项未填, 保存后本项自动 PENDING. 先填依赖项再重新打开编辑.
        </div>
      </div>
    `;
  }

  // R:R computed item (live updated by input listeners)
  if (item.id === 'rr_check') {
    const verdict = itemVerdict(item);  // Uses current tempState via withTempState wrap
    const descText = rrCheckDesc();
    const badgeText = verdict === 'pass' ? 'PASS' : verdict === 'fail' ? 'BLOCK' : 'PENDING';
    return `
      <div class="edit-item edit-item-rr edit-verdict-${verdict}" data-rr-display>
        <div class="edit-item-title">
          ${esc(item.title)} ${hardBadge}
          <span class="edit-item-verdict-badge edit-verdict-badge-${verdict}" data-rr-badge>${badgeText}</span>
        </div>
        <div class="edit-item-desc" data-rr-desc>${esc(descText)}</div>
      </div>
    `;
  }

  // Position check items (CSP total, CSP ticker) — auto-computed, no input in edit modal
  if (item.positionCheck) {
    const verdict = itemVerdict(item);
    const badgeText = verdict === 'pass' ? 'PASS' : verdict === 'fail' ? 'BLOCK' : 'PENDING';
    return `
      <div class="edit-item edit-verdict-${verdict}">
        <div class="edit-item-title">
          ${esc(item.title)} ${hardBadge}
          <span class="edit-item-verdict-badge edit-verdict-badge-${verdict}">${badgeText}</span>
        </div>
        ${desc}
        <div style="font-size: 11px; color: var(--text-faint); font-style: italic; margin-top: 4px;">
          由上方仓位输入自动判定
        </div>
      </div>
    `;
  }

  if (item.numeric) {
    const displayVal = (val != null && val !== '') ? val : '';
    const ph = item.numeric.placeholder || '';
    const unit = item.numeric.unit || '';
    // Verdict for the whole item — based on current stored value
    const verdict = itemVerdict(item);
    return `
      <div class="edit-item edit-verdict-${verdict}">
        <div class="edit-item-head">
          <div class="edit-item-text">
            <div class="edit-item-title">${esc(item.title)} ${hardBadge}</div>
            ${desc}
          </div>
        </div>
        <div class="edit-item-input-row">
          <input type="number" class="edit-item-input" data-item-id="${item.id}"
                 data-item-type="numeric" value="${esc(displayVal)}"
                 placeholder="${esc(ph)}" inputmode="decimal" step="any">
          ${unit ? `<span class="edit-item-unit">${esc(unit)}</span>` : ''}
        </div>
      </div>
    `;
  }

  // Toggle item — match main checklist: 2 buttons (✓ / ✕), click same to clear
  const currentState = (val === 'pass' || val === 'fail') ? val : 'pending';
  return `
    <div class="edit-item edit-verdict-${currentState}">
      <div class="edit-item-head">
        <div class="edit-item-text">
          <div class="edit-item-title">${esc(item.title)} ${hardBadge}</div>
          ${desc}
        </div>
        <div class="edit-item-buttons" data-item-id="${item.id}" data-item-type="toggle" data-current="${currentState}">
          <button class="edit-item-btn edit-pass-btn ${currentState === 'pass' ? 'on' : ''}" data-v="pass" title="Pass">✓</button>
          <button class="edit-item-btn edit-fail-btn ${currentState === 'fail' ? 'on' : ''}" data-v="fail" title="Block">✕</button>
        </div>
      </div>
    </div>
  `;
}

// Renders editable strategy config (subtype) segmented buttons for the edit modal.
// Returns HTML that allows user to change fields like pmccUnderlyingPurpose, cspIntent, leapsStyle, etc.
// which is essential when the original snapshot had missing/wrong config.
function renderEditConfigHTML(fullState) {
  const strat = fullState.strategy;
  if (!strat) return '';
  const parts = [];
  const seg = (label, field, options, current) => {
    const btns = options.map(([v, txt]) => `<button data-v="${esc(v)}" ${v === current ? 'class="active"' : ''}>${esc(txt)}</button>`).join('');
    return `
      <div class="sync-setup-input-group">
        <label>${esc(label)}${!current ? ' <span style="color: var(--fail);">· 未选!</span>' : ''}</label>
        <div class="segmented segmented-grid" data-config-field="${esc(field)}">${btns}</div>
      </div>
    `;
  };

  if (strat === 'leaps') {
    parts.push(seg('方向', 'leapsDirection', [['open', '开仓'], ['close', '关仓']], fullState.leapsDirection));
    if (fullState.leapsDirection === 'open') {
      parts.push(seg('风格', 'leapsStyle', [
        ['stock_sub', '股票替代'],
        ['balanced', 'Balanced'],
        ['swing', 'Swing 杠杆']
      ], fullState.leapsStyle));
      parts.push(seg('信号类型', 'leapsPhase', [
        ['entry', '首笔 · 左衰'],
        ['add_left', '加仓 · 左衰'],
        ['add_right', '加仓 · 右确'],
        ['add_macd', '加仓 · MACD']
      ], fullState.leapsPhase));
    } else if (fullState.leapsDirection === 'close') {
      parts.push(seg('风格', 'leapsStyle', [
        ['stock_sub', '股票替代'],
        ['balanced', 'Balanced'],
        ['swing', 'Swing 杠杆']
      ], fullState.leapsStyle));
      parts.push(seg('关仓类型', 'leapsCloseType', [
        ['gradient', '分批止盈'],
        ['profit200', '暴利平半'],
        ['time_loss', '止损 · 时间+浮亏'],
        ['time_forced', '时间必退'],
        ['trend_break', '止损 · 趋势破坏']
      ], fullState.leapsCloseType));
    }
  } else if (strat === 'pmcc') {
    parts.push(seg('底仓类型', 'pmccUnderlyingPurpose', [
      ['stock_sub', '股票替代'],
      ['balanced', 'Balanced'],
      ['swing', 'Swing 杠杆']
    ], fullState.pmccUnderlyingPurpose));
    parts.push(seg('Delta 模式', 'pmccMode', [
      ['standard', '标准 (≤15)'],
      ['defensive', '防守 (≤10)'],
      ['aggressive', '激进 (≤30)']
    ], fullState.pmccMode));
  } else if (strat === 'csp') {
    parts.push(seg('意图', 'cspIntent', [
      ['assign', '想接股'],
      ['neutral', '一般'],
      ['premium', '只赚权利金']
    ], fullState.cspIntent));
    parts.push(seg('波动性', 'cspVolTier', [
      ['medium', '中波动 (SOFI/HIMS)'],
      ['high', '高波动 (IREN/ASTS)']
    ], fullState.cspVolTier));
  } else if (strat === 'cc') {
    parts.push(seg('CC 模式', 'ccMode', [
      ['income', '收租 · Δ≤15'],
      ['balanced', '平衡 · Δ 15-25'],
      ['aggressive', '愿放 · Δ 25-30']
    ], fullState.ccMode));
  }

  if (parts.length === 0) return '';
  return `
    <div class="edit-section-header">策略配置</div>
    <div class="edit-warning">修改配置会重新加载 checklist (当前填入的数据会保留)</div>
    ${parts.join('')}
  `;
}

function showEditModal(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry || entry._deleted) return;
  ensureEditModal();
  const modal = document.getElementById('edit-modal');
  const outcome = entry.outcome || '';
  const notes = entry.notes || '';
  const tickerDisp = entry.ticker || '';
  const fullState = entry.fullState || {};

  // Get items list for this entry's state (using temp state swap)
  let editItems = [];
  try {
    editItems = withTempState(fullState, () => currentItems());
  } catch (err) {
    console.error('Cannot load items for editing:', err);
  }

  // Group items by group name (preserving order)
  const groupOrder = [];
  const groups = {};
  editItems.forEach(it => {
    const g = it.group || 'Other';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(it);
  });

  const itemsHTML = withTempState(fullState, () => groupOrder.map(gn => `
    <div class="edit-group">
      <div class="edit-group-title">${esc(gn)}</div>
      ${groups[gn].map(it => renderEditItem(it, fullState.items || {})).join('')}
    </div>
  `).join(''));

  // Position sizing fields (LEAPS open only)
  const showPosition = fullState.strategy === 'leaps' && fullState.leapsDirection === 'open';
  const positionHTML = showPosition ? `
    <div class="edit-group">
      <div class="edit-group-title">仓位</div>
      <div class="edit-position-grid">
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">Account NAV</div>
          <input type="number" class="sync-setup-input" id="edit-nav" value="${esc(fullState.nav || '')}" placeholder="e.g. 100000" inputmode="decimal" step="any">
        </div>
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">已有敞口 $</div>
          <input type="number" class="sync-setup-input" id="edit-existing" value="${esc(fullState.existingExposure || '')}" placeholder="e.g. 5000" inputmode="decimal" step="any">
        </div>
        <div>
          <div class="edit-item-title" style="font-size: 11.5px;">本次预算 $</div>
          <input type="number" class="sync-setup-input" id="edit-budget" value="${esc(fullState.budget || '')}" placeholder="e.g. 10000" inputmode="decimal" step="any">
        </div>
      </div>
    </div>
  ` : '';

  // Editable strategy config section — allows changing subtype fields (leaps style/phase, pmcc mode, csp intent, cc mode, etc.)
  const configHTML = renderEditConfigHTML(fullState);

  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">编辑记录${tickerDisp ? ' · ' + esc(tickerDisp) : ''}</div>
        <button class="modal-close" onclick="hideEditModal()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div style="font-size: 11.5px; color: var(--text-faint); line-height: 1.5; margin-bottom: 14px;">
          ${esc(entry.timestamp)} · ${esc(entry.strategy)} · ${esc(entry.subtype)}
          <br>原 verdict: <b>${esc(entry.verdict)}</b> · ${entry.pass}/${entry.fail}/${entry.pending}
        </div>

        <div class="edit-status-section">
          <div class="edit-section-header" style="margin-top: 0;">状态 · 快速标记</div>
          <div class="sync-setup-input-group">
            <label>交易状态</label>
            <div class="segmented" id="edit-outcome-seg">
              <button data-v="skipped">未交易</button>
              <button data-v="opted_out">自主放弃</button>
              <button data-v="open">持仓</button>
              <button data-v="win">盈</button>
              <button data-v="loss">亏</button>
            </div>
            <div style="font-size: 11px; color: var(--text-faint); margin-top: 6px; line-height: 1.5;">
              <b>未交易</b>: checklist 拦住了 · <b>自主放弃</b>: checklist 允许但你主动没做 (最有复盘价值)
            </div>
          </div>

          <div class="sync-setup-input-group">
            <label>复盘笔记 (选填, 最多 ${NOTES_MAX} 字)</label>
            <textarea class="sync-setup-input" id="edit-notes" rows="3"
                      style="font-family: var(--sans); resize: vertical;"
                      maxlength="${NOTES_MAX}"
                      placeholder="一行简短复盘">${esc(notes)}</textarea>
            <div style="font-size: 10.5px; color: var(--text-faint); margin-top: 4px; text-align: right;" id="edit-notes-count">${notes.length} / ${NOTES_MAX}</div>
          </div>

          ${entry.verdict === 'BLOCKED' ? `
            <div class="sync-setup-input-group" style="border-top: 1px dashed var(--border); padding-top: 12px; margin-top: 8px;">
              <label style="color: var(--fail);">硬冲理由 · Forced Reason ${entry.forcedReason ? '(已记录)' : '(未填, 你尊重了 BLOCKED)'}</label>
              <textarea class="sync-setup-input" id="edit-forced-reason" rows="3"
                        style="font-family: var(--sans); resize: vertical;"
                        maxlength="500"
                        placeholder="如果你选择硬冲, 写下理由 (会进入'硬冲跟踪'panel)">${esc(entry.forcedReason || '')}</textarea>
              <div style="font-size: 11px; color: var(--text-faint); margin-top: 6px; line-height: 1.5;">
                填写 = 你选择了硬冲, 需要跟踪。留空 = 你尊重了 BLOCKED, 无需跟踪。
              </div>
            </div>
          ` : ''}
        </div>

        <div class="edit-section-header">编辑数据 · 会重算 verdict</div>
        <div class="edit-warning">修改任何数值或选项都会重新计算 verdict, 结果可能变。</div>

        <div class="sync-setup-input-group">
          <label>Ticker</label>
          <input type="text" class="sync-setup-input" id="edit-ticker"
                 autocomplete="off" spellcheck="false" list="tickers-datalist-edit"
                 style="text-transform: uppercase;"
                 placeholder="e.g. MSFT" value="${esc(tickerDisp)}">
          ${renderTickerDatalist('tickers-datalist-edit')}
        </div>

        ${positionHTML}

        ${configHTML}

        <div class="edit-section-header">CHECKLIST 项目</div>
        ${itemsHTML || '<div style="color: var(--text-faint); font-size: 12px; padding: 10px 0;">无法加载 checklist 项目 (可能是旧数据格式)</div>'}
      </div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="hideEditModal()">取消</button>
        <button class="btn primary" id="edit-save-btn">保存</button>
      </div>
    </div>
  `;
  modal.style.display = 'flex';

  // Pre-select outcome
  if (outcome) {
    modal.querySelector(`#edit-outcome-seg button[data-v="${outcome}"]`)?.classList.add('active');
  }
  // Wire outcome segmented
  const seg = modal.querySelector('#edit-outcome-seg');
  seg.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  // Live verdict update for numeric items — card color changes as user types
  modal.querySelectorAll('.edit-item-input[data-item-id]').forEach(inp => {
    inp.addEventListener('input', () => {
      const iid = inp.dataset.itemId;
      const item = editItems.find(it => it.id === iid);
      if (!item || !item.numeric) return;
      // Recompute verdict using temp state with current form value
      const currentFormItems = { ...(fullState.items || {}), [iid]: inp.value.trim() };
      const tempFullState = { ...fullState, items: currentFormItems };
      let verdict;
      withTempState(tempFullState, () => { verdict = itemVerdict(item); });
      // Update card class
      const card = inp.closest('.edit-item');
      if (card) {
        card.classList.remove('edit-verdict-pass', 'edit-verdict-fail', 'edit-verdict-pending');
        card.classList.add('edit-verdict-' + verdict);
      }
    });
  });

  // Wire item toggle buttons: click ✓ → pass on, click ✕ → fail on, click same again → clear
  modal.querySelectorAll('.edit-item-buttons').forEach(container => {
    container.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const clicked = btn.dataset.v;  // 'pass' or 'fail'
        const current = container.dataset.current;
        const passBtn = container.querySelector('.edit-pass-btn');
        const failBtn = container.querySelector('.edit-fail-btn');
        let next;
        if (current === clicked) {
          // Same button → clear
          next = 'pending';
          passBtn.classList.remove('on');
          failBtn.classList.remove('on');
        } else {
          next = clicked;
          passBtn.classList.toggle('on', next === 'pass');
          failBtn.classList.toggle('on', next === 'fail');
        }
        container.dataset.current = next;
        // Update parent item's verdict class for visual feedback
        const item = container.closest('.edit-item');
        if (item) {
          item.classList.remove('edit-verdict-pass', 'edit-verdict-fail', 'edit-verdict-pending');
          item.classList.add('edit-verdict-' + next);
        }
      });
    });
  });

  // Ticker auto-uppercase
  const tickerEl = modal.querySelector('#edit-ticker');
  tickerEl.addEventListener('input', e => {
    const v = e.target.value.toUpperCase();
    if (v !== e.target.value) {
      const pos = e.target.selectionStart;
      e.target.value = v;
      try { e.target.setSelectionRange(pos, pos); } catch (err) {}
    }
  });

  // Notes counter
  const notesEl = modal.querySelector('#edit-notes');
  const counterEl = modal.querySelector('#edit-notes-count');
  notesEl.addEventListener('input', () => {
    counterEl.textContent = `${notesEl.value.length} / ${NOTES_MAX}`;
  });

  // Strategy config change — updates fullState + reloads modal (checklist depends on config)
  modal.querySelectorAll('[data-config-field]').forEach(segEl => {
    segEl.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = segEl.dataset.configField;
        const newVal = btn.dataset.v;
        if (fullState[field] === newVal) return;  // No change

        // Collect all currently filled items so they aren't lost on reload
        const currentItems = { ...(fullState.items || {}) };
        modal.querySelectorAll('[data-item-id]').forEach(el => {
          const iid = el.dataset.itemId;
          const type = el.dataset.itemType;
          if (type === 'numeric') {
            const v = el.value.trim();
            if (v !== '') currentItems[iid] = v; else delete currentItems[iid];
          } else if (type === 'toggle') {
            const v = el.dataset.current || 'pending';
            if (v === 'pending') delete currentItems[iid];
            else currentItems[iid] = v;
          }
        });
        // Also preserve position sizing / ticker inputs
        const partial = { [field]: newVal, items: currentItems };
        if (modal.querySelector('#edit-nav')) partial.nav = modal.querySelector('#edit-nav').value.trim();
        if (modal.querySelector('#edit-existing')) partial.existingExposure = modal.querySelector('#edit-existing').value.trim();
        if (modal.querySelector('#edit-budget')) partial.budget = modal.querySelector('#edit-budget').value.trim();
        const tickerVal = modal.querySelector('#edit-ticker')?.value.trim().toUpperCase();
        if (tickerVal) partial.ticker = tickerVal;

        const updatedFullState = { ...fullState, ...partial };
        editHistoryEntryFullState(id, updatedFullState);
        hideEditModal();
        setTimeout(() => showEditModal(id), 100);
      });
    });
  });

  // Live R:R recompute: when entry_price / stop_level / target_level change,
  // update the rr_check display in-place without needing save + reopen
  const rrTriggerIds = ['entry_price', 'stop_level', 'target_level'];
  const rrDisplay = modal.querySelector('[data-rr-display]');
  if (rrDisplay) {
    const recomputeRR = () => {
      // Build a temp fullState with current form values
      const currentFormItems = { ...(fullState.items || {}) };
      modal.querySelectorAll('.edit-item-input[data-item-id]').forEach(el => {
        const iid = el.dataset.itemId;
        currentFormItems[iid] = el.value.trim();
      });
      modal.querySelectorAll('.edit-item-buttons[data-item-id]').forEach(el => {
        const iid = el.dataset.itemId;
        const v = el.dataset.current || 'pending';
        if (v !== 'pending') currentFormItems[iid] = v;
      });
      const tempFullState = { ...fullState, items: currentFormItems };
      // Compute with withTempState
      let verdict, descText;
      withTempState(tempFullState, () => {
        verdict = rrCheckVerdict();
        descText = rrCheckDesc();
      });
      // Update DOM
      const badgeText = verdict === 'pass' ? 'PASS' : verdict === 'fail' ? 'BLOCK' : 'PENDING';
      rrDisplay.className = `edit-item edit-item-rr edit-verdict-${verdict}`;
      const badge = rrDisplay.querySelector('[data-rr-badge]');
      if (badge) {
        badge.className = `edit-item-verdict-badge edit-verdict-badge-${verdict}`;
        badge.textContent = badgeText;
      }
      const descEl = rrDisplay.querySelector('[data-rr-desc]');
      if (descEl) descEl.textContent = descText;
    };
    rrTriggerIds.forEach(id => {
      const inp = modal.querySelector(`.edit-item-input[data-item-id="${id}"]`);
      if (inp) inp.addEventListener('input', recomputeRR);
    });
  }

  // Live re-render: if user fills a dependency field (cost_basis), re-open modal with updated fullState
  // so dependent items (like strike_above_cost) unlock and become editable
  const costBasisInput = modal.querySelector('[data-item-id="cost_basis"]');
  if (costBasisInput) {
    costBasisInput.addEventListener('blur', () => {
      const newVal = costBasisInput.value.trim();
      const oldVal = (fullState.items || {}).cost_basis || '';
      // Only re-render if cost_basis went from empty → filled (unlocks strike)
      if (oldVal === '' && newVal !== '') {
        // Collect all current form values before reopening
        const currentItems = {};
        modal.querySelectorAll('[data-item-id]').forEach(el => {
          const iid = el.dataset.itemId;
          const type = el.dataset.itemType;
          if (type === 'numeric') currentItems[iid] = el.value.trim();
          else if (type === 'toggle') {
            const v = el.dataset.current || 'pending';
            if (v !== 'pending') currentItems[iid] = v;
          }
        });
        // Persist temporarily to fullState so reopen picks it up
        const updatedFullState = { ...fullState, items: { ...(fullState.items || {}), ...currentItems, cost_basis: newVal } };
        // Update history entry inline (not saved yet, but the reopen needs it)
        editHistoryEntryFullState(id, updatedFullState);
        hideEditModal();
        setTimeout(() => showEditModal(id), 100);
      }
    });
  }

  // Save
  modal.querySelector('#edit-save-btn').addEventListener('click', () => {
    const newTicker = tickerEl.value.trim().toUpperCase();
    const activeBtn = seg.querySelector('button.active');
    const newOutcome = activeBtn ? activeBtn.dataset.v : null;
    const newNotes = notesEl.value.trim();

    // Collect item values
    const newItems = { ...(fullState.items || {}) };
    modal.querySelectorAll('[data-item-id]').forEach(el => {
      const iid = el.dataset.itemId;
      const type = el.dataset.itemType;
      if (type === 'numeric') {
        newItems[iid] = el.value.trim();
      } else if (type === 'toggle') {
        const v = el.dataset.current || 'pending';
        if (v === 'pending') delete newItems[iid];
        else newItems[iid] = v;
      }
    });

    // Position sizing fields
    const newNav = modal.querySelector('#edit-nav')?.value.trim() || '';
    const newExisting = modal.querySelector('#edit-existing')?.value.trim() || '';
    const newBudget = modal.querySelector('#edit-budget')?.value.trim() || '';

    // Build new fullState
    const newFullState = {
      ...fullState,
      ticker: newTicker,
      nav: showPosition ? newNav : fullState.nav,
      existingExposure: showPosition ? newExisting : fullState.existingExposure,
      budget: showPosition ? newBudget : fullState.budget,
      items: newItems
    };

    // Recompute verdict using new state
    const recomputed = withTempState(newFullState, () => {
      const items = currentItems();
      const v = overallVerdict();
      const inputs = [];
      items.forEach(it => {
        if (it.numeric) {
          const val = state.items[it.id];
          if (val != null && val !== '') inputs.push(`${it.id}=${val}`);
        }
      });
      let exposurePct = '', capPct = '';
      if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
        const p = positionUsedPct();
        if (p != null) exposurePct = p.toFixed(1);
        capPct = positionCapPct();
      }
      return {
        verdict: v.status,
        pass: v.pass, fail: v.fail, pending: v.pending,
        hardFails: items.filter(it => it.hard && itemVerdict(it) === 'fail').map(it => it.title),
        failed: items.filter(it => itemVerdict(it) === 'fail').map(it => it.title),
        pendingItems: items.filter(it => itemVerdict(it) === 'pending').map(it => it.title),
        inputs: inputs.join('; '),
        exposurePct, capPct,
        subtype: subtypeString()
      };
    });

    const verdictChanged = recomputed.verdict !== entry.verdict;

    // Helper: rank verdict severity (higher = worse)
    const rank = v => {
      if (!v) return 2;
      if (v === 'BLOCKED') return 3;
      if (v === 'PENDING') return 2;
      if (v.includes('软执行')) return 1;
      if (v.startsWith('CLEAR')) return 0;
      return 2;
    };
    const oldVerdict = entry.verdict || '';
    const newVerdict = recomputed.verdict || '';
    const gotWorse = rank(newVerdict) > rank(oldVerdict);
    const effectiveOutcome = newOutcome || entry.outcome;
    const isOpenPosition = effectiveOutcome === 'open';

    // Save closure — reused by all three paths
    const performSave = (extraFields = {}) => {
      editHistoryEntry(id, {
        ticker: newTicker,
        outcome: newOutcome,
        notes: newNotes,
        forcedReason: extraFields.forcedReason || modal.querySelector('#edit-forced-reason')?.value.trim() || entry.forcedReason || '',
        nav: showPosition ? newNav : entry.nav,
        existing: showPosition ? newExisting : entry.existing,
        budget: showPosition ? newBudget : entry.budget,
        ...recomputed,
        fullState: newFullState
      });
      hideEditModal();
      const toastMsg = verdictChanged
        ? `已保存 · verdict: ${entry.verdict} → ${recomputed.verdict}`
        : '已保存';
      showToast(toastMsg, 'success', '页面已更新 · 稍后 Sync 同步到另一端');
    };

    // If verdict got worse AND still holding → show choice modal
    if (gotWorse && isOpenPosition && verdictChanged) {
      showVerdictShiftDialog({
        oldVerdict, newVerdict,
        onForced: () => {
          const existingReason = modal.querySelector('#edit-forced-reason')?.value.trim() || entry.forcedReason || '';
          const shiftNote = `[编辑后 verdict 变化: ${oldVerdict} → ${newVerdict}]`;
          const combined = existingReason ? existingReason + ' · ' + shiftNote : shiftNote;
          performSave({ forcedReason: combined });
        },
        onAccept: () => performSave(),
        onCancel: () => {}  // Modal stays open, user can revise or cancel
      });
      return;
    }

    performSave();
  });
}

function showVerdictShiftDialog({ oldVerdict, newVerdict, onForced, onAccept, onCancel }) {

  modal.innerHTML = `

        </div>
        <div style="font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-bottom: 14px;">

        </div>

          <div class="vs-opt-title">B · 接受更新, 不标记硬冲</div>
          <div class="vs-opt-desc">保存新数值 + verdict, 无额外标记. 历史记录更新, 但不进入硬冲跟踪. <b>适合: 你只是想让 checklist 数据更准, 但当时进场是正常的.</b></div>
        </div>
        <div class="verdict-shift-option" data-choice="cancel">
          <div class="vs-opt-title">C · 取消, 回到编辑</div>
          <div class="vs-opt-desc">先别保存, 回到编辑界面. 你可能想撤销刚才的改动, 或者继续调整。</div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.style.display = 'flex';

  modal.querySelectorAll('.verdict-shift-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const choice = opt.dataset.choice;
      modal.remove();
      if (choice === 'forced') onForced();
      else if (choice === 'accept') onAccept();
      else onCancel();
    });
  });
  // Click outside → cancel
  modal.addEventListener('click', e => {
    if (e.target === modal) { modal.remove(); onCancel(); }
  });
}

  });

function exportAllHistoryCSV() {
  const history = getActiveHistory();
  if (history.length === 0) { showToast('没有历史记录', 'error'); return; }
  const headers = ['Timestamp', 'Ticker', 'Strategy', 'Subtype', 'Verdict', 'Pass', 'Block', 'Pending', 'Outcome', 'Notes', 'Hard_Fails', 'Failed_Items', 'Pending_Items', 'Inputs', 'NAV', 'Existing', 'Budget', 'Exposure_%', 'Cap_%'];
  const rows = [headers];
  const sorted = [...history].sort((a, b) => a.timestampSort - b.timestampSort);
  sorted.forEach(e => {
    rows.push([
      e.timestamp, e.ticker || '', e.strategy, e.subtype, e.verdict,
      e.pass, e.fail, e.pending,
      e.outcome ? OUTCOME_LABEL[e.outcome] || e.outcome : '',
      e.notes || '',
      (e.hardFails || []).join(' | '),
      (e.failed || []).join(' | '),
      (e.pendingItems || []).join(' | '),
      e.inputs, e.nav, e.existing, e.budget, e.exposurePct, e.capPct
    ]);
  });
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const stamp = new Date().toISOString().slice(0, 10);
  const filename = `checklist-history-${stamp}-${history.length}rows.csv`;
  const ok = downloadFile(filename, 'text/csv', csv);
  showToast(ok ? `已导出 ${history.length} 条历史` : '导出失败', ok ? 'success' : 'error', ok ? filename : '');
}

function renderHistoryList() {
  const container = document.getElementById('history-list-container');
  const summary = document.getElementById('hf-summary');
  if (!container) return;

  let matches = getActiveHistory();
  if (historyFilters.ticker) {
    const t = historyFilters.ticker.trim().toUpperCase();
    matches = matches.filter(e => e.ticker && e.ticker.toUpperCase().includes(t));
  }
  if (historyFilters.period) {
    const now = Date.now();
    const dayMs = 86400000;
    const currYear = new Date().getFullYear();
    const startOfYear = new Date(currYear, 0, 1).getTime();
    const startOfLastYear = new Date(currYear - 1, 0, 1).getTime();
    matches = matches.filter(e => {
      const ts = e.timestampSort || Date.parse(e.timestamp);
      if (!ts) return false;
      switch (historyFilters.period) {
        case 'today': {
          const startOfToday = new Date(); startOfToday.setHours(0, 0, 0, 0);
          return ts >= startOfToday.getTime();
        }
        case '7d': return ts >= now - 7 * dayMs;
        case '30d': return ts >= now - 30 * dayMs;
        case '90d': return ts >= now - 90 * dayMs;
        case '180d': return ts >= now - 180 * dayMs;
        case 'ytd': return ts >= startOfYear;
        case 'lasty': return ts >= startOfLastYear && ts < startOfYear;
        case 'older': return ts < startOfLastYear;
        case 'custom': {
          // Both dates optional. If neither, pass through.
          let ok = true;
          if (historyFilters.dateFrom) {
            const fromTs = Date.parse(historyFilters.dateFrom + 'T00:00:00');
            if (!isNaN(fromTs) && ts < fromTs) ok = false;
          }
          if (ok && historyFilters.dateTo) {
            const toTs = Date.parse(historyFilters.dateTo + 'T23:59:59');
            if (!isNaN(toTs) && ts > toTs) ok = false;
          }
          return ok;
        }
        default: return true;
      }
    });
  }
  if (historyFilters.strategy) {
    matches = matches.filter(e => e.strategy && e.strategy.startsWith(historyFilters.strategy));
  }
  if (historyFilters.verdict) {
    matches = matches.filter(e => {
      const v = e.verdict || '';
      if (historyFilters.verdict === 'CLEAR') return v.startsWith('CLEAR') && !v.includes('软执行');
      if (historyFilters.verdict === 'SOFT') return v.includes('软执行');
      if (historyFilters.verdict === 'PENDING') return v === 'PENDING';
      if (historyFilters.verdict === 'BLOCKED') return v === 'BLOCKED';
      return false;
    });
  }
  if (historyFilters.outcome) {
    if (historyFilters.outcome === '_unset') matches = matches.filter(e => !e.outcome);
    else matches = matches.filter(e => e.outcome === historyFilters.outcome);
  }

  if (summary) {
    const wins = matches.filter(e => e.outcome === 'win').length;
    const losses = matches.filter(e => e.outcome === 'loss').length;
    const total = matches.length;
    const wr = (wins + losses > 0) ? Math.round(wins / (wins + losses) * 100) : null;
    summary.innerHTML = `共 <b>${total}</b> 条${wins > 0 || losses > 0 ? ` · 盈 ${wins} · 亏 ${losses}${wr !== null ? ` · 胜率 ${wr}%` : ''}` : ''}`;
  }

  if (matches.length === 0) {
    container.innerHTML = `<div class="history-empty">无匹配</div>`;
    return;
  }

  container.innerHTML = matches.map(e => {
    const cls = e.verdict.startsWith('CLEAR') ? 'pass' : e.verdict === 'BLOCKED' ? 'fail' : 'pending';
    const outcomeLabel = e.outcome ? OUTCOME_LABEL[e.outcome] : null;
    const outcomeCls = e.outcome || '';
    return `
      <div class="history-item">
        <div class="history-main">
          <div class="history-time">${esc(e.timestamp)}${e.ticker ? ` · <span class="history-ticker">${esc(e.ticker)}</span>` : ''}</div>
          <div class="history-title">${esc(e.strategy)} · ${esc(e.subtype)}</div>
          <div class="history-meta">
            <span class="history-verdict ${cls}">${esc(e.verdict)}</span>
            <span class="history-tally">${e.pass}/${e.fail}/${e.pending}</span>
            ${e.hardFails && e.hardFails.length ? `<span class="history-hard">HARD</span>` : ''}
            ${outcomeLabel ? `<span class="history-outcome ${outcomeCls}">${esc(outcomeLabel)}</span>` : ''}
          </div>
          ${e.notes ? `<div class="history-notes">${esc(e.notes)}</div>` : ''}
        </div>
        <div class="history-actions">
          <button class="btn ghost small" onclick="showEditModal('${e.id}')" data-preview-id="${e.id}">编辑</button>
          <button class="btn ghost small" onclick="restoreFromHistory('${e.id}')">还原</button>
          <button class="btn ghost small history-del-btn" onclick="deleteHistoryEntry('${e.id}')">删</button>
        </div>
      </div>
    `;
  }).join('');
  if (typeof _postRender === 'function') _postRender();
}

// V1 · Odometer / number roll animation for stats
// Elements marked with data-anim-num="target-value" + data-anim-key="unique-id"
// animate from previous value to new value on render.
const _animLastValues = new Map();
function _formatAnimVal(v, format) {
  const rounded = Math.round(v * 10) / 10;
  const isInt = Math.round(v) === Math.round(rounded);
  if (format === 'percent') return Math.round(v) + '%';
  if (format === 'money') return '$' + (isInt ? Math.round(v).toLocaleString() : v.toFixed(2));
  return isInt ? Math.round(v).toString() : v.toFixed(1);
}
function animateStatNum(el, targetValue, key, format = 'int', duration = 500) {
  if (isNaN(targetValue) || targetValue == null) return;
  const from = _animLastValues.has(key) ? _animLastValues.get(key) : targetValue;
  _animLastValues.set(key, targetValue);
  if (from === targetValue) {
    el.textContent = _formatAnimVal(targetValue, format);
    return;
  }
  const start = performance.now();
  function tick(t) {
    const p = Math.min(1, (t - start) / duration);
    const ease = 1 - Math.pow(1 - p, 3);
    const cur = from + (targetValue - from) * ease;
    el.textContent = _formatAnimVal(cur, format);
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = _formatAnimVal(targetValue, format);
  }
  requestAnimationFrame(tick);
}
function runNumberAnimations() {
  document.querySelectorAll('[data-anim-num]').forEach(el => {
    const target = parseFloat(el.dataset.animNum);
    const key = el.dataset.animKey || el.textContent;
    const format = el.dataset.animFormat || 'int';
    animateStatNum(el, target, key, format);
  });
}
window.runNumberAnimations = runNumberAnimations;
// V1 · haptic feedback on iOS/Android where supported
function haptic(pattern = 8) {
  try {
    if (navigator.vibrate) navigator.vibrate(pattern);
  } catch (e) {}
}
window.haptic = haptic;

function showToast(message, type = 'success', sub = '', opts = {}) {
  const c = ensureToastContainer();
  const t = document.createElement('div');
  t.className = 'toast toast-v2 toast-' + type;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '!' : 'i';
  const undoHTML = opts.undo ? `<button class="toast-undo" data-undo>撤销</button>` : '';
  t.innerHTML = `
    <div class="toast-icon">${icon}</div>
    <div class="toast-body">
      <div class="toast-title">${message}</div>
      ${sub ? `<div class="toast-sub">${sub}</div>` : ''}
    </div>
    ${undoHTML}
    <button class="toast-close" aria-label="Close">×</button>
  `;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('visible'));
  haptic(type === 'error' ? [10, 40, 10] : 8);

  const duration = opts.duration || (opts.undo ? 5000 : 2600);
  const dismiss = () => {
    t.classList.remove('visible');
    setTimeout(() => t.remove(), 300);
  };
  const timer = setTimeout(dismiss, duration);

  // Click anywhere on toast (except undo) dismisses
  t.addEventListener('click', (e) => {
    if (e.target.hasAttribute('data-undo')) {
      clearTimeout(timer);
      if (opts.onUndo) opts.onUndo();
      dismiss();
      haptic(5);
      return;
    }
    clearTimeout(timer);
    dismiss();
  });
}

/* ==========================================================
 * SNAPSHOT · TEXT + CSV EXPORT
 * ========================================================== */
function nowStamp() {
  const now = new Date();
  try {
    const opts = { timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false };
    const parts = new Intl.DateTimeFormat('en-CA', opts).formatToParts(now);
    const get = (t) => (parts.find(p => p.type === t) || {}).value || '';
    // en-CA + hour12 false → YYYY-MM-DD and 24h
    return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')} ET`;
  } catch (e) {
    return now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  }
}

function buildTextSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const lines = [];
  lines.push('── Pre-Trade Snapshot ──');
  lines.push(`Time:     ${nowStamp()}`);
  if (state.ticker) lines.push(`Ticker:   ${state.ticker}`);
  lines.push(`Strategy: ${STRAT_LABEL[state.strategy]} · ${subtypeString()}`);
  lines.push(`Verdict:  ${v.status}`);
  lines.push(`Tally:    ${v.pass} pass · ${v.fail} block · ${v.pending} pending`);
  lines.push('');

  const groups = [];
  const seen = {};
  items.forEach(it => {
    if (!seen[it.group]) { seen[it.group] = []; groups.push({ name: it.group, items: seen[it.group] }); }
    seen[it.group].push(it);
  });
  groups.forEach(g => {
    let passCount = 0;
    g.items.forEach(it => { if (itemVerdict(it) === 'pass') passCount++; });
    lines.push(`[${g.name}]  ${passCount}/${g.items.length}`);
    g.items.forEach(it => {
      const iv = itemVerdict(it);
      const symbol = iv === 'pass' ? '✓' : iv === 'fail' ? '✗' : '□';
      const hard = it.hard ? ' [HARD]' : '';
      let valStr = '';
      if (it.numeric) {
        const rawVal = state.items[it.id];
        if (rawVal !== '' && rawVal != null) valStr = ` = ${rawVal}`;
      }
      lines.push(`  ${symbol} ${it.title}${hard}${valStr}`);
    });
    lines.push('');
  });

  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    const pctVal = positionUsedPct();
    const cap = positionCapPct();
    lines.push('[Position]');
    lines.push(`  NAV $${state.nav || '—'}  ·  Existing $${state.existingExposure || '0'}  ·  Budget $${state.budget || '—'}`);
    if (pctVal != null) lines.push(`  Combined LEAPS: ${pctVal.toFixed(1)}% / cap ${cap}%`);
    lines.push('');
  }

  lines.push('──────────────────────');
  return lines.join('\n');
}

function csvCell(s) {
  const str = String(s == null ? '' : s);
  if (/[,"\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
  return str;
}

function buildCSVSnapshot() {
  const items = currentItems();
  const v = overallVerdict();
  const timestamp = nowStamp();
  const strategy = STRAT_LABEL[state.strategy] || '';
  const subtype = subtypeString();
  const verdict = v.status;

  // Map item ids to compact column names for the Inputs cell
  const nameMap = {
    'dte': 'DTE',
    'delta': 'Delta',
    'ivp': 'IVP',
    'roc': 'ROC',
    'kdj_j': 'KDJ_J',
    'contracts': 'Contracts',
    'profit_gradient': 'Profit%',
    'profit_200': 'Profit%',
    'loss_50': 'Loss%',
    'dte_below_9m': 'DTE_months',
    'dte_6m': 'DTE_months',
    'new_leaps_dte': 'NewDTE',
    'entry_price': 'Entry',
    'stop_level': 'Stop',
    'target_level': 'Target',
    'leaps_profit': 'LEAPS_Profit%',
    'fg': 'F&G',
    'earnings': 'DaysToEarn',
    'stock_ivp': 'IVP',
  };

  const failed = [];
  const pending = [];
  const hardFails = [];
  const inputs = [];

  items.forEach(it => {
    const iv = itemVerdict(it);
    if (iv === 'fail') {
      failed.push(it.title);
      if (it.hard) hardFails.push(it.title);
    } else if (iv === 'pending') {
      pending.push(it.title);
    }
    if (it.numeric) {
      const val = state.items[it.id];
      if (val != null && val !== '') {
        const key = nameMap[it.id] || it.id;
        inputs.push(`${key}=${val}`);
      }
    }
  });
  // Add computed R:R if available
  const rrObj = (state.strategy === 'leaps' && state.leapsDirection === 'open') ? computeRR() : null;
  if (rrObj && !rrObj.error) inputs.push(`RR=${rrObj.rr.toFixed(2)}`);

  // Position (LEAPS open only)
  let nav = '', existing = '', budget = '', exposurePct = '', capPct = '';
  if (state.strategy === 'leaps' && state.leapsDirection === 'open') {
    nav = state.nav || '';
    existing = state.existingExposure || '';
    budget = state.budget || '';
    const pct = positionUsedPct();
    if (pct != null) exposurePct = pct.toFixed(1);
    capPct = positionCapPct();
  }

  const headers = [
    'Timestamp', 'Ticker', 'Strategy', 'Subtype', 'Verdict',
    'Pass', 'Block', 'Pending',
    'Hard_Fails', 'Failed_Items', 'Pending_Items',
    'Inputs',
    'NAV', 'Existing', 'Budget', 'Exposure_%', 'Cap_%'
  ];
  const row = [
    timestamp, state.ticker || '', strategy, subtype, verdict,
    v.pass, v.fail, v.pending,
    hardFails.join(' | '), failed.join(' | '), pending.join(' | '),
    inputs.join('; '),
    nav, existing, budget, exposurePct, capPct,
  ];

  return [headers, row].map(r => r.map(csvCell).join(',')).join('\n');
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

function downloadFile(filename, mime, content) {
  try {
    const blob = new Blob(['\ufeff' + content], { type: mime + ';charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return true;
  } catch (e) {
    try {
      const dataUrl = 'data:' + mime + ';charset=utf-8,' + encodeURIComponent(content);
      window.open(dataUrl, '_blank');
      return true;
    } catch (e2) { return false; }
  }
}

function spawnVerdictParticles(verdict) {
  if (!verdict) return;
  // Respect reduced motion preference
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    if (verdict === 'BLOCKED') {
      document.body.classList.add('screen-shake');
      setTimeout(() => document.body.classList.remove('screen-shake'), 350);
    }
    return;
  }

  const isClear = verdict.startsWith('CLEAR');
  const isBlocked = verdict === 'BLOCKED';
  const isSoft = verdict.includes('软执行');

  if (isClear) launchConfetti(isSoft ? 'soft' : 'clear');
  else if (isBlocked) {
    launchConfetti('blocked');
    document.body.classList.add('screen-shake');
    setTimeout(() => document.body.classList.remove('screen-shake'), 350);
  }
}

function launchConfetti(type) {
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  document.body.appendChild(canvas);

  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const particles = createConfettiParticles(type, w, h);

  // For CLEAR (not soft), fire secondary wave after 180ms for a fuller celebration
  if (type === 'clear') {
    setTimeout(() => {
      const wave2 = createConfettiParticles('clear', w, h, 0.55);
      particles.push(...wave2);
    }, 180);
    setTimeout(() => {
      const wave3 = createConfettiParticles('clear', w, h, 0.35);
      particles.push(...wave3);
    }, 380);
  }

  animateConfetti(particles, ctx, canvas, w, h);
}

function createConfettiParticles(type, w, h, intensity = 1) {
  const particles = [];

  if (type === 'clear') {
    // Celebratory: green + gold + white confetti, launched from bottom-left, bottom-center, bottom-right
    const count = Math.floor(70 * intensity);
    const colors = ['#3FB950', '#4EC167', '#22C55E', '#E4B84A', '#F5D06B', '#FFFFFF', '#DBEAFE'];
    const launchers = [w * 0.15, w * 0.5, w * 0.85];

    for (let i = 0; i < count; i++) {
      const lx = launchers[i % launchers.length];
      // Aim generally upward with spread — like a cannon
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * (Math.PI * 0.55);
      const speed = 550 + Math.random() * 550;
      particles.push({
        x: lx + (Math.random() - 0.5) * 30,
        y: h + 10,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        gravity: 900,
        drag: 0.992,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 10,
        size: 5 + Math.random() * 7,
        aspect: 0.3 + Math.random() * 1.4,
        shape: pickShape(),
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        fadeStart: 1.4 + Math.random() * 0.6,
        age: 0,
      });
    }
  } else if (type === 'soft') {
    // Gentler: fewer, subtler, only greens
    const count = 28;
    const colors = ['#3FB950', '#5AB374', '#7EC898', '#4EC167'];
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * (Math.PI * 0.45);
      const speed = 350 + Math.random() * 320;
      particles.push({
        x: w * (0.2 + Math.random() * 0.6),
        y: h + 10,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        gravity: 700,
        drag: 0.99,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 6,
        size: 4 + Math.random() * 5,
        aspect: 0.4 + Math.random() * 1.2,
        shape: pickShape(),
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 0.75,  // more subtle base opacity
        fadeStart: 1.3 + Math.random() * 0.5,
        age: 0,
        maxAlpha: 0.75,
      });
    }
  } else if (type === 'blocked') {
    // Explosion + debris fall with gravity
    const count = 55;
    const colors = ['#F85149', '#DC3545', '#B22222', '#8B1A1A', '#E85D2C', '#FF6B4A', '#FFD700'];
    const cx = w / 2;
    const cy = h * 0.42;

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
      const speed = 220 + Math.random() * 380;
      particles.push({
        x: cx + (Math.random() - 0.5) * 20,
        y: cy + (Math.random() - 0.5) * 20,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        gravity: 700,
        drag: 0.978,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 16,
        size: 3 + Math.random() * 6,
        aspect: 0.3 + Math.random() * 1.5,
        shape: pickShape(),
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        fadeStart: 0.9 + Math.random() * 0.5,
        age: 0,
      });
    }
  }

  return particles;
}

function pickShape() {
  const r = Math.random();
  if (r < 0.5) return 'rect';       // confetti flake (most common)
  if (r < 0.75) return 'ribbon';    // long thin ribbon
  return 'circle';                  // circle dot
}

function animateConfetti(particles, ctx, canvas, w, h) {
  let lastT = performance.now();
  const maxT = 3500;
  const startT = lastT;

  const step = (now) => {
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    const elapsed = now - startT;

    ctx.clearRect(0, 0, w, h);
    let alive = 0;

    for (const p of particles) {
      if (p.life <= 0) continue;
      p.age += dt;
      p.vx *= p.drag;
      p.vy = p.vy * p.drag + p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;

      if (p.age > p.fadeStart) {
        const fadeLen = 0.7;
        const t = Math.max(0, 1 - (p.age - p.fadeStart) / fadeLen);
        p.life = (p.maxAlpha || 1) * t;
      }

      // Skip off-screen
      if (p.y > h + 60 || p.x < -60 || p.x > w + 60) { p.life = 0; continue; }
      if (p.life <= 0.01) continue;
      alive++;

      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;

      if (p.shape === 'rect') {
        const wide = p.size;
        const tall = p.size * p.aspect;
        ctx.fillRect(-wide / 2, -tall / 2, wide, tall);
      } else if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'ribbon') {
        const wide = p.size * 2;
        const tall = p.size / 4;
        ctx.fillRect(-wide / 2, -tall / 2, wide, tall);
      }
      ctx.restore();
    }

    if (alive > 0 && elapsed < maxT) {
      requestAnimationFrame(step);
    } else {
      canvas.remove();
    }
  };

  requestAnimationFrame(step);
}

/* ==========================================================
 * GIST SYNC · cross-device history sync via GitHub Gist
 * ========================================================== */
const SYNC_CONFIG_KEY = 'pretrade_sync_config';
const GIST_FILENAME = 'checklist-data.json';

function loadSyncConfig() {
  try { const raw = localStorage.getItem(SYNC_CONFIG_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
}
function saveSyncConfig(cfg) {
  try { localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg)); return true; }
  catch (e) { return false; }
}
function clearSyncConfig() {
  try { localStorage.removeItem(SYNC_CONFIG_KEY); } catch (e) {}
}

async function githubFetch(url, options = {}) {
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token) throw new Error('未配置 token');
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json'
  };
  if (options.body) headers['Content-Type'] = 'application/json';
  const resp = await fetch(url, { ...options, headers });
  if (!resp.ok) {
    if (resp.status === 401) throw new Error('Token 无效或已过期');
    if (resp.status === 404) throw new Error('Gist 不存在, 请重新设置');
    if (resp.status === 403) throw new Error('GitHub API 限流, 稍后再试');
    throw new Error(`GitHub API ${resp.status}`);
  }
  return resp.json();
}

async function pushToGist(payload) {
  const cfg = loadSyncConfig();
  const content = JSON.stringify(payload, null, 2);
  const body = JSON.stringify({
    description: 'Pre-Trade Checklist Data (auto-managed)',
    public: false,
    files: { [GIST_FILENAME]: { content } }
  });
  if (cfg.gistId) {
    return githubFetch(`https://api.github.com/gists/${cfg.gistId}`, { method: 'PATCH', body });
  } else {
    const result = await githubFetch('https://api.github.com/gists', { method: 'POST', body });
    saveSyncConfig({ ...cfg, gistId: result.id });
    return result;
  }
}

async function pullFromGist() {
  const cfg = loadSyncConfig();
  if (!cfg.gistId) throw new Error('未设置 gist ID');
  const result = await githubFetch(`https://api.github.com/gists/${cfg.gistId}`);
  const file = result.files && result.files[GIST_FILENAME];
  if (!file) throw new Error(`Gist 中未找到 ${GIST_FILENAME}`);
  // GitHub API truncates file.content at 1 MB and sets truncated=true.
  // Full content (up to 10 MB per file) is available at file.raw_url without auth.
  // Files > 10 MB require git clone; we don't handle that (localStorage caps at ~5-10 MB anyway).
  let contentStr;
  if (file.truncated || (file.size && file.size > 1000000)) {
    if (!file.raw_url) throw new Error(`Gist 文件超过 1 MB 且无 raw_url · 联系维护者`);
    const rawResp = await fetch(file.raw_url);
    if (!rawResp.ok) throw new Error(`获取 raw_url 失败 (${rawResp.status})`);
    contentStr = await rawResp.text();
  } else {
    contentStr = file.content;
  }
  try {
    return JSON.parse(contentStr);
  } catch (e) {
    throw new Error(`Gist 内容解析失败: ${e.message}`);
  }
}

async function syncUpload() {
  try {
    showToast('上传中...', 'info');
    const payload = { version: 2, syncedAt: new Date().toISOString(), history: loadHistory() };
    await pushToGist(payload);
    const cfg = loadSyncConfig();
    saveSyncConfig({ ...cfg, lastSyncAt: payload.syncedAt });
    const activeCount = payload.history.filter(e => !e._deleted).length;
    showToast('已上传', 'success', `${activeCount} 条历史 → Gist`);
    hideSyncModal();
  } catch (e) { showToast('上传失败', 'error', e.message); }
}

async function syncDownload() {
  if (!confirm('下载会覆盖本地历史。继续?')) return;
  try {
    showToast('下载中...', 'info');
    const remote = await pullFromGist();
    if (!Array.isArray(remote.history)) throw new Error('Gist 数据格式错误');
    safeSetItem(HISTORY_KEY, JSON.stringify(remote.history));
    const cfg = loadSyncConfig();
    saveSyncConfig({ ...cfg, lastSyncAt: new Date().toISOString() });
    const activeCount = remote.history.filter(e => !e._deleted).length;
    showToast('已下载', 'success', `${activeCount} 条历史 → 本地`);
    hideSyncModal();
    if (!state.strategy) render();
  } catch (e) { showToast('下载失败', 'error', e.message); }
}

// Core merge logic returning stats. Used by user-triggered syncMerge, snapshot upload, and auto-sync.
// Handles tombstones (_deleted: true) so deletions propagate correctly across devices.
async function syncMergeCore() {
  const local = loadHistory();
  const localActiveIds = new Set(local.filter(e => !e._deleted).map(e => e.id));
  let remoteHistory = [];
  try {
    const remote = await pullFromGist();
    remoteHistory = Array.isArray(remote.history) ? remote.history : [];
  } catch (e) {
    // If gist doesn't exist yet (first sync), just upload local
    if (!/未设置|不存在/.test(e.message)) throw e;
  }
  const remoteActiveIds = new Set(remoteHistory.filter(e => !e._deleted).map(e => e.id));

  // Merge by id with tombstone-aware conflict resolution:
  //   both normal  → keep newer by updatedAt (fallback timestampSort)
  //   one normal, one tombstone → tombstone wins (deletion propagates)
  //   both tombstone → keep the one with later _deletedAt
  const versionKey = (e) => e.updatedAt || e.timestampSort || 0;
  const map = new Map();
  [...local, ...remoteHistory].forEach(e => {
    const cur = map.get(e.id);
    if (!cur) { map.set(e.id, e); return; }
    if (cur._deleted && !e._deleted) return;  // tombstone wins
    if (!cur._deleted && e._deleted) { map.set(e.id, e); return; }  // tombstone wins
    if (cur._deleted && e._deleted) {
      if ((e._deletedAt || 0) > (cur._deletedAt || 0)) map.set(e.id, e);
      return;
    }
    if (versionKey(e) > versionKey(cur)) map.set(e.id, e);
  });

  const merged = Array.from(map.values())
    .sort((a, b) => {
      const ta = a._deleted ? (a._deletedAt || a.timestampSort || 0) : (a.timestampSort || 0);
      const tb = b._deleted ? (b._deletedAt || b.timestampSort || 0) : (b.timestampSort || 0);
      return tb - ta;
    })
    .slice(0, HISTORY_MAX);

  safeSetItem(HISTORY_KEY, JSON.stringify(merged));
  const payload = { version: 2, syncedAt: new Date().toISOString(), history: merged };
  await pushToGist(payload);
  const cfg = loadSyncConfig();
  saveSyncConfig({ ...cfg, lastSyncAt: payload.syncedAt });

  // Stats: only count active (non-tombstone) entries
  const activeMerged = merged.filter(e => !e._deleted);
  const activeMergedIds = new Set(activeMerged.map(e => e.id));
  const newFromRemote = [...activeMergedIds].filter(id => !localActiveIds.has(id)).length;
  const newFromLocal = [...activeMergedIds].filter(id => !remoteActiveIds.has(id)).length;
  const deletedByRemote = [...localActiveIds].filter(id => !activeMergedIds.has(id)).length;
  return { total: activeMerged.length, newFromRemote, newFromLocal, deletedByRemote };
}

async function syncMerge() {
  try {
    showToast('合并中...', 'info');
    const stats = await syncMergeCore();
    const parts = [`共 ${stats.total} 条`];
    if (stats.newFromRemote > 0) parts.push(`+${stats.newFromRemote}`);
    if (stats.deletedByRemote > 0) parts.push(`-${stats.deletedByRemote}`);
    showToast('已合并', 'success', parts.join(' · '));
    hideSyncModal();
    if (!state.strategy) render();
  } catch (e) { showToast('合并失败', 'error', e.message); }
}

// Silent auto-sync used on app boot. Toasts only for changes / errors.
async function syncMergeSilent() {
  try {
    const stats = await syncMergeCore();
    if (stats.newFromRemote > 0 || stats.deletedByRemote > 0) {
      const parts = [];
      if (stats.newFromRemote > 0) parts.push(`新增 ${stats.newFromRemote}`);
      if (stats.deletedByRemote > 0) parts.push(`删除 ${stats.deletedByRemote}`);
      showToast(`已从云端同步 (${parts.join(', ')})`, 'success');
      if (!state.strategy) render();
    }
  } catch (e) {
    showToast('云端同步失败', 'error', e.message);
  }
}

// Debounced auto-push to Gist — called after every local mutation (snapshot save / edit / delete).
// Waits N seconds after last change so rapid edits batch into one push.
// Skips if sync not configured. Errors are silent (user can retry manually via Sync).
let _autoPushTimer = null;
let _autoPushIndicator = null;
function scheduleAutoPushToGist(delayMs = 3000) {
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token || !cfg.gistId) return;  // Not configured, skip
  if (!navigator.onLine) {
    _showAutoPushIndicator('离线 · 待联网同步', 4000);
    return;  // Skip when offline; will auto-fire on 'online' event
  }
  if (_autoPushTimer) clearTimeout(_autoPushTimer);
  _showAutoPushIndicator('待同步...');
  _autoPushTimer = setTimeout(async () => {
    _autoPushTimer = null;
    try {
      _showAutoPushIndicator('同步中...');
      await syncMergeCore();
      _showAutoPushIndicator('已同步 ✓', 2000);
    } catch (e) {
      _showAutoPushIndicator('同步失败', 3000, 'fail');
      // Don't spam toast — user can see in the indicator and try manual sync
    }
  }, delayMs);
}
function _showAutoPushIndicator(text, hideAfterMs = 0, cls = '') {
  let ind = document.getElementById('auto-push-indicator');
  if (!ind) {
    ind = document.createElement('div');
    ind.id = 'auto-push-indicator';
    ind.className = 'auto-push-indicator';
    document.body.appendChild(ind);
  }
  ind.className = 'auto-push-indicator ' + (cls || '');
  ind.textContent = text;
  ind.classList.add('visible');
  clearTimeout(_autoPushIndicator);
  if (hideAfterMs > 0) {
    _autoPushIndicator = setTimeout(() => {
      ind.classList.remove('visible');
    }, hideAfterMs);
  }
}
window.scheduleAutoPushToGist = scheduleAutoPushToGist;

// Offline detection · shows banner at top when offline, auto-syncs on reconnect
function _updateOfflineBanner() {
  const existing = document.getElementById('offline-banner');
  const isOffline = !navigator.onLine;
  if (isOffline) {
    if (existing) return;
    const banner = document.createElement('div');
    banner.id = 'offline-banner';
    banner.className = 'offline-banner';
    banner.innerHTML = `
      <span class="offline-icon">⚠</span>
      <span class="offline-text">离线中 · 数据仅保存本地 · 联网后自动同步到 Gist</span>
    `;
    document.body.insertBefore(banner, document.body.firstChild);
  } else if (existing) {
    existing.classList.add('offline-banner-hiding');
    setTimeout(() => existing.remove(), 350);
  }
}
window.addEventListener('online', () => {
  _updateOfflineBanner();
  showToast('已联网', 'success', '正在补同步到 Gist...');
  // Fire silent merge to reconcile any local changes while offline
  setTimeout(() => syncMergeSilent(), 300);
});
window.addEventListener('offline', () => {
  _updateOfflineBanner();
  showToast('离线中', 'warning', '数据仍会保存到本地, 联网后自动同步');
});

/* ==========================================================
 * THEME
 * ========================================================== */
const THEME_CYCLE = ['auto', 'slate', 'terminal', 'light', 'warm'];
const THEME_LABEL = { auto: 'Auto', slate: 'Slate', terminal: 'Terminal', light: 'Light', warm: 'Warm' };
const THEME_COLORS = { slate: '#0F1419', terminal: '#000000', light: '#F9FAFB', warm: '#FBF6E9' };

// User theme customization (persisted separately)
const THEME_CUSTOM_KEY = 'pretrade_theme_custom';
let themeCustom = { accent: null, radius: null, bg: null };  // null = use theme default

function loadThemeCustom() {
  try {
    const raw = localStorage.getItem(THEME_CUSTOM_KEY);
    if (raw) themeCustom = { ...themeCustom, ...JSON.parse(raw) };
  } catch (e) {}
}
function saveThemeCustom() {
  try { localStorage.setItem(THEME_CUSTOM_KEY, JSON.stringify(themeCustom)); } catch (e) {}
}

// Color utility functions for auto-derivation
function _hexToRgb(hex) {
  const m = /^#?([0-9a-fA-F]{6})$/.exec(hex || '');
  if (!m) return null;
  const n = parseInt(m[1], 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function _rgbToHex(r, g, b) {
  const to = x => Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2, '0');
  return '#' + to(r) + to(g) + to(b);
}
function _luminance(hex) {
  const c = _hexToRgb(hex);
  if (!c) return 0.5;
  return (0.299 * c.r + 0.587 * c.g + 0.114 * c.b) / 255;
}
function _lighten(hex, pct) {
  const c = _hexToRgb(hex);
  if (!c) return hex;
  return _rgbToHex(c.r + (255 - c.r) * pct, c.g + (255 - c.g) * pct, c.b + (255 - c.b) * pct);
}
function _darken(hex, pct) {
  const c = _hexToRgb(hex);
  if (!c) return hex;
  return _rgbToHex(c.r * (1 - pct), c.g * (1 - pct), c.b * (1 - pct));
}

function applyThemeCustom() {
  const root = document.body;  // Use body since theme classes are on body — same specificity

  // Accent
  if (themeCustom.accent) root.style.setProperty('--accent', themeCustom.accent);
  else root.style.removeProperty('--accent');

  // Radius (radius is safe on documentElement too)
  if (themeCustom.radius != null) document.documentElement.style.setProperty('--radius', themeCustom.radius + 'px');
  else document.documentElement.style.removeProperty('--radius');

  // Background — derives panel, text, border from base color
  if (themeCustom.bg && _hexToRgb(themeCustom.bg)) {
    const lum = _luminance(themeCustom.bg);
    const isDark = lum < 0.5;
    root.style.setProperty('--bg', themeCustom.bg);
    root.style.setProperty('--panel', isDark ? _lighten(themeCustom.bg, 0.06) : _darken(themeCustom.bg, 0.03));
    root.style.setProperty('--panel-2', isDark ? _lighten(themeCustom.bg, 0.11) : _darken(themeCustom.bg, 0.06));
    root.style.setProperty('--border', isDark ? _lighten(themeCustom.bg, 0.16) : _darken(themeCustom.bg, 0.10));
    root.style.setProperty('--border-hi', isDark ? _lighten(themeCustom.bg, 0.24) : _darken(themeCustom.bg, 0.16));
    root.style.setProperty('--text', isDark ? '#F0F2F5' : '#111827');
    root.style.setProperty('--text-dim', isDark ? '#B8C2CE' : '#6B7280');
    root.style.setProperty('--text-faint', isDark ? '#9AA5B0' : '#9CA3AF');
    // Update meta theme-color for mobile
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', themeCustom.bg);
  } else {
    ['--bg', '--panel', '--panel-2', '--border', '--border-hi', '--text', '--text-dim', '--text-faint'].forEach(v => root.style.removeProperty(v));
  }
}

function showCustomizeModal() {
  ensureCustomizeModal();
  const modal = document.getElementById('customize-modal');
  const accentPicker = modal.querySelector('#cm-accent-picker');
  const accentText = modal.querySelector('#cm-accent-text');
  const bgPicker = modal.querySelector('#cm-bg-picker');
  const bgText = modal.querySelector('#cm-bg-text');
  const radiusSlider = modal.querySelector('#cm-radius-slider');
  const radiusValue = modal.querySelector('#cm-radius-value');
  // Load current values
  const currentAccent = themeCustom.accent || getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#58A6FF';
  const currentBg = themeCustom.bg || getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0F1419';
  const currentRadius = themeCustom.radius != null ? themeCustom.radius : 6;
  accentPicker.value = currentAccent;
  accentText.value = currentAccent;
  bgPicker.value = currentBg;
  bgText.value = currentBg;
  radiusSlider.value = currentRadius;
  radiusValue.textContent = currentRadius + 'px';
  // Init density segmented active state
  modal.querySelectorAll('#cm-density-seg button').forEach(b => {
    b.classList.toggle('active', b.dataset.v === densityMode);
  });
  // Wire live updates
  accentPicker.addEventListener('input', e => {
    themeCustom.accent = e.target.value;
    accentText.value = e.target.value;
    applyThemeCustom();
    saveThemeCustom();
  });
  accentText.addEventListener('input', e => {
    const v = e.target.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      themeCustom.accent = v;
      accentPicker.value = v;
      applyThemeCustom();
      saveThemeCustom();
    }
  });
  bgPicker.addEventListener('input', e => {
    themeCustom.bg = e.target.value;
    bgText.value = e.target.value;
    applyThemeCustom();
    saveThemeCustom();
  });
  bgText.addEventListener('input', e => {
    const v = e.target.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      themeCustom.bg = v;
      bgPicker.value = v;
      applyThemeCustom();
      saveThemeCustom();
    }
  });
  radiusSlider.addEventListener('input', e => {
    themeCustom.radius = parseInt(e.target.value, 10);
    radiusValue.textContent = themeCustom.radius + 'px';
    applyThemeCustom();
    saveThemeCustom();
  });
  modal.style.display = 'flex';
}
function hideCustomizeModal() {
  const m = document.getElementById('customize-modal');
  if (m) m.style.display = 'none';
}

window.showCustomizeModal = showCustomizeModal;

function resolveTheme(t) {
  if (t !== 'auto') return t;
  try {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'slate';
  } catch (e) { return 'slate'; }
}
function setTheme(t) {
  state.theme = t;
  const resolved = resolveTheme(t);
  document.body.className = 'theme-' + resolved;
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', THEME_COLORS[resolved]);
  try { localStorage.setItem('pretrade_theme', t); } catch (e) {}
  // Re-apply custom overrides after theme change
  applyThemeCustom();
}
function cycleTheme() {
  const i = THEME_CYCLE.indexOf(state.theme);
  setTheme(THEME_CYCLE[(i + 1) % THEME_CYCLE.length]);
  render();
}
function loadTheme() {
  try {
    const saved = localStorage.getItem('pretrade_theme');
    if (THEME_CYCLE.indexOf(saved) >= 0) state.theme = saved;
    else state.theme = 'auto';  // Default for new users
  } catch (e) { state.theme = 'auto'; }
  loadThemeCustom();
  setTheme(state.theme);
  // Listen to system preference changes (for auto mode)
  try {
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
      if (state.theme === 'auto') setTheme('auto');
    });
  } catch (e) {}
}

// Auto-fill from history helpers — only sums outcome=open positions, shows detail
function _formatAutoDetail(items) {
  if (!items.length) return '';
  const parts = items.map(it => `${it.ticker} $${Math.round(it.val).toLocaleString()}`);
  return parts.join(' + ');
}
window.autoFillCspExisting = () => {
  const { total, items } = autoComputeCspExistingTotal();
  state.cspExistingTotal = total > 0 ? String(Math.round(total)) : '';
  render();
  if (total > 0) {
    showToast(`已汇总: $${Math.round(total).toLocaleString()}  (${items.length} 笔持仓)`, 'success', _formatAutoDetail(items));
  } else {
    showToast('无 outcome=持仓 的 CSP 快照', 'info');
  }
};
window.autoFillCspTicker = () => {
  const { total, items } = autoComputeCspTickerExisting(state.ticker);
  state.cspTickerExisting = total > 0 ? String(Math.round(total)) : '';
  render();
  if (!state.ticker) { showToast('先填 ticker', 'error'); return; }
  if (total > 0) {
    showToast(`${state.ticker}: $${Math.round(total).toLocaleString()}  (${items.length} 笔持仓)`, 'success', _formatAutoDetail(items));
  } else {
    showToast(`${state.ticker} 无 outcome=持仓 的 CSP`, 'info');
  }
};
window.autoFillLeapsExisting = () => {

  render();

  } else {
    showToast('无 outcome=持仓 的 LEAPS 快照', 'info');
  }
};

/* Global click → button ripple (A2) + haptic (MB4) */
document.addEventListener('click', (e) => {
  const target = e.target.closest('.btn, .picker-card, .segmented button, .item-check, .item-toggle button, .theme-btn, .item-btn, .edit-item-btn, .trend-range-btn');
  if (!target) return;
  // MB4 · Haptic feedback (Android; iOS no-op)
  if (typeof haptic === 'function') {
    if (target.classList.contains('primary') || target.classList.contains('item-btn') || target.classList.contains('edit-item-btn')) {
      haptic(10);  // Stronger feedback for primary actions
    } else {
      haptic(5);   // Subtle for secondary buttons
    }
  }
  // Ripple effect
  if (target.__rippleActive) return;
  const rect = target.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple-fx';
  const size = Math.max(rect.width, rect.height) / 30;
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top = (e.clientY - rect.top) + 'px';
  ripple.style.width = size + 'px';
  ripple.style.height = size + 'px';
  target.appendChild(ripple);
  target.__rippleActive = true;
  setTimeout(() => { ripple.remove(); target.__rippleActive = false; }, 580);
});

/* Scroll → sticky header 'scrolled' state (F2) + verdict class */
function updateScrolledState() {
  const bar = document.querySelector('.status-bar');
  if (!bar) return;
  const scrolled = window.scrollY > 20;
  bar.classList.toggle('scrolled', scrolled);
}
window.addEventListener('scroll', updateScrolledState, { passive: true });

// Auto-sync on boot if Gist Sync is configured (Q2 = a: every launch)
(function bootAutoSync() {
  const cfg = loadSyncConfig();
  if (!cfg || !cfg.token) return;
  // Delay 800ms so UI renders + user sees the app before any sync toast
  setTimeout(() => { syncMergeSilent(); }, 800);
})();
